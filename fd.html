<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - Escaping the Swarm</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --brand-gold: #cfa86e;
            --fo-blue: #3498db;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }

        body, html {
            background-color: #000; 
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            width: 100%; 
            height: 100%;
            overflow: hidden; 
            user-select: none; 
            touch-action: none;
        }

        /* Mobile Landscape Orientation Lock */
        #orientation-lock {
            display: none;
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: #000; 
            color: #fff; 
            z-index: 99999;
            align-items: center; 
            justify-content: center;
            font-size: 1.5rem; 
            font-weight: bold; 
            text-align: center;
            padding: 20px;
        }

        @media screen and (orientation: portrait) {
            #orientation-lock { display: flex; }
        }

        #takeoff-viewport {
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden; 
            background-color: #87CEEB; 
            cursor: pointer; 
            transition: background-color 0.5s;
        }
        
        #tk-alert-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            pointer-events: none; 
            z-index: 30; 
            transition: background 0.2s;
        }

        .flashing { 
            animation: redAlert 0.3s infinite alternate; 
        }

        @keyframes redAlert { 
            from { background: rgba(215, 25, 32, 0); } 
            to { background: rgba(215, 25, 32, 0.35); } 
        }

        #tk-version {
            position: absolute; 
            bottom: 10px; 
            right: 15px; 
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem; 
            font-weight: bold; 
            z-index: 50; 
            pointer-events: none;
        }

        #camera-rig {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            transform-origin: 30% 80%; 
            will-change: transform; 
            z-index: 1;
        }

        .parallax-layer { 
            position: absolute; 
            left: 0; 
            right: 0; 
            top: 0; 
            bottom: 0; 
            pointer-events: none; 
            background-repeat: repeat-x; 
            transition: filter 0.5s, background-color 0.5s;
            will-change: background-position, transform; /* Hardware Acceleration */
        }

        #tk-bg-sky { 
            background-size: auto 100vh; 
            z-index: 1; 
            height: 120%; 
            top: -10%;
        }

        #tk-fg-sky { 
            background-size: auto 150vh; 
            z-index: 14; 
            height: 120%; 
            top: -100%; 
            opacity: 0.8; 
        }

        #tk-threat-fog {
            display: none;
            background-size: auto 200vh;
            z-index: 15; 
            height: 150%;
            top: -10%;
            opacity: 0.95;
            filter: blur(3px) brightness(1.1);
        }
        .fog-scenario #tk-threat-fog { display: block; }
        
        .fog-scenario #tk-plane-img,
        .fog-scenario .tk-enemy img,
        .fog-scenario #tk-overtaker-plane img {
            filter: brightness(0) !important;
            transition: filter 0.5s;
        }

        #tk-sun {
            display: none; 
            position: absolute; 
            right: 15%; 
            bottom: 35%;
            width: 60px; 
            height: 60px; 
            background: #fff;
            box-shadow: 0 0 0 10px rgba(255, 240, 150, 0.8), 0 0 0 25px rgba(255, 200, 100, 0.4), 0 0 0 45px rgba(255, 100, 50, 0.2);
            z-index: 0; 
            will-change: transform;
        }

        .sunrise-weather #tk-sun { display: block; }

        #tk-bg-city { 
            height: 100%; 
            background-size: auto 100%; 
            background-position: bottom left; 
            z-index: 2; 
            top: 0; 
        }
        
        #tk-runway { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px; 
            background: #222; 
            z-index: 3; 
            transition: filter 0.5s;
            will-change: transform;
        }

        #tk-runway-stripes { 
            width: 100%; 
            height: 100%; 
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); 
            background-position: 0px 10px; 
            background-size: 200px 6px; 
            background-repeat: repeat-x;
            will-change: background-position;
        }

        /* --- WEATHER STATES --- */
        .weather-layer { 
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            pointer-events: none; 
        }
        
        .night-weather .rain-layer, 
        .night-weather .fog-layer.layer-back { display: block; }
        .snow-weather .snow-layer, 
        .snow-weather .fog-layer { display: block; }
        
        .night-weather { background-color: #0b1021 !important; }
        .night-weather #tk-bg-sky, .night-weather #tk-fg-sky, .night-weather #tk-bg-city, .night-weather #tk-runway, .night-weather #tk-mountain {
            filter: brightness(0.25) sepia(0.5) hue-rotate(180deg) saturate(1.2);
        }
        .night-weather #tk-threat-fog { filter: brightness(0.3) sepia(0.5) hue-rotate(180deg) saturate(1.2) blur(3px); }
        .night-weather #tk-plane-img, .night-weather .tk-enemy img, .night-weather #tk-overtaker-plane img { filter: brightness(0.55); }

        .sunrise-weather { background-color: #ff9e7a !important; }
        .sunrise-weather #tk-bg-sky, .sunrise-weather #tk-fg-sky, .sunrise-weather #tk-bg-city, .sunrise-weather #tk-runway, .sunrise-weather #tk-mountain {
            filter: sepia(0.4) hue-rotate(-15deg) saturate(1.4) brightness(0.8);
        }
        .sunrise-weather #tk-threat-fog { filter: sepia(0.4) hue-rotate(-15deg) saturate(1.4) brightness(0.9) blur(3px); }
        .sunrise-weather #tk-plane-img, .sunrise-weather .tk-enemy img, .sunrise-weather #tk-overtaker-plane img { filter: sepia(0.3) saturate(1.2) brightness(0.9); }

        .snow-weather { background-color: #b8c6d9 !important; }
        .snow-weather #tk-bg-sky, .snow-weather #tk-fg-sky, .snow-weather #tk-bg-city, .snow-weather #tk-runway, .snow-weather #tk-mountain {
            filter: grayscale(0.7) brightness(1.4) contrast(0.6);
        }
        .snow-weather #tk-threat-fog { filter: grayscale(0.7) brightness(1.4) blur(3px); }
        
        .snow-weather .fog-layer.layer-front { background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.95) 0%, transparent 65%); }
        .snow-weather .fog-layer.layer-back { background: radial-gradient(circle at 50% 50%, rgba(240, 245, 250, 0.8) 0%, transparent 70%); }
        
        .fog-layer.layer-back { background: radial-gradient(circle at 50% 50%, rgba(180, 190, 210, 0.4) 0%, transparent 60%); background-size: 300% 200%; animation: fogPulse 15s ease-in-out infinite alternate; z-index: 8; }
        .fog-layer.layer-front { background: radial-gradient(ellipse at center, rgba(200, 210, 220, 0.95) 0%, transparent 40%); background-size: 200% 100%; animation: fogSweep 7s linear infinite; z-index: 15; }
        
        .rain-layer.layer-1 { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><rect x='20' y='20' width='2' height='15' fill='rgba(255,255,255,0.4)'/></svg>"); animation: rainAnim1 0.4s linear infinite; z-index: 11; }
        .rain-layer.layer-2 { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect x='50' y='50' width='3' height='25' fill='rgba(255,255,255,0.6)'/><rect x='250' y='200' width='2' height='15' fill='rgba(255,255,255,0.4)'/></svg>"); animation: rainAnim2 0.3s linear infinite; z-index: 16; }

        .snow-layer.layer-1 { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><circle cx='20' cy='20' r='3' fill='rgba(255,255,255,0.8)'/><circle cx='100' cy='80' r='2' fill='rgba(255,255,255,0.6)'/><circle cx='150' cy='150' r='4' fill='rgba(255,255,255,0.9)'/><circle cx='50' cy='180' r='2' fill='rgba(255,255,255,0.5)'/></svg>"); animation: snowAnim1 2.5s linear infinite; z-index: 11; }
        .snow-layer.layer-2 { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><circle cx='50' cy='50' r='5' fill='rgba(255,255,255,0.9)'/><circle cx='200' cy='150' r='6' fill='rgba(255,255,255,0.8)'/><circle cx='250' cy='280' r='4' fill='rgba(255,255,255,0.7)'/></svg>"); animation: snowAnim2 3.5s linear infinite; z-index: 16; }
        
        @keyframes fogSweep { 0% { background-position: 200% 50%; } 100% { background-position: -100% 50%; } }
        @keyframes fogPulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.2); } }
        @keyframes rainAnim1 { from { background-position: 0 0; } to { background-position: -60px 250px; } }
        @keyframes rainAnim2 { from { background-position: 0 0; } to { background-position: -90px 400px; } }
        @keyframes snowAnim1 { from { background-position: 0 -200px; } to { background-position: -100px 200px; } }
        @keyframes snowAnim2 { from { background-position: 0 -300px; } to { background-position: -150px 300px; } }

        #tk-flare-container { display: none; position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; overflow: hidden; transition: opacity 0.2s; }
        .sunrise-weather #tk-flare-container { display: block; }
        .pf { position: absolute; background: rgba(255, 200, 100, 0.2); transform: translate(-50%, -50%); }
        .pf-1 { width: 60px; height: 60px; background: rgba(255, 150, 50, 0.15); border: 2px solid rgba(255,200,100,0.3); }
        .pf-2 { width: 30px; height: 30px; background: rgba(150, 255, 150, 0.2); }
        .pf-3 { width: 100px; height: 100px; border: 4px solid rgba(255, 100, 50, 0.1); background: transparent; }
        .pf-4 { width: 15px; height: 15px; background: rgba(255, 255, 255, 0.4); }

        #plane-container { position: absolute; left: 30%; bottom: 65px; transform: translateX(-50%); z-index: 10; pointer-events: none; width: 150px; height: 50px; will-change: transform; }
        #plane-rotate-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; z-index: 12; will-change: transform; }
        #tk-plane-img { width: 100%; height: 100%; object-fit: contain; position: relative; transition: filter 0.5s; }
        
        #plane-hud { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border-radius: 50%; border: 2px dashed #fff; display: flex; align-items: center; justify-content: center; z-index: 11; will-change: transform; }
        .hud-text { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; color: #fff; }
        .hud-label { font-size: 0.5rem; opacity: 0.8; display: block; }
        .hud-val { font-size: 1rem; display: block; }
        #hud-spd { left: -5px; top: 50%; transform: translate(-100%, -50%); }
        #hud-pitch { right: -5px; top: 50%; transform: translate(100%, -50%); }
        #hud-alt { bottom: -5px; left: 50%; transform: translate(-50%, 100%); }

        #landing-guide {
            position: absolute; top: 25px; left: 75px; transform: translate(-50%, -50%);
            width: 220px; height: 80px; border: 2px solid transparent;
            border-left: 4px solid var(--gauge-green); border-right: 4px solid var(--gauge-green);
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 5;
        }
        .guide-label { position: absolute; bottom: -20px; text-align: center; color: var(--gauge-green); font-weight: bold; font-size: 0.8rem; text-shadow: 1px 1px 2px #000; }

        #dialogue-bubble {
            position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #111; padding: 8px 14px; border-radius: 8px; font-size: 0.9rem;
            white-space: nowrap; opacity: 0; transition: opacity 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 20;
            font-weight: bold; text-transform: uppercase;
        }
        #dialogue-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent; }
        
        .capt-text { color: #111; font-weight: bold; }
        .alert-text { color: var(--brand-red); font-weight: bold; animation: pulseRed 0.8s infinite alternate; }
        .success-text { color: var(--gauge-green); font-weight: bold; }
        @keyframes pulseRed { from { color: var(--brand-red); } to { color: #ff5555; } }

        #tk-hud-top { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; }
        .top-left-controls { display: flex; gap: 10px; pointer-events: auto; }
        #tk-score-display { color: var(--brand-gold); font-size: 1rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--brand-gold);}
        
        #reset-btn { background: rgba(215, 25, 32, 0.9); border: 2px solid #fff; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        #ap-btn { background: #333; border: 2px solid #aaa; border-radius: 8px; color: #aaa; font-size: 0.9rem; cursor: pointer; padding: 0 12px; height: 40px; font-family: 'Share Tech Mono', monospace; font-weight: bold; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: auto; }
        #ap-btn:active { transform: scale(0.95); }
        
        /* Fullscreen Toggle Button */
        #fs-btn { background: #333; border: 2px solid #aaa; border-radius: 8px; color: #aaa; font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: auto; }
        #fs-btn:active { transform: scale(0.95); }

        #prompt-container { position: absolute; bottom: max(10px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none; width: 95%; max-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tk-touch-prompt { background: rgba(0, 0, 0, 0.85); border: 1px solid #fff; border-radius: 6px; padding: 8px 16px; text-align: center; color: #fff; font-size: 0.9rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: auto; text-transform: uppercase; margin-bottom: 10px;}
        
        /* Install App Button */
        #install-btn {
            background: var(--fo-blue); border: 2px solid #fff; border-radius: 6px; padding: 8px 16px; 
            color: #fff; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-family: 'Share Tech Mono', monospace;
            display: none; pointer-events: auto;
        }

        /* Traffic Planes */
        .tk-enemy, #tk-overtaker-plane { position: absolute; bottom: 65px; width: 162px; height: 56px; z-index: 9; display: none; will-change: transform; }
        .tk-enemy img { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        #tk-overtaker-plane img { width: 100%; height: 100%; object-fit: contain; } 
        #tk-overtaker-plane { left: 0; transform: translateX(-100%); }
        
        #tk-mountain { position: absolute; bottom: 65px; left: 100%; width: 220px; height: 120px; z-index: 2; display: none; transition: filter 0.5s; will-change: transform;}
        
        /* Bird Flock CSS */
        #tk-bird-flock {
            position: absolute; bottom: 65px; width: 40px; height: 30px; z-index: 9; display: none; pointer-events: none; will-change: transform;
        }
        .bird {
            position: absolute; width: 4px; height: 4px; background: #111; border-radius: 50%;
            box-shadow: 12px 6px #111, -8px 10px #111, 16px 14px #111, 6px -4px #111;
            animation: flap 0.3s infinite alternate;
        }
        @keyframes flap { 0% { transform: translateY(0px); } 100% { transform: translateY(3px); } }

        /* Hardware Accelerated Particles */
        .pixel-particle { position: absolute; z-index: 100; pointer-events: none; border-radius: 1px; left: 0; top: 0; will-change: transform, opacity; }
        .spark-particle { position: absolute; z-index: 101; pointer-events: none; width: 4px; height: 4px; border-radius: 50%; left: 0; top: 0; will-change: transform, opacity; }
        .smoke-particle { position: absolute; z-index: 100; pointer-events: none; border-radius: 50%; left: 0; top: 0; will-change: transform, opacity; }
        .score-particle { position: absolute; z-index: 102; pointer-events: none; width: 5px; height: 5px; border-radius: 50%; left: 0; top: 0; will-change: transform, opacity; }

        /* End Screen UI */
        #tk-end-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100; display: none; 
            flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; 
        }
        #tk-end-screen.visible { opacity: 1; pointer-events: auto; }
        .end-panel { 
            background: #111; border: 2px solid var(--brand-gold); border-radius: 15px; 
            padding: 30px 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 90%; max-width: 500px;
        }
        #tk-end-screen.visible .end-panel { transform: scale(1); }
        .end-title { font-size: 2rem; color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 4px #000; }
        .end-subtitle { font-size: 1rem; color: #aaa; margin-bottom: 15px; }
        .end-score { font-size: 3rem; color: var(--gauge-green); margin-bottom: 15px; font-weight: bold; text-shadow: 0 0 15px rgba(46, 204, 113, 0.5);}
        
        /* Minimap Progress Bar */
        .completion-wrapper { margin-bottom: 25px; width: 100%; }
        .completion-text { font-size: 1.1rem; color: #fff; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px;}
        #end-completion-val { color: var(--fo-blue); }
        #tk-minimap { width: 100%; height: 12px; background: #222; border-radius: 6px; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        #tk-minimap-progress { height: 100%; background: var(--fo-blue); border-radius: 6px; width: 0%; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.5s; }
        .minimap-marker { position: absolute; top: -14px; font-size: 18px; transform: translateX(-50%); z-index: 10; cursor: help; text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: transform 0.2s;}
        .minimap-marker:hover { transform: translateX(-50%) scale(1.3); }
        .minimap-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); color: #fff; padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; white-space: nowrap; pointer-events: none; border: 1px solid #555; margin-bottom: 4px; z-index: 20;}
        .minimap-marker:hover .minimap-tooltip { display: block; }
        .minimap-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -4px; border-width: 4px; border-style: solid; border-color: #555 transparent transparent transparent; }

        .reward-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; height: 50px; }
        .reward-icon { width: 50px; height: 50px; fill: #333; transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fill 0.3s; }
        .reward-icon.pop { transform: scale(1); }
        .reward-icon.golden { fill: var(--brand-gold); filter: drop-shadow(0 0 12px var(--brand-gold)); }
        .play-again-btn { 
            background: var(--brand-gold); color: #000; border: none; padding: 12px 25px; 
            font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; transition: transform 0.1s, filter 0.1s; 
        }
        .play-again-btn:active { transform: scale(0.95); filter: brightness(0.8); }

        /* Responsive Fix for Landscape Mobile Phones */
        @media screen and (max-height: 450px) {
            .end-panel { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; width: 95%; max-width: 600px;}
            .end-title { width: 100%; margin-bottom: 0; font-size: 1.3rem; }
            .end-subtitle { display: none; }
            .end-score { font-size: 1.8rem; margin: 0; width: 30%; text-align: center;}
            .completion-wrapper { width: 60%; margin: 0; display: flex; flex-direction: column; justify-content: center; }
            .completion-text { font-size: 0.9rem; margin-bottom: 10px; text-align: left;}
            .reward-icons { display: none; }
            .play-again-btn { padding: 10px 20px; font-size: 1rem; width: 100%; max-width: 200px; margin-top: 10px;}
        }
    </style>
</head>
<body>

    <div id="orientation-lock">PLEASE ROTATE DEVICE TO LANDSCAPE</div>

    <div id="takeoff-viewport">
        <div id="tk-version">v3.9 - 60 FPS GPU Lock</div>
        <div id="tk-alert-overlay"></div>
        
        <div id="tk-hud-top">
            <div class="top-left-controls">
                <button id="reset-btn" onclick="startFlight(event)">❌</button>
                <button id="ap-btn" onclick="toggleAutoPilot(event)">AUTO</button>
                <button id="fs-btn" onclick="toggleFullscreen(event)">⛶</button>
            </div>
            <div id="tk-score-display">SCORE: <span id="score-val">0</span></div>
        </div>
        
        <div id="prompt-container">
            <div id="tk-touch-prompt">TAP OR SPACE TO START</div>
            <button id="install-btn" onclick="installApp(event)">INSTALL APP</button>
        </div>
        
        <div id="camera-rig">
            <div id="tk-sun"></div>
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky_transparent.png');"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('mountain.png');"></div>
            
            <div class="weather-layer fog-layer layer-back"></div>

        <div id="tk-end-screen">
            <div class="end-panel">
                <div class="end-title" id="end-title-text">MISSION ACCOMPLISHED</div>
                <div class="end-subtitle" id="end-sub-text">SAFE EVACUATION COMPLETED</div>
                <div class="end-score" id="end-score-val">0</div>
                
                <div class="completion-wrapper">
                    <div class="completion-text">FLIGHT PROGRESS: <span id="end-completion-val">0%</span></div>
                    <div id="tk-minimap">
                        <div id="tk-minimap-progress"></div>
                        <div id="tk-minimap-markers"></div>
                    </div>
                </div>

                <div class="reward-icons">
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                </div>
                <button class="play-again-btn" onclick="startFlight(event)">PLAY AGAIN</button>

        </div>
    </div>

    <script>
        let SPEED_MOD = 0.75; 
        let playerPlaneSkin = 'my-plane.png';
        let playerNoGearSkin = 'my-plane-nolandinggear.png';

        // --- PWA INSTALLATION LOGIC ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e; 
            document.getElementById('install-btn').style.display = 'block'; 
        });

        function installApp(e) {
            e.stopPropagation(); 
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    document.getElementById('install-btn').style.display = 'none';
                });
            }
        }

        // --- FULLSCREEN LOGIC ---
        function toggleFullscreen(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen().catch(err => {}); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari Support
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            }
        }

        // --- SIMPLE HTML5 MP3 PLAYER & BASIC SFX ---
        const sfx = {
            ctx: null, alarmInterval: null, isAlarming: false,
            bgMusic: new Audio('hangar5-music.mp3'),

            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    let silentOsc = this.ctx.createOscillator();
                    let silentGain = this.ctx.createGain();
                    silentGain.gain.value = 0;
                    silentOsc.connect(silentGain);
                    silentGain.connect(this.ctx.destination);
                    silentOsc.start(0);
                    silentOsc.stop(this.ctx.currentTime + 0.1);
                    this.bgMusic.loop = true;
                    this.bgMusic.volume = 0.4;
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.bgMusic.play().catch(e => console.log("Audio blocked"));
            },
            
            playAlarm: function(active) {
                if(!this.ctx) return;
                if(active && !this.isAlarming) {
                    this.isAlarming = true;
                    this.alarmInterval = setInterval(() => {
                        try {
                            let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                            osc.type = 'square'; osc.frequency.value = 900; 
                            gain.gain.setValueAtTime(0.15, this.ctx.currentTime); 
                            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
                            osc.connect(gain); gain.connect(this.ctx.destination);
                            osc.start(); osc.stop(this.ctx.currentTime + 0.2);
                        } catch(e) {}
                    }, 300);
                } else if (!active && this.isAlarming) {
                    this.isAlarming = false; clearInterval(this.alarmInterval);
                }
            },
            playExplosion: function() {
                if(!this.ctx) return;
                try {
                    let osc = this.ctx.createOscillator(); let oscGain = this.ctx.createGain();
                    osc.type = 'square'; osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                    oscGain.gain.setValueAtTime(0.8, this.ctx.currentTime); 
                    oscGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                    osc.connect(oscGain); oscGain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + 1.5);
                } catch(e) {}
            },
            playSpark: function() {
                if(!this.ctx || Math.random() > 0.4) return; 
                try {
                    let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(2000 + Math.random()*2000, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                } catch(e) {}
            },
            playDing: function(pitchMult = 1) {
                if(!this.ctx) return;
                try {
                    let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800 * pitchMult, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.5);
                } catch(e) {}
            },
            stopAll: function() {
                this.playAlarm(false);
                try { this.bgMusic.pause(); } catch(e) {}
            }
        };

        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                sfx.stopAll();
                if (sfx.ctx && sfx.ctx.state === 'running') sfx.ctx.suspend();
            } else {
                if (tkState.active && sfx.ctx && sfx.ctx.state === 'suspended') {
                    sfx.ctx.resume();
                    sfx.bgMusic.play().catch(e=>{});
                }
            }
        });
        window.addEventListener("pagehide", function() {
            sfx.stopAll();
            if (sfx.ctx) sfx.ctx.close();
        });

        let endScreenAnimInterval = null;
        let endScreenTimeouts = [];

        let tkState = {
            active: false, phase: 0, phaseTimer: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, 
            altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, lastFrameTime: 0, 
            currTargetMin: 10, currTargetMax: 16, bgX_sky: 0, bgX_fgSky: 0, bgX_threatFog: 0, bgX_city: 0, bgX_runway: 0, 
            takeoffDist: 150, landingDist: 260, dialogueStep: 0, dialogueTimeLeft: 0, dialogueText: "", 
            weather: "day", zoom: 1.0, targetZoom: 1.0, speedMod: 0.75, autoPilot: false, canRestart: true, 
            hudPitch: 0, hudPitchVelocity: 0, hasLiftedOff: false,
            events: [], 
            hasFogScenario: false,
            hasEngineFailureScenario: false, engineFailure: false,
            hasOvertakerScenario: false, overtakerActive: false, overtakerX: -30, overtakerAltitude: 0,
            hasBirdScenario: false, birdActive: false, birdX: 150, birdAlt: 0,
            gearBroken: false, gearBreakAlt: 99999, stallFactor: 0,
            enemies: []
        };

        const CRUISE_ALT = 600; 

        setDialogue("<span class='capt-text'>TAP / SPACE TO START</span>", 999999);
        document.getElementById('dialogue-bubble').style.opacity = 1;
        document.getElementById('dialogue-bubble').innerHTML = tkState.dialogueText;

        function setDialogue(text, timeMs) {
            tkState.dialogueText = text;
            tkState.dialogueTimeLeft = timeMs;
        }

        function toggleAutoPilot(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!tkState.active || tkState.phase === 0 || tkState.phase >= 6) return; 

            tkState.autoPilot = !tkState.autoPilot;
            const btn = document.getElementById('ap-btn');
            
            if (tkState.autoPilot) {
                btn.style.background = 'var(--gauge-green)'; btn.style.borderColor = '#fff'; btn.style.color = '#000';
                btn.style.boxShadow = '0 0 15px var(--gauge-green)'; sfx.playDing(1.5); 
            } else {
                btn.style.background = '#333'; btn.style.borderColor = '#aaa'; btn.style.color = '#aaa';
                btn.style.boxShadow = '0 2px 5px rgba(0,0,0,0.5)'; sfx.playDing(0.8);
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            sfx.init(); 
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                try {
                    let elem = document.documentElement;
                    if (elem.requestFullscreen) elem.requestFullscreen().catch(e=>{});
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                } catch(e) {}
            }

            if (!tkState.active && tkState.canRestart && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight(e);
            tkState.pressing = true;
        });
        window.addEventListener('pointerup', () => tkState.pressing = false);
        window.addEventListener('touchend', () => tkState.pressing = false);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); 
                if (e.repeat) return; 
                sfx.init(); 
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    try { document.documentElement.requestFullscreen().catch(e=>{}); } catch(e) {}
                }
                if (!tkState.active && tkState.canRestart && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight(e);
                tkState.pressing = true;
            }
            if (e.code === 'Enter' || e.key === 'Enter') {
                e.preventDefault(); if (e.repeat) return; toggleAutoPilot(e);
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); tkState.pressing = false; }
        });

        // --- PROGRESS AND EVENT LOGGING ---
        function getCompletionPercentage() {
            let pct = 0;
            if (tkState.phase === 0) pct = Math.min(10, (tkState.speed / 150) * 10);
            else if (tkState.phase === 1) pct = 10 + Math.min(20, (tkState.altitude / CRUISE_ALT) * 20);
            else if (tkState.phase === 2) pct = 30 + Math.min(20, (tkState.phaseTimer / 8000) * 20);
            else if (tkState.phase === 3) pct = 50 + Math.min(20, (tkState.phaseTimer / 12000) * 20);
            else if (tkState.phase === 4) pct = 70 + Math.min(10, (tkState.phaseTimer / 5000) * 10);
            else if (tkState.phase === 5) pct = 80 + Math.max(0, Math.min(15, ((CRUISE_ALT - tkState.altitude) / CRUISE_ALT) * 15));
            else if (tkState.phase === 6) pct = 95 + Math.min(5, ((150 - tkState.speed) / 150) * 5);
            return Math.max(0, Math.min(100, pct));
        }

        function logEvent(name, icon) {
            tkState.events.push({ name: name, icon: icon, percent: getCompletionPercentage() });
        }

        // --- END SCREEN LOGIC ---
        function showEndScreen(finalScore, isSuccess) {
            let es = document.getElementById('tk-end-screen');
            let title = document.getElementById('end-title-text');
            let sub = document.getElementById('end-sub-text');
            let scoreEl = document.getElementById('end-score-val');
            
            if (isSuccess) {
                title.textContent = "MISSION ACCOMPLISHED";
                title.style.color = "#fff";
                sub.textContent = "SAFE EVACUATION COMPLETED";
                scoreEl.style.color = "var(--gauge-green)";
                scoreEl.style.textShadow = "0 0 15px rgba(46, 204, 113, 0.5)";
            } else {
                title.textContent = "MISSION FAILED";
                title.style.color = "var(--brand-red)";
                sub.textContent = "FLIGHT RECORDER RECOVERED";
                scoreEl.style.color = "var(--brand-red)";
                scoreEl.style.textShadow = "0 0 15px rgba(215, 25, 32, 0.5)";
            }

            es.style.display = 'flex';
            setTimeout(() => { es.classList.add('visible'); }, 50);

            // Populate Minimap
            let finalPct = isSuccess ? 100 : getCompletionPercentage();
            let markersHtml = '';
            tkState.events.forEach(ev => {
                markersHtml += `<div class="minimap-marker" style="left: ${ev.percent}%">${ev.icon}<div class="minimap-tooltip">${ev.name}</div></div>`;
            });
            document.getElementById('tk-minimap-markers').innerHTML = markersHtml;

            setTimeout(() => {
                document.getElementById('tk-minimap-progress').style.width = finalPct + '%';
                document.getElementById('tk-minimap-progress').style.backgroundColor = isSuccess ? 'var(--gauge-green)' : 'var(--brand-red)';
                document.getElementById('end-completion-val').style.color = isSuccess ? 'var(--gauge-green)' : 'var(--brand-red)';
            }, 300);

            let icons = document.querySelectorAll('.reward-icon');
            icons.forEach(i => { i.classList.remove('pop', 'golden'); i.style.fill = '#333'; i.style.filter = 'none'; });
            
            let targetPlanes = 1; 
            if (finalScore > 2000) targetPlanes = 2; 
            if (finalScore > 3500) targetPlanes = 3; 

            let cur = 0; let step = Math.max(1, Math.ceil(finalScore / 40));
            let curPct = 0; let pctStep = Math.max(1, finalPct / 40);
            let pctEl = document.getElementById('end-completion-val');

            clearInterval(endScreenAnimInterval);
            endScreenAnimInterval = setInterval(() => {
                cur += step;
                if(cur >= finalScore) { cur = finalScore; clearInterval(endScreenAnimInterval); if(isSuccess) popGoldenPlanes(targetPlanes); }
                scoreEl.textContent = cur;
                
                curPct += pctStep;
                if(curPct >= finalPct) curPct = finalPct;
                pctEl.textContent = Math.floor(curPct) + '%';
            }, 20);
        }

        function popGoldenPlanes(count) {
            let icons = document.querySelectorAll('.reward-icon');
            for(let i=0; i<3; i++) {
                let t = setTimeout(() => {
                    icons[i].classList.add('pop');
                    if(i < count) {
                        icons[i].classList.add('golden'); sfx.playDing(1 + (i * 0.2)); 
                        confetti({ particleCount: 80, spread: 80, origin: { y: 0.6 }, zIndex: 200 });
                    } else { sfx.playDing(0.6); }
                }, i * 500);
                endScreenTimeouts.push(t);
            }
        }

        function triggerCrash(reasonText) {
            sfx.stopAll();
            const r = document.getElementById('tk-plane-img').getBoundingClientRect();
            triggerEpicCollision(r.left + r.width/2, r.top + r.height/2);
            document.getElementById('plane-container').style.display = 'none';
            tkState.active = false;
            logEvent(`CRASH: ${reasonText}`, '❌');
            setDialogue(`<span class='alert-text'>${reasonText}</span>`, 4500);
            
            setTimeout(() => { 
                showEndScreen(Math.floor(tkState.score), false); 
                tkState.canRestart = true; 
            }, 2500); 
        }

        function startFlight(e) {
            if (e) e.stopPropagation();
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            clearInterval(endScreenAnimInterval);
            endScreenTimeouts.forEach(t => clearTimeout(t)); endScreenTimeouts = [];
            document.querySelectorAll('.pixel-particle, .spark-particle, .smoke-particle, .score-particle').forEach(p => p.remove());
            
            let es = document.getElementById('tk-end-screen');
            es.classList.remove('visible'); setTimeout(() => { es.style.display = 'none'; }, 300); 

            // Reset Minimap UI
            document.getElementById('tk-minimap-progress').style.width = '0%';
            document.getElementById('tk-minimap-markers').innerHTML = '';
            document.getElementById('end-completion-val').textContent = '0%';
            document.getElementById('end-completion-val').style.color = 'var(--fo-blue)';

            const apBtn = document.getElementById('ap-btn');
            apBtn.style.background = '#333'; apBtn.style.borderColor = '#aaa'; apBtn.style.color = '#aaa'; apBtn.style.boxShadow = '0 2px 5px rgba(0,0,0,0.5)';

            document.getElementById('tk-plane-img').src = playerPlaneSkin;
            
            let rand = Math.random();
            let weather = 'day';
            let vp = document.getElementById('takeoff-viewport');
            vp.classList.remove('night-weather', 'sunrise-weather', 'snow-weather', 'fog-scenario');
            vp.style.backgroundColor = ''; 
            
            if (rand > 0.75) { weather = 'night'; vp.classList.add('night-weather'); } 
            else if (rand > 0.5) { weather = 'snow'; vp.classList.add('snow-weather'); } 
            else if (rand > 0.25) { weather = 'sunrise'; vp.classList.add('sunrise-weather'); }

            tkState = {
                active: true, phase: 0, phaseTimer: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, altitude: 0, cameraY: 0, score: 0, 
                pressing: false, frameId: null, lastFrameTime: 0, 
                currTargetMin: 10, currTargetMax: 16, bgX_sky: 0, bgX_fgSky: 0, bgX_threatFog: 0, bgX_city: 0, bgX_runway: 0, takeoffDist: 150, landingDist: 260, 
                dialogueStep: 0, dialogueTimeLeft: 0, dialogueText: "", zoom: 1.0, speedMod: 0.75, autoPilot: false, weather: weather, canRestart: false,
                hudPitch: 0, hudPitchVelocity: 0, 
                hasLiftedOff: false,
                events: [],
                hasFogScenario: Math.random() < 0.25,
                hasEngineFailureScenario: Math.random() > 0.5, engineFailure: false,
                hasOvertakerScenario: Math.random() > 0.5, overtakerActive: false, overtakerX: -30, overtakerAltitude: 0,
                hasBirdScenario: Math.random() < 0.25, birdActive: false, birdX: 150, birdAlt: 0,
                gearBroken: false, gearBreakAlt: Math.random() > 0.5 ? (Math.random() * (CRUISE_ALT - 200) + 100) : 99999, 
                stallFactor: 0,
                enemies: [
                    {active: false, x: 150, alt: 0, spd: 0}, {active: false, x: 150, alt: 0, spd: 0},
                    {active: false, x: 150, alt: 0, spd: 0}, {active: false, x: 150, alt: 0, spd: 0}, {active: false, x: 150, alt: 0, spd: 0}
                ]
            };
            SPEED_MOD = 0.75; 
            
            if (tkState.hasFogScenario) {
                vp.classList.add('fog-scenario');
                setDialogue("<span class='alert-text'>HEAVY FOG AHEAD!</span>", 4000);
            } else {
                setDialogue("<span class='capt-text'>FULL POWER!</span>", 3000);
            }

            document.getElementById('prompt-container').style.display = 'none';
            document.getElementById('plane-container').style.display = 'block';
            document.querySelectorAll('.tk-enemy').forEach(el => el.style.display = 'none');
            document.getElementById('tk-overtaker-plane').style.display = 'none';
            document.getElementById('tk-bird-flock').style.display = 'none';
            document.getElementById('tk-mountain').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('score-val').textContent = '0';
            document.getElementById('camera-rig').style.transform = `scale(1)`;

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        // --- HARDWARE ACCELERATED PARTICLES ---
        function spawnSmoke(x, y) {
            let p = document.createElement('div'); p.className = 'smoke-particle';
            let gray = Math.floor(Math.random() * 80) + 20; p.style.backgroundColor = `rgba(${gray}, ${gray}, ${gray}, 0.8)`;
            
            let size = Math.random() * 8 + 4; 
            p.style.width = size + 'px'; p.style.height = size + 'px'; 
            
            let curX = x, curY = y;
            p.style.transform = `translate3d(${curX}px, ${curY}px, 0) scale(1)`;
            document.getElementById('camera-rig').appendChild(p);
            
            let speedFactor = Math.max(1, tkState.speed / 100);
            let vx = -(Math.random() * 6 + 4) * SPEED_MOD * speedFactor; let vy = (Math.random() * 2 - 1) * SPEED_MOD;
            let age = 0; let maxAge = Math.random() * 40 + 20;
            let currentScale = 1;
            
            function move() {
                age++; vx *= 0.98; vy -= 0.1; currentScale += 0.05; 
                curX += vx; curY += vy;
                p.style.transform = `translate3d(${curX}px, ${curY}px, 0) scale(${currentScale})`;
                p.style.opacity = 0.8 * (1 - (age / maxAge));
                if(age < maxAge) requestAnimationFrame(move); else p.remove();
            } move();
        }

            p.style.backgroundColor = '#cfa86e'; p.style.boxShadow = `0 0 8px #cfa86e`;

            let vx = -(Math.random() * 4 + 4) * SPEED_MOD * speedFactor; let vy = (Math.random() * 2 - 1) * SPEED_MOD;
            let age = 0; let maxAge = Math.random() * 20 + 15;
            
            function move() {
                age++; vx *= 0.95; vy -= 0.1;

        function triggerGearExplosion(x, y) {

            const colors = ['#fff', '#ffaa00', '#d71920', '#333', '#111'];
            for(let i=0; i<25; i++) {

                let vx = Math.cos(a)*v - 5; let vy = Math.sin(a)*v + 2; let age = 0;
                function move() {

                    curX += vx; curY += vy;

        function spawnSpark(x, y, isMidAir) {
            sfx.playSpark();
            let p = document.createElement('div'); p.className = 'spark-particle'; p.style.backgroundColor = Math.random() > 0.4 ? '#ffaa00' : '#ff3300';
            
            if (isMidAir) { p.style.width = '5px'; p.style.height = '5px'; }
            
            let curX = x, curY = y;
            p.style.transform = `translate3d(${curX}px, ${curY}px, 0)`;
            document.getElementById('camera-rig').appendChild(p);
            
            let speedFactor = isMidAir ? 1 : (tkState.speed / 100); let vx = isMidAir ? -(Math.random() * 5 + 2) * SPEED_MOD : -(Math.random() * 14 + 5) * SPEED_MOD * speedFactor; 
            let vy = isMidAir ? (Math.random() * 4 + 2) * SPEED_MOD : -(Math.random() * 3) * SPEED_MOD * speedFactor; let age = 0;
            
            function move() { 
                age++; vx *= 0.95; vy += (0.5 * SPEED_MOD); 
                curX += vx; curY += vy;
                p.style.transform = `translate3d(${curX}px, ${curY}px, 0)`;
                p.style.opacity = 1 - (age / (isMidAir ? 30 : 15)); 
                if(age < (isMidAir ? 30 : 15)) requestAnimationFrame(move); else p.remove(); 
            } move();
        }

        function triggerEpicCollision(x, y) {
            sfx.playExplosion(); const vp = document.getElementById('takeoff-viewport');
            vp.style.backgroundColor = "#ffffff";
            setTimeout(() => { 
                if (tkState.weather === 'night') vp.style.backgroundColor = "#0b1021"; else if (tkState.weather === 'sunrise') vp.style.backgroundColor = "#ff9e7a";
                else if (tkState.weather === 'snow') vp.style.backgroundColor = "#b8c6d9"; else vp.style.backgroundColor = "#87CEEB";
            }, 150);
            
            let shakeAmount = 35;
            function applyShake() {
                if (shakeAmount > 0.5) {
                    vp.style.transform = `translate3d(${(Math.random() - 0.5) * shakeAmount}px, ${(Math.random() - 0.5) * shakeAmount}px, 0)`;
                    shakeAmount *= 0.85; requestAnimationFrame(applyShake);
                } else { vp.style.transform = `translate3d(0, 0, 0)`; }
            } applyShake();
            
            const colors = ['#ffffff', '#ffffff', '#ffea00', '#ff5500', '#d71920', '#333333', '#111111'];
            for(let i=0; i<80; i++) { 
                let p = document.createElement('div'); p.className = 'pixel-particle'; p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)]; 
                
                let size = Math.random() * 6 + 2; p.style.width = size + 'px'; p.style.height = size + 'px'; 
                
                let curX = x, curY = y;
                p.style.transform = `translate3d(${curX}px, ${curY}px, 0)`;
                document.getElementById('camera-rig').appendChild(p);
                
                let a = Math.random() * 6.28; let v = (Math.random() * 40 + 5) * 0.75; let vx = Math.cos(a) * v; let vy = Math.sin(a) * v;
                let age = 0; let maxAge = Math.random() * 60 + 40; 
                function move() {
                    let timeScale = age < 2 ? 1.0 : (age < 6 ? 0.3 : 0.05); age += timeScale; vx *= Math.pow(0.92, timeScale); vy += (0.3 * 0.75) * timeScale; 
                    curX += (vx * timeScale); curY += (vy * timeScale);
                    p.style.transform = `translate3d(${curX}px, ${curY}px, 0)`;
                    p.style.opacity = 1 - (age / maxAge);
                    if(age < maxAge) requestAnimationFrame(move); else p.remove();
                } move();
            }
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            
            // STRICT 60 FPS LOCK (16.66ms per frame)
            if (tkState.lastFrameTime === 0) tkState.lastFrameTime = timestamp;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 16.66) { 
                tkState.frameId = requestAnimationFrame(gameLoop); 
                return; 
            }
            // Math adjustment to prevent time-drift
            tkState.lastFrameTime = timestamp - (delta % 16.66);

            tkState.phaseTimer += delta;

            const hudRing = document.getElementById('plane-hud');
            sfx.playAlarm((tkState.pitch >= 24.2 && tkState.altitude > 10) || tkState.phase === 3);

            let isLandingApproach = (tkState.phase === 5 && tkState.altitude <= 70 && tkState.altitude > 0);
            let targetSpeedMod = isLandingApproach ? 0.25 : 0.75; 
            let targetZoom = isLandingApproach ? 1.8 : 1.0;

            tkState.speedMod += (targetSpeedMod - tkState.speedMod) * 0.1;
            tkState.zoom += (targetZoom - tkState.zoom) * 0.05;
            SPEED_MOD = tkState.speedMod; 
            document.getElementById('camera-rig').style.transform = `scale(${tkState.zoom})`;

            let guide = document.getElementById('landing-guide');
            if (isLandingApproach) {
                guide.style.opacity = 1;
                let isSafe = (tkState.pitch >= -5 && tkState.pitch <= 15);
                let guideColor = isSafe ? '#2ecc71' : '#d71920';
                guide.style.borderLeftColor = guideColor; guide.style.borderRightColor = guideColor; guide.querySelector('.guide-label').style.color = guideColor;
            } else { guide.style.opacity = 0; }

            if (tkState.weather === 'sunrise') {
                const sun = document.getElementById('tk-sun'); const flareCont = document.getElementById('tk-flare-container'); const sunRect = sun.getBoundingClientRect();
                let sx = sunRect.left + sunRect.width / 2; let sy = sunRect.top + sunRect.height / 2;
                let cx = window.innerWidth / 2; let cy = window.innerHeight / 2; let dx = cx - sx; let dy = cy - sy;
                document.getElementById('pf1').style.transform = `translate3d(${sx + dx * 1.4}px, ${sy + dy * 1.4}px, 0)`;
                document.getElementById('pf2').style.transform = `translate3d(${sx + dx * 0.6}px, ${sy + dy * 0.6}px, 0)`;
                document.getElementById('pf3').style.transform = `translate3d(${sx + dx * 1.8}px, ${sy + dy * 1.8}px, 0)`;
                document.getElementById('pf4').style.transform = `translate3d(${sx + dx * 2.2}px, ${sy + dy * 2.2}px, 0)`;
                flareCont.style.opacity = Math.max(0, Math.min(1, (window.innerHeight - 100 - sy) / 100));
            }

            const bubble = document.getElementById('dialogue-bubble');
            if (tkState.dialogueTimeLeft > 0) {
                tkState.dialogueTimeLeft -= delta; bubble.innerHTML = tkState.dialogueText; bubble.style.opacity = 1;
            } else { bubble.style.opacity = 0; }

            // SPEED ENGINE
            let inHUDZone = (tkState.pitch >= tkState.currTargetMin && tkState.pitch <= tkState.currTargetMax);
            if (tkState.phase < 6) {
                let accel = (tkState.phase === 5) ? -1.6 : (tkState.phase === 0 ? 0.8 : 1.5); 
                accel *= SPEED_MOD;
                if (!inHUDZone && tkState.phase > 0) accel *= 0.3;
                if (tkState.pitch > 0) accel -= (tkState.pitch * 0.04 * SPEED_MOD);
                if (tkState.pitch < 0) accel += (Math.abs(tkState.pitch) * 0.03 * SPEED_MOD);
                tkState.speed = Math.max((tkState.phase === 0 ? 0 : 85), Math.min(240, tkState.speed + accel));
            } else {
                tkState.speed = Math.max(0, tkState.speed - (1.3 * SPEED_MOD));
                if (tkState.speed <= 0) { 
                    tkState.active = false; 
                    logEvent("SAFE LANDING", '🏁');
                    setDialogue("<span class='success-text'>SAFE! EVACUATE!</span>", 5000); 
                    sfx.stopAll(); 
                    setTimeout(() => { showEndScreen(Math.floor(tkState.score), true); tkState.canRestart = true; }, 1500); 
                    return; 
                }
            }

            let spdHue = 0;
            if (tkState.phase < 2) spdHue = (tkState.speed >= 150) ? 120 : 0;
            else if (tkState.phase === 5) spdHue = (tkState.speed <= 160) ? 120 : 0; 
            else spdHue = (tkState.speed > 130) ? 120 : 0;
            document.getElementById('hud-spd').style.color = `hsl(${spdHue}, 85%, 55%)`;
            document.getElementById('hud-spd-val').textContent = Math.floor(tkState.speed);

            // PITCH & PHYSICS
            if (tkState.phase === 0 && tkState.speed < 150) { tkState.pitch = 0; tkState.pitchVelocity = 0; }
            else if (tkState.phase === 6) { tkState.pitch += (0 - tkState.pitch) * 0.1; tkState.pitchVelocity = 0; } 
            else if (tkState.autoPilot) { tkState.pitchVelocity *= 0.5; tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity)); } 
            else {
                if (tkState.pressing && tkState.speed >= 85) tkState.pitchVelocity += (0.11 * SPEED_MOD);
                else if (tkState.speed >= 85) tkState.pitchVelocity -= (0.08 * SPEED_MOD);
                if (tkState.engineFailure && tkState.phase < 6) { tkState.pitchVelocity += (Math.random() - 0.5) * 0.35 * SPEED_MOD; }
                tkState.pitchVelocity *= 0.88; tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));
            }

            tkState.hudPitchVelocity += (tkState.pitch - tkState.hudPitch) * 0.1; 
            tkState.hudPitchVelocity *= 0.8; tkState.hudPitch += tkState.hudPitchVelocity;

            let isStalling = (tkState.pitch >= 24.2 && tkState.altitude > 10);
            let isTooFast = (tkState.phase === 5 && tkState.speed > 145 && tkState.altitude > 0);
            let isTooHigh = (tkState.altitude > 1500 && tkState.phase >= 1 && tkState.phase <= 4);
            
            tkState.stallFactor = isStalling ? Math.min(1.0, tkState.stallFactor + 0.015) : Math.max(0.0, tkState.stallFactor - 0.05);
            let targetVSpeed = tkState.pitch * 0.55 * SPEED_MOD;
            if (tkState.stallFactor > 0) targetVSpeed = (targetVSpeed * (1 - tkState.stallFactor)) + (-15 * Math.pow(tkState.stallFactor, 2) * SPEED_MOD);
            
            if (isStalling) { 
                document.getElementById('tk-alert-overlay').className = 'flashing'; setDialogue("<span class='alert-text'>STALL WARNING!</span>", 500); if(tkState.autoPilot) toggleAutoPilot();
            } else if (isTooFast) {
                document.getElementById('tk-alert-overlay').className = 'flashing'; if (tkState.dialogueTimeLeft <= 0) setDialogue("<span class='alert-text'>CHECK LANDING SPEED!</span>", 500);
            } else if (isTooHigh) {
                document.getElementById('tk-alert-overlay').className = 'flashing'; if (tkState.dialogueTimeLeft <= 0) setDialogue("<span class='alert-text'>DESCEND! LOW VISIBILITY!</span>", 500); if(tkState.autoPilot) toggleAutoPilot();
            } else if (tkState.phase !== 3 && tkState.dialogueText !== "<span class='alert-text'>ENGINE FAILURE!</span>" && tkState.dialogueText !== "<span class='alert-text'>TRAFFIC BEHIND!</span>" && tkState.dialogueText !== "<span class='alert-text'>BIRDS AHEAD!</span>" && tkState.dialogueText !== "<span class='alert-text'>HEAVY FOG AHEAD!</span>") {
                document.getElementById('tk-alert-overlay').className = '';
            }

            tkState.vSpeed += (targetVSpeed - tkState.vSpeed) * 0.12;
            if (tkState.altitude <= 0 && tkState.pitch < 0) { tkState.pitch = 0; tkState.pitchVelocity = 0; }
            if (tkState.phase !== 6) tkState.altitude = Math.max(0, tkState.altitude + tkState.vSpeed);

            if (tkState.altitude > 0 && !tkState.hasLiftedOff) {
                tkState.hasLiftedOff = true;
                logEvent("LIFTOFF", "🛫");
            }

            // HUD UPDATES
            document.getElementById('hud-alt-val').textContent = Math.floor(tkState.altitude) + 'm';
            document.getElementById('hud-pitch-val').innerHTML = Math.floor(tkState.pitch) + '&deg;';
            let center = (tkState.currTargetMin + tkState.currTargetMax) / 2; let error = Math.abs(tkState.pitch - center);
            let p_hue = inHUDZone ? 120 : Math.max(0, 120 - error * 9);
            if (isStalling) p_hue = 0;
            let dynColor = `hsl(${p_hue}, 85%, 55%)`; hudRing.style.borderColor = dynColor; document.getElementById('hud-pitch').style.color = dynColor;
            
            const scoreValEl = document.getElementById('score-val');
            if (inHUDZone && tkState.phase > 0 && tkState.phase < 6) {
                tkState.score += tkState.autoPilot ? 10 : 4; scoreValEl.style.color = tkState.autoPilot ? '#cfa86e' : '#fff';
                if (Math.random() > 0.4) {
                    const pr = document.getElementById('tk-plane-img').getBoundingClientRect();
                    spawnScoreParticle(pr.left + pr.width / 2, pr.top + pr.height / 2, tkState.pitch);
                }
            } else { scoreValEl.style.color = '#fff'; }
            scoreValEl.textContent = Math.floor(tkState.score);

            // FATAL IMPACT CHECKS WITH REASONS
            if (tkState.altitude <= 0 && tkState.hasLiftedOff) {
                if (tkState.phase < 5) return triggerCrash("CRASHED INTO TERRAIN!");
                else if (tkState.phase === 5) {
                    let badAngle = (isStalling || tkState.pitch < -5 || tkState.pitch > 15);
                    let hotLanding = (tkState.speed > 160);
                    
                    if (badAngle && hotLanding) return triggerCrash("TOO FAST & BAD ANGLE!");
                    if (badAngle) return triggerCrash("FATAL ANGLE!");
                    if (hotLanding) return triggerCrash("TOO FAST!");
                }
            }

            // TIME-BASED PHASE LOGIC
            if (tkState.phase === 0 && tkState.speed >= 150) { 
                tkState.phase = 1; tkState.phaseTimer = 0;
                setDialogue("<span class='capt-text'>V1! PULL UP!</span>", 3000); 
            }
            
            // Random Gear Break (Climb)
            if (tkState.phase === 1 && tkState.altitude >= tkState.gearBreakAlt && !tkState.gearBroken) {
                tkState.gearBroken = true; sfx.playExplosion(); setDialogue("<span class='alert-text'>GEAR SNAP!</span>", 3000);
                logEvent("GEAR SNAP", "⚙️");
                const pr = document.getElementById('tk-plane-img').getBoundingClientRect(); triggerGearExplosion(pr.left + pr.width/2, pr.bottom - 10);
            }
            if (tkState.gearBroken && document.getElementById('tk-plane-img').src.indexOf('nolandinggear') === -1) { document.getElementById('tk-plane-img').src = 'my-plane-nolandinggear.png'; }

            if (tkState.phase === 1 && tkState.altitude >= CRUISE_ALT) { 
                tkState.phase = 2; tkState.phaseTimer = 0;
                tkState.currTargetMin = -3; tkState.currTargetMax = 3; 
                setDialogue("<span class='capt-text'>LEVEL OFF</span>", 3000); 
            }

            // Overtaker Scenario (Climb/Level)
            if (tkState.phase >= 1 && tkState.phase <= 2 && tkState.hasOvertakerScenario && !tkState.overtakerActive && tkState.altitude > 200 && tkState.overtakerX === -30 && Math.random() < 0.005) {
                tkState.overtakerActive = true; tkState.overtakerAltitude = tkState.altitude;
                logEvent("TRAFFIC BEHIND", "⚠️");
                setDialogue("<span class='alert-text'>TRAFFIC BEHIND!</span>", 3000); document.getElementById('tk-overtaker-plane').style.display = 'block';
            }
            if (tkState.overtakerActive) {
                tkState.overtakerX += (0.6 * SPEED_MOD); let gp = document.getElementById('tk-overtaker-plane');
                gp.style.transform = `translate3d(${tkState.overtakerX}%, ${-(tkState.overtakerAltitude - tkState.cameraY)}px, 0)`;
                
                const pr = document.getElementById('tk-plane-img').getBoundingClientRect(); 
                const gr = gp.getBoundingClientRect();
                if (!( (pr.right - 12) < (gr.left + 15) || 
                       (pr.left + 12) > (gr.right - 15) || 
                       (pr.bottom - 12) < (gr.top + 25) || 
                       (pr.top + 25) > (gr.bottom - 10) )) {
                    return triggerCrash("MID-AIR CRASH!");
                }
                
                if (tkState.overtakerX > 150) { tkState.overtakerActive = false; gp.style.display = 'none'; }
            }

            // Bird Flock Scenario (Climb/Level)
            if (tkState.hasBirdScenario && !tkState.birdActive && tkState.altitude > 250 && tkState.phase < 4 && tkState.birdX === 150 && Math.random() < 0.005) {
                tkState.birdActive = true; tkState.birdAlt = tkState.altitude + (Math.random() * 60 - 30);
                logEvent("BIRD FLOCK", "🦅");
                document.getElementById('tk-bird-flock').style.display = 'block';
                setDialogue("<span class='alert-text'>BIRDS AHEAD!</span>", 2000);
            }
            if (tkState.birdActive) {
                tkState.birdX -= (1.1 * SPEED_MOD); 
                let bEl = document.getElementById('tk-bird-flock');
                bEl.style.transform = `translate3d(${tkState.birdX}%, ${-(tkState.birdAlt - tkState.cameraY)}px, 0)`;
                
                const pr = document.getElementById('tk-plane-img').getBoundingClientRect(); 
                const br = bEl.getBoundingClientRect();
                if (!( (pr.right - 10) < (br.left + 10) || 
                       (pr.left + 10) > (br.right - 10) || 
                       (pr.bottom - 10) < (br.top + 10) || 
                       (pr.top + 25) > (br.bottom - 10) )) { 
                    return triggerCrash("BIRD STRIKE!");
                }
                if (tkState.birdX < -20) { tkState.birdActive = false; bEl.style.display = 'none'; }
            }

            // Engine Failure 
            if (tkState.phase === 2 && tkState.phaseTimer > 3000 && tkState.hasEngineFailureScenario && !tkState.engineFailure) {
                tkState.engineFailure = true; 
                logEvent("ENGINE FAILURE", "🔥");
                setDialogue("<span class='alert-text'>ENGINE FAILURE!</span>", 4000); sfx.playExplosion();
                document.getElementById('tk-alert-overlay').className = 'flashing'; 
                setTimeout(() => { document.getElementById('tk-alert-overlay').className = ''; }, 800);
            }

            // Swarm Traffic Phase Trigger
            if (tkState.phase === 2 && tkState.phaseTimer > 8000) {
                tkState.phase = 3; tkState.phaseTimer = 0;
                tkState.currTargetMin = -24; tkState.currTargetMax = -12;
                logEvent("TRAFFIC SWARM", "✈️");
                setDialogue("<span class='alert-text'>TRAFFIC SWARM! DIVE!</span>", 4000);
                document.getElementById('tk-alert-overlay').className = 'flashing';
                setTimeout(() => { document.getElementById('tk-alert-overlay').className = ''; }, 800); 
                if(tkState.autoPilot) toggleAutoPilot();
            }

            // Phase 3: The Swarm
            if (tkState.phase === 3) {
                let maxEnemies = Math.min(5, Math.floor(1 + (tkState.phaseTimer / 12000) * 4));
                if (tkState.phaseTimer > 12000) maxEnemies = 0; 
                
                let activeCount = tkState.enemies.filter(e => e.active).length;
                if (activeCount < maxEnemies && Math.random() < 0.04) {
                    let slotIdx = tkState.enemies.findIndex(e => !e.active);
                    if (slotIdx !== -1) {
                        let e = tkState.enemies[slotIdx];
                        e.active = true; e.x = 150;
                        e.alt = tkState.altitude + (Math.random() * 160 - 80); 
                        e.spd = (0.96 + Math.random() * 0.72) * SPEED_MOD; 
                        document.getElementById('enemy-' + slotIdx).style.display = 'block';
                    }
                }

                let collision = false;
                const pr = document.getElementById('tk-plane-img').getBoundingClientRect();
                tkState.enemies.forEach((e, i) => {
                    if (e.active) {
                        e.x -= e.spd;
                        let el = document.getElementById('enemy-' + i);
                        el.style.transform = `translate3d(${e.x}%, ${-(e.alt - tkState.cameraY)}px, 0)`;
                        
                        const er = el.getBoundingClientRect();
                        if (!( (pr.right - 12) < (er.left + 15) || 
                               (pr.left + 12) > (er.right - 15) || 
                               (pr.bottom - 12) < (er.top + 25) || 
                               (pr.top + 25) > (er.bottom - 10) )) {
                            collision = true;
                        }
                        
                        if (e.x < -30) { e.active = false; el.style.display = 'none'; }
                    }
                });

                if (collision) return triggerCrash("MID-AIR CRASH!");

                if (tkState.phaseTimer > 12000 && activeCount === 0) {
                    tkState.phase = 4; tkState.phaseTimer = 0;
                    tkState.currTargetMin = -3; tkState.currTargetMax = 3;
                    setDialogue("<span class='success-text'>CLEAR! LEVEL OFF</span>", 3000);
                    document.getElementById('tk-alert-overlay').className = '';
                }
            }

            // Descent & Guaranteed Gear Break
            if (tkState.phase === 4 && tkState.phaseTimer > 5000) { 
                tkState.phase = 5; tkState.phaseTimer = 0;
                tkState.currTargetMin = -8; tkState.currTargetMax = -2; 
                if (!tkState.gearBroken) {
                    tkState.gearBroken = true; sfx.playExplosion(); 
                    logEvent("GEAR LOST", "⚙️");
                    setDialogue("<span class='alert-text'>GEAR LOST! LAND NOW!</span>", 4000);
                    const pr = document.getElementById('tk-plane-img').getBoundingClientRect(); triggerGearExplosion(pr.left + pr.width/2, pr.bottom - 10);
                } else {
                    setDialogue("<span class='alert-text'>DESCEND FOR BELLY LANDING!</span>", 4000);
                }
                if(tkState.autoPilot) toggleAutoPilot();
            }
            
            if (tkState.phase === 5 && tkState.altitude <= 0) {
                 tkState.phase = 6; tkState.altitude = 0; tkState.vSpeed = 0; 
                 setDialogue("<span class='alert-text'>BRAKES ON!</span>", 3000);
                 if(tkState.autoPilot) toggleAutoPilot();
            }

            // CAMERA LOGIC & SCROLLING
            tkState.bgX_sky -= (tkState.speed * 0.006 * SPEED_MOD);
            tkState.bgX_fgSky -= (tkState.speed * 0.012 * SPEED_MOD); 
            tkState.bgX_city -= (tkState.speed * 0.03 * SPEED_MOD);
            tkState.bgX_runway -= (tkState.speed * 0.18 * SPEED_MOD);
            
            document.getElementById('tk-bg-sky').style.backgroundPosition = `${tkState.bgX_sky}px 10%`;
            document.getElementById('tk-fg-sky').style.backgroundPosition = `${tkState.bgX_fgSky}px 20%`;
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgX_city}px bottom`;
            document.getElementById('tk-runway-stripes').style.backgroundPosition = `${tkState.bgX_runway}px 10px`;

            if (tkState.hasFogScenario) {
                tkState.bgX_threatFog -= (tkState.speed * 0.025 * SPEED_MOD);
                document.getElementById('tk-threat-fog').style.backgroundPosition = `${tkState.bgX_threatFog}px 50%`;
            }

            let maxVisualAltitude = Math.min(60, window.innerHeight * 0.15);
            let baseTargetCam = Math.max(0, tkState.altitude - maxVisualAltitude);
            if (isLandingApproach) baseTargetCam -= 20; 
            tkState.cameraY += (baseTargetCam - tkState.cameraY) * 0.15;

            let fgSkyOpacity = Math.max(0, Math.min(1, (tkState.altitude - 650) / 100));
            document.getElementById('tk-fg-sky').style.opacity = fgSkyOpacity;

            // Apply Hardware Accelerated Transforms
            document.getElementById('tk-runway').style.transform = `translate3d(0, ${tkState.cameraY}px, 0)`;
            document.getElementById('tk-bg-city').style.transform = `translate3d(0, ${tkState.cameraY * 0.7}px, 0)`;
            document.getElementById('tk-bg-sky').style.transform = `translate3d(0, ${tkState.cameraY * 0.2}px, 0)`;
            document.getElementById('tk-fg-sky').style.transform = `translate3d(0, ${tkState.cameraY * 0.3}px, 0)`;
            document.getElementById('tk-mountain').style.transform = `translate3d(0, ${tkState.cameraY}px, 0)`;
            document.getElementById('tk-sun').style.transform = `translate3d(0, ${tkState.cameraY * 0.2}px, 0)`;

            if (tkState.hasFogScenario) {
                document.getElementById('tk-threat-fog').style.transform = `translate3d(0, ${tkState.cameraY * 0.45}px, 0)`;
            }

            let planeY = -(tkState.altitude - tkState.cameraY);
            document.getElementById('plane-container').style.transform = `translate3d(-50%, ${planeY}px, 0)`;
            document.getElementById('plane-rotate-group').style.transform = `rotate(${-tkState.pitch}deg)`;
            document.getElementById('plane-hud').style.transform = `translate3d(-50%, -50%, 0) rotate(${-tkState.hudPitch}deg)`;

            // EFFECTS
            const pr = document.getElementById('tk-plane-img').getBoundingClientRect();
            if (tkState.phase === 5 && Math.random() > 0.4) spawnSpark(pr.left + pr.width/2 - 10, pr.bottom - 15, true);
            if (tkState.phase === 6 && tkState.speed > 0) {
                let sparkCount = Math.floor(tkState.speed / 40); 
                for(let i=0; i<sparkCount; i++) spawnSpark(pr.left + pr.width/2 + (Math.random()*40 - 20), pr.bottom - 5, false);
                if (Math.random() > 0.3) spawnSpark(pr.left + pr.width/2 + (Math.random()*30), pr.bottom - 5, false);
            }
            if (tkState.engineFailure && tkState.phase > 0 && tkState.phase < 6 && Math.random() > 0.3) {
                let cx = pr.left + pr.width / 2; let cy = pr.top + pr.height / 2; let rad = -tkState.pitch * (Math.PI / 180);
                spawnSmoke(cx + Math.cos(rad) * (pr.width / 2 - 10), cy + Math.sin(rad) * (pr.width / 2 - 10));
            }

            tkState.frameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
