<script>
        // State variables
        let tkState = {
            active: false,
            phase: 0,         // 0: Ground, 1: Liftoff, 2: Cruise, 3: Evade, 4: Recover, 5: Landing, 6: Rollout
            pitch: 0,         // Pitch angle: -20 (dive) to +30 (steep climb)
            pitchVelocity: 0,
            speed: 0,
            progress: 0,      // 0 to 100% completion of the mission
            altitude: 0,      // True physical height from the ground
            cameraY: 0,       // Tracks altitude to keep plane centered
            score: 0,
            pressing: false,
            frameId: null,
            lastFrameTime: 0,
            
            bgPosSky: 0,
            bgPosCity: 0,
            bgPosGround: 0,
            bgPosRunway: 0,
            
            currTargetMin: 10, currTargetMax: 16,
            actualTargetMin: 10, actualTargetMax: 16,

            enemyX: 150,
            enemyAltitude: 0
        };

        const CRUISE_ALT = 1200; // The altitude the game pushes you to level off at

        // Pitch to Percentage Converter (-20 to +30 total range = 50 degrees)
        function pitchToPercent(degrees) {
            return ((degrees + 20) / 50) * 100;
        }

        // Handle Touch/Click anywhere
        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            if (!tkState.active && tkState.phase === 0 && tkState.speed === 0) {
                startFlight();
                return;
            }
            tkState.pressing = true;
        }, {passive: false});

        window.addEventListener('pointerup', () => { tkState.pressing = false; });
        window.addEventListener('touchend', () => { tkState.pressing = false; });

        function setTargetZone(minDeg, maxDeg) {
            tkState.currTargetMin = minDeg;
            tkState.currTargetMax = maxDeg;
        }

        function startFlight() {
            document.querySelectorAll('.pixel-particle').forEach(el => el.remove());
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0,
                pressing: false, frameId: null, lastFrameTime: performance.now(),
                bgPosSky: 0, bgPosCity: 0, bgPosGround: 0, bgPosRunway: 0, 
                enemyX: 150, enemyAltitude: 0,
                currTargetMin: 10, currTargetMax: 16, 
                actualTargetMin: 10, actualTargetMax: 16
            };

            document.getElementById('tk-plane').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('tk-score-display').textContent = `SCORE: 0`;
            document.getElementById('tk-alt-display').textContent = `ALT: 0m`;
            
            // Ensure scenery is in original vertical position
            document.getElementById('tk-bg-sky').style.transform = `translateY(0px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(0px)`;
            document.getElementById('tk-bg-ground').style.transform = `translateY(0px)`;
            document.getElementById('tk-runway').style.transform = `translateY(0px)`;

            const prompt = document.getElementById('tk-touch-prompt');
            prompt.textContent = "ACCELERATING...";
            prompt.className = 'prompt-pulse';
            prompt.style.opacity = '1';

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 15) { tkState.frameId = requestAnimationFrame(gameLoop); return; }
            tkState.lastFrameTime = timestamp;

            // --- 1. SPEED & PROGRESS ---
            if (tkState.phase < 6) {
                let acceleration = 1.0; 
                if (tkState.pitch > 0) acceleration -= (tkState.pitch * 0.05); 
                if (tkState.pitch < 0) acceleration += (Math.abs(tkState.pitch) * 0.03); 

                tkState.speed += acceleration;
                tkState.speed = Math.max(0, Math.min(220, tkState.speed));
            } else {
                // Phase 6 is touchdown rollout (braking)
                tkState.speed -= 1.5;
                tkState.speed = Math.max(0, tkState.speed);
                if (tkState.speed === 0) return triggerWin();
            }
            
            if (tkState.phase > 0 && tkState.phase < 6) {
                tkState.progress += (tkState.speed / 4500); 
            }

            // Speed Color Logic (Turns green at 150)
            const speedEl = document.getElementById('tk-speed-val'); 
            const speedBar = document.getElementById('tk-speed-bar');
            if (tkState.speed >= 150) {
                speedEl.style.color = "var(--gauge-green)";
                speedBar.style.backgroundColor = "var(--gauge-green)";
            } else {
                speedEl.style.color = "var(--brand-red)";
                speedBar.style.backgroundColor = "var(--brand-red)";
            }

            // --- 2. PITCH & ALTITUDE PHYSICS ---
            if (tkState.pressing && tkState.speed >= 100) {
                tkState.pitchVelocity += 0.06; // Smoother pull up
            } else if (tkState.speed >= 100) {
                tkState.pitchVelocity -= 0.04; // Smoother drop
            }
            tkState.pitchVelocity *= 0.88; 
            tkState.pitchVelocity = Math.max(-1.5, Math.min(1.5, tkState.pitchVelocity));
            tkState.pitch += tkState.pitchVelocity;
            tkState.pitch = Math.max(-20, Math.min(30, tkState.pitch));
            
            // Ground Constraint: Plane cannot nose dive through the tarmac before liftoff or after landing
            if (tkState.altitude <= 0 && tkState.pitch < 0 && (tkState.phase === 0 || tkState.phase === 6)) {
                tkState.pitch = 0;
                if (tkState.pitchVelocity < 0) tkState.pitchVelocity = 0;
            }
            
            if(tkState.pitch === 30 || tkState.pitch === -20) tkState.pitchVelocity = 0;

            // Altitude increases based on pitch
            if (tkState.phase > 0 && tkState.phase < 6) {
                tkState.altitude += tkState.pitch * 0.4; 
            }

            // --- GROUND COLLISION DETECTION ---
            const prompt = document.getElementById('tk-touch-prompt');
            if (tkState.altitude <= 0 && tkState.phase > 0) {
                if (tkState.phase === 1) {
                    // In Phase 1, we are just lifting off. Don't crash unless nose diving hard into the tarmac.
                    if (tkState.pitch < -5) return triggerCrash("NOSE DIVED INTO RUNWAY!");
                } else if (tkState.phase === 5) {
                    // Touchdown! Allow a forgiving pitch angle between -5 and +15 degrees.
                    if (tkState.pitch >= -5 && tkState.pitch <= 15) {
                        tkState.phase = 6;
                        tkState.altitude = 0;
                        setTargetZone(-2, 8); // Relaxed flare zone
                        prompt.textContent = "TOUCHDOWN! BRAKING...";
                        prompt.className = "prompt-pulse";
                        prompt.style.color = "var(--gauge-green)";
                    } else {
                        tkState.altitude = 0;
                        return triggerCrash("BAD LANDING ANGLE! CRASHED!");
                    }
                } else if (tkState.phase !== 6) {
                    // Crashed randomly outside of landing phase
                    tkState.altitude = 0;
                    return triggerCrash("CRASHED INTO GROUND!");
                }
            }

            // Camera Tracking Logic
            let optimalCameraY = tkState.altitude - 100; 
            let targetCameraY = Math.max(0, optimalCameraY);
            tkState.cameraY += (targetCameraY - tkState.cameraY) * 0.08; 

            // Target Zone Smoothing
            tkState.actualTargetMin += (tkState.currTargetMin - tkState.actualTargetMin) * 0.1;
            tkState.actualTargetMax += (tkState.currTargetMax - tkState.actualTargetMax) * 0.1;
            let inZone = (tkState.pitch >= tkState.actualTargetMin - 0.5 && tkState.pitch <= tkState.actualTargetMax + 0.5);

            // --- 3. SCORE INCREMENT ---
            if (inZone && tkState.phase > 0 && tkState.phase < 6) {
                tkState.score += 5;
                document.getElementById('tk-score-display').textContent = `SCORE: ${Math.floor(tkState.score)}`;
            }
            document.getElementById('tk-alt-display').textContent = `ALT: ${Math.floor(tkState.altitude)}m`;

            // --- 4. PHASE STATE MACHINE ---
            if (tkState.phase === 0) {
                prompt.textContent = `SPEED: ${Math.floor(tkState.speed)} KTS (WAIT FOR 150)`;
                if (tkState.speed >= 150) {
                    tkState.phase = 1;
                    prompt.textContent = "V1! PULL UP TO 15°";
                }
            } 
            else if (tkState.phase === 1) {
                if (tkState.altitude >= CRUISE_ALT) {
                    tkState.phase = 2;
                    setTargetZone(-3, 3); // Level out
                    prompt.textContent = "LEVEL THE PLANE (0°)";
                }
            }
            else if (tkState.phase === 2) {
                if (tkState.progress > 30) {
                    tkState.phase = 3;
                    setTargetZone(-16, -6); // EVASIVE DIVE!
                    prompt.textContent = "TRAFFIC! DIVE NOW!";
                    prompt.className = "prompt-alert";
                    document.getElementById('tk-alert-overlay').className = "flashing";
                    document.getElementById('tk-enemy-plane').style.display = 'block';
                    tkState.enemyX = 150; 
                    tkState.enemyAltitude = tkState.altitude; // Lock enemy to your CURRENT altitude
                }
            }
            else if (tkState.phase === 3) {
                tkState.enemyX -= 0.8; 
                
                // Collision Detection against Golden Plane
                if (tkState.enemyX < 35 && tkState.enemyX > -10) {
                    if (Math.abs(tkState.altitude - tkState.enemyAltitude) < 60) {
                        return triggerCrash("MID-AIR COLLISION!");
                    }
                }
                
                if (tkState.enemyX < -30) {
                    tkState.phase = 4;
                    setTargetZone(-3, 3); // Recover level
                    prompt.textContent = "CLEAR. LEVEL OUT.";
                    prompt.className = "prompt-pulse";
                    document.getElementById('tk-alert-overlay').className = "";
                }
            }
            else if (tkState.phase === 4) {
                if (tkState.progress > 65) {
                    tkState.phase = 5;
                    setTargetZone(-8, -2); // Descent angle
                    prompt.textContent = "LANDING APPROACH - DESCEND";
                }
            }

            // --- 5. UPDATE VISUALS ---
            // Horizontal Scrolling
            tkState.bgPosSky -= tkState.speed * 0.001;
            tkState.bgPosCity -= tkState.speed * 0.008;
            tkState.bgPosGround -= tkState.speed * 0.025;
            tkState.bgPosRunway -= tkState.speed * 0.08;
            
            document.getElementById('tk-bg-sky').style.backgroundPosition = `${tkState.bgPosSky}px 0px`;
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgPosCity}px 100%`;
            document.getElementById('tk-bg-ground').style.backgroundPosition = `${tkState.bgPosGround}px 100%`;
            document.getElementById('tk-runway-stripes').style.backgroundPosition = `${tkState.bgPosRunway}px 14px`;

            // Vertical Parallax (Based on Camera Altitude)
            document.getElementById('tk-bg-sky').style.transform = `translateY(${tkState.cameraY * 0.05}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.6}px)`;
            document.getElementById('tk-bg-ground').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;

            // Gauges
            const bottomPercent = pitchToPercent(tkState.actualTargetMin);
            const heightPercent = pitchToPercent(tkState.actualTargetMax) - bottomPercent;
            
            const zoneEl = document.getElementById('tk-target-zone');
            zoneEl.style.bottom = `${bottomPercent}%`;
            zoneEl.style.height = `${heightPercent}%`;
            document.getElementById('tk-needle').style.bottom = `${pitchToPercent(tkState.pitch)}%`;

            // Dashboard Numbers
            document.getElementById('tk-speed-bar').style.height = `${Math.min(100, (tkState.speed / 250) * 100)}%`;
            speedEl.textContent = Math.floor(tkState.speed);
            
            document.getElementById('tk-prog-bar').style.height = `${Math.min(100, tkState.progress)}%`;
            document.getElementById('tk-prog-val').textContent = `${Math.floor(tkState.progress)}%`;
            
            const pitchEl = document.getElementById('tk-pitch-val');
            pitchEl.textContent = `${Math.floor(tkState.pitch)}°`;
            document.getElementById('tk-pitch-bar').style.height = `${pitchToPercent(tkState.pitch)}%`;
            
            if (inZone && tkState.phase > 0 && tkState.phase !== 6) {
                pitchEl.style.color = "var(--gauge-green)";
                document.getElementById('tk-pitch-bar').style.backgroundColor = "var(--gauge-green)";
                if(tkState.phase !== 3) prompt.style.opacity = '0'; 
            } else if (tkState.phase !== 6) {
                pitchEl.style.color = "var(--brand-red)";
                document.getElementById('tk-pitch-bar').style.backgroundColor = "var(--brand-red)";
                prompt.style.opacity = '1';
            }

            // --- RENDER PLANES ON SCREEN ---
            let planeVisualY = -(tkState.altitude - tkState.cameraY);
            let visualPitch = -tkState.pitch;
            document.getElementById('tk-plane').style.transform = `translateY(${planeVisualY}px) rotate(${visualPitch}deg)`;
            
            if (tkState.phase === 3) {
                // Enemy flies perfectly level at the locked altitude
                let enemyVisualY = -(tkState.enemyAltitude - tkState.cameraY);
                document.getElementById('tk-enemy-plane').style.left = `${tkState.enemyX}%`;
                document.getElementById('tk-enemy-plane').style.transform = `translateY(${enemyVisualY}px) scaleX(-1)`;
            }

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        // --- EXPLOSIONS AND RESOLUTIONS ---
        function triggerCrash(reason) {
            tkState.active = false;
            document.getElementById('tk-plane').style.display = 'none';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = "";
            document.getElementById('tk-touch-prompt').textContent = reason;
            document.getElementById('tk-touch-prompt').className = "prompt-alert";
            document.getElementById('tk-touch-prompt').style.opacity = '1';
            
            const vp = document.getElementById('takeoff-viewport');
            const colors = ['#fff', 'var(--brand-red)', '#f39c12', '#1a1a1a', '#555'];
            
            const spawnX = (tkState.phase === 3 && reason === "MID-AIR COLLISION!") ? 100 : 50; 
            let planeVisualY = -(tkState.altitude - tkState.cameraY);
            
            // explosion happens exactly where the plane died visually
            const spawnY = vp.offsetHeight - 32 + planeVisualY - 20; 
            
            for(let i = 0; i < 200; i++) {
                let p = document.createElement('div');
                p.className = 'pixel-particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = (spawnX + (Math.random() * 40 - 20)) + 'px';
                p.style.top = (spawnY + (Math.random() * 40 - 20)) + 'px';
                p.style.width = (Math.random() * 8 + 4) + 'px';
                p.style.height = p.style.width;
                vp.appendChild(p);
                
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 10 + 2;
                animateParticle(p, Math.cos(angle) * speed, Math.sin(angle) * speed);
            }
            
            vp.style.background = "#ff3333";
            setTimeout(() => vp.style.background = "linear-gradient(to bottom, #1e3c72 0%, #2a5298 50%, #87CEEB 100%)", 100);
            
            setTimeout(() => {
                document.getElementById('tk-touch-prompt').textContent = "TAP TO RETRY";
                document.getElementById('tk-touch-prompt').className = "prompt-pulse";
            }, 3000);
        }

        function animateParticle(p, vx, vy) {
            let x = parseFloat(p.style.left); let y = parseFloat(p.style.top); let age = 0;
            function step() {
                age++; if(age > 120) { p.remove(); return; } 
                if(age > 80) { p.style.opacity = 1 - ((age - 80) / 40); } 
                x += vx; y += vy; vy += 0.15; vx *= 0.98; 
                p.style.left = x + 'px'; p.style.top = y + 'px'; 
                requestAnimationFrame(step);
            } requestAnimationFrame(step);
        }

        function triggerWin() {
            tkState.active = false;
            document.getElementById('tk-touch-prompt').textContent = `SAFE LANDING! (+${Math.floor(tkState.score)})`;
            document.getElementById('tk-touch-prompt').className = "prompt-pulse";
            document.getElementById('tk-touch-prompt').style.opacity = '1';
            document.getElementById('tk-touch-prompt').style.color = "var(--gauge-green)";
            
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            
            setTimeout(() => {
                document.getElementById('tk-touch-prompt').textContent = "TAP TO FLY AGAIN";
                document.getElementById('tk-touch-prompt').style.color = "#fff";
            }, 4000);
        }
    </script>
</body>
</html>
