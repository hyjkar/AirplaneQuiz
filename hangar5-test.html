<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - v1.8 Simple Audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --brand-gold: #cfa86e;
            --fo-blue: #3498db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            background-color: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            width: 100%; height: 100%;
            overflow: hidden; user-select: none; touch-action: none;
        }

        #takeoff-viewport {
            width: 100%; height: 100%; position: relative; overflow: hidden; 
            background-color: #4a9ae9; cursor: pointer; transition: background-color 0.5s;
        }
        
        #tk-alert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30; transition: background 0.2s;
        }
        .flashing { animation: redAlert 0.3s infinite alternate; }
        @keyframes redAlert { 
            from { background: rgba(215, 25, 32, 0); } 
            to { background: rgba(215, 25, 32, 0.35); } 
        }

        #tk-version {
            position: absolute; bottom: 10px; right: 15px; color: rgba(255,255,255,0.4);
            font-size: 0.8rem; font-weight: bold; z-index: 50; pointer-events: none;
        }

        #camera-rig {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: 30% 80%; 
            will-change: transform; z-index: 1;
        }

        .parallax-layer { 
            position: absolute; left: 0; right: 0; top: 0; bottom: 0; 
            pointer-events: none; background-repeat: repeat-x; 
            transition: filter 0.5s, background-color 0.5s;
        }
        #tk-bg-sky { background-size: 1024px 100%; z-index: 0; height: 400%; background-color: #87CEEB; top: -150%;}
        
        #tk-sun {
            display: none; position: absolute; right: 15%; bottom: 35%;
            width: 60px; height: 60px; background: #fff;
            box-shadow: 0 0 0 10px rgba(255, 240, 150, 0.8), 0 0 0 25px rgba(255, 200, 100, 0.4), 0 0 0 45px rgba(255, 100, 50, 0.2);
            z-index: 0; 
        }
        .sunrise-weather #tk-sun { display: block; }

        #tk-bg-city { height: 100%; background-size: 1024px 100%; background-position: bottom left; z-index: 1; top: 0; }
        
        #tk-runway { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #222; z-index: 3; transition: filter 0.5s;}
        #tk-runway-stripes { 
            width: 100%; height: 100%; 
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); 
            background-position: 0px 10px; background-size: 200px 6px; background-repeat: repeat-x;
        }

        /* --- WEATHER STATES --- */
        .weather-layer { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
        
        .night-weather .rain-layer, .night-weather .fog-layer.layer-back { display: block; }
        .snow-weather .snow-layer, .snow-weather .fog-layer { display: block; }
        
        .night-weather { background-color: #0b1021 !important; }
        .night-weather #tk-bg-sky { background-color: #0b1021 !important; background-image: none !important; }
        .night-weather #tk-bg-city, .night-weather #tk-runway, .night-weather #tk-mountain {
            filter: brightness(0.25) sepia(0.5) hue-rotate(180deg) saturate(1.2);
        }
        .night-weather #tk-plane-img, .night-weather #tk-enemy-plane img { filter: brightness(0.55); }

        .sunrise-weather { background-color: #ff9e7a !important; }
        .sunrise-weather #tk-bg-sky { 
            background-color: #ff9e7a !important; 
            background-image: linear-gradient(to bottom, #2b5876 0%, #ff9e7a 60%, #ffe259 100%) !important; 
        }
        .sunrise-weather #tk-bg-city, .sunrise-weather #tk-runway, .sunrise-weather #tk-mountain {
            filter: sepia(0.4) hue-rotate(-15deg) saturate(1.4) brightness(0.8);
        }
        .sunrise-weather #tk-plane-img, .sunrise-weather #tk-enemy-plane img { filter: sepia(0.3) saturate(1.2) brightness(0.9); }

        .snow-weather { background-color: #b8c6d9 !important; }
        .snow-weather #tk-bg-sky { background-color: #b8c6d9 !important; background-image: none !important; }
        .snow-weather #tk-bg-city, .snow-weather #tk-runway, .snow-weather #tk-mountain {
            filter: grayscale(0.7) brightness(1.4) contrast(0.6);
        }
        .snow-weather .fog-layer.layer-front {
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.95) 0%, transparent 65%);
        }
        .snow-weather .fog-layer.layer-back {
            background: radial-gradient(circle at 50% 50%, rgba(240, 245, 250, 0.8) 0%, transparent 70%);
        }
        
        .fog-layer.layer-back {
            background: radial-gradient(circle at 50% 50%, rgba(180, 190, 210, 0.4) 0%, transparent 60%);
            background-size: 300% 200%; animation: fogPulse 15s ease-in-out infinite alternate; z-index: 8; 
        }
        .fog-layer.layer-front {
            background: radial-gradient(ellipse at center, rgba(200, 210, 220, 0.95) 0%, transparent 40%);
            background-size: 200% 100%; animation: fogSweep 7s linear infinite; z-index: 15; 
        }
        
        .rain-layer.layer-1 {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><rect x='20' y='20' width='2' height='15' fill='rgba(255,255,255,0.4)'/><rect x='150' y='120' width='1' height='10' fill='rgba(255,255,255,0.2)'/></svg>");
            animation: rainAnim1 0.4s linear infinite; z-index: 11;
        }
        .rain-layer.layer-2 {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect x='50' y='50' width='3' height='25' fill='rgba(255,255,255,0.6)'/><rect x='250' y='200' width='2' height='15' fill='rgba(255,255,255,0.4)'/></svg>");
            animation: rainAnim2 0.3s linear infinite; z-index: 16;
        }

        .snow-layer.layer-1 {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><circle cx='20' cy='20' r='3' fill='rgba(255,255,255,0.8)'/><circle cx='100' cy='80' r='2' fill='rgba(255,255,255,0.6)'/><circle cx='150' cy='150' r='4' fill='rgba(255,255,255,0.9)'/><circle cx='50' cy='180' r='2' fill='rgba(255,255,255,0.5)'/></svg>");
            animation: snowAnim1 2.5s linear infinite; z-index: 11;
        }
        .snow-layer.layer-2 {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><circle cx='50' cy='50' r='5' fill='rgba(255,255,255,0.9)'/><circle cx='200' cy='150' r='6' fill='rgba(255,255,255,0.8)'/><circle cx='250' cy='280' r='4' fill='rgba(255,255,255,0.7)'/></svg>");
            animation: snowAnim2 3.5s linear infinite; z-index: 16;
        }
        
        @keyframes fogSweep { 0% { background-position: 200% 50%; } 100% { background-position: -100% 50%; } }
        @keyframes fogPulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.2); } }
        @keyframes rainAnim1 { from { background-position: 0 0; } to { background-position: -60px 250px; } }
        @keyframes rainAnim2 { from { background-position: 0 0; } to { background-position: -90px 400px; } }
        @keyframes snowAnim1 { from { background-position: 0 -200px; } to { background-position: -100px 200px; } }
        @keyframes snowAnim2 { from { background-position: 0 -300px; } to { background-position: -150px 300px; } }

        /* Lens Flare Overlay */
        #tk-flare-container { display: none; position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; overflow: hidden; transition: opacity 0.2s; }
        .sunrise-weather #tk-flare-container { display: block; }
        .pf { position: absolute; background: rgba(255, 200, 100, 0.2); transform: translate(-50%, -50%); }
        .pf-1 { width: 60px; height: 60px; background: rgba(255, 150, 50, 0.15); border: 2px solid rgba(255,200,100,0.3); }
        .pf-2 { width: 30px; height: 30px; background: rgba(150, 255, 150, 0.2); }
        .pf-3 { width: 100px; height: 100px; border: 4px solid rgba(255, 100, 50, 0.1); background: transparent; }
        .pf-4 { width: 15px; height: 15px; background: rgba(255, 255, 255, 0.4); }

        /* Plane & Mini HUD Decoupled */
        #plane-container { position: absolute; left: 30%; bottom: 65px; transform: translateX(-50%); z-index: 10; pointer-events: none; width: 150px; height: 50px; }
        #plane-rotate-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; z-index: 12; }
        #tk-plane-img { width: 100%; height: 100%; object-fit: contain; position: relative; transition: filter 0.5s;}
        
        /* HUD Ring Decoupled for Spring Physics */
        #plane-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px dashed #fff; display: flex; align-items: center; justify-content: center; z-index: 11;
        }
        
        .hud-text { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; color: #fff; }
        .hud-label { font-size: 0.5rem; opacity: 0.8; display: block; }
        .hud-val { font-size: 1rem; display: block; }
        #hud-spd { left: -5px; top: 50%; transform: translate(-100%, -50%); }
        #hud-pitch { right: -5px; top: 50%; transform: translate(100%, -50%); }
        #hud-alt { bottom: -5px; left: 50%; transform: translate(-50%, 100%); }

        #landing-guide {
            position: absolute; top: 25px; left: 75px; transform: translate(-50%, -50%);
            width: 220px; height: 80px; border: 2px solid transparent;
            border-left: 4px solid var(--gauge-green); border-right: 4px solid var(--gauge-green);
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 5;
        }
        .guide-label { position: absolute; bottom: -20px; text-align: center; color: var(--gauge-green); font-weight: bold; font-size: 0.8rem; text-shadow: 1px 1px 2px #000; }

        /* Bubble Text Formatting */
        #dialogue-bubble {
            position: absolute; bottom: 125px; left: 30%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #111; padding: 8px 14px; border-radius: 8px; font-size: 0.9rem;
            white-space: nowrap; opacity: 0; transition: opacity 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 20;
            font-weight: bold; text-transform: uppercase;
        }
        #dialogue-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent; }
        
        .capt-text { color: #111; font-weight: bold; }
        .alert-text { color: var(--brand-red); font-weight: bold; animation: pulseRed 0.8s infinite alternate; }
        .success-text { color: var(--gauge-green); font-weight: bold; }
        @keyframes pulseRed { from { color: var(--brand-red); } to { color: #ff5555; } }

        /* UI Overlays */
        #tk-hud-top { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; }
        .top-left-controls { display: flex; gap: 10px; pointer-events: auto; }
        #tk-score-display { color: var(--brand-gold); font-size: 1rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--brand-gold);}
        
        #reset-btn { background: rgba(215, 25, 32, 0.9); border: 2px solid #fff; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        #ap-btn { background: #333; border: 2px solid #aaa; border-radius: 8px; color: #aaa; font-size: 0.9rem; cursor: pointer; padding: 0 12px; height: 40px; font-family: 'Share Tech Mono', monospace; font-weight: bold; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: auto; }
        #ap-btn:active { transform: scale(0.95); }

        #prompt-container { position: absolute; bottom: max(10px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none; width: 95%; max-width: 400px; display: none; justify-content: center; }
        
        #tk-enemy-plane { position: absolute; left: 150%; bottom: 65px; width: 162px; height: 56px; z-index: 9; pointer-events: none; display: none; transition: filter 0.5s; }
        #tk-mountain { position: absolute; bottom: 65px; left: 100%; width: 220px; height: 120px; z-index: 2; display: none; pointer-events: none; transition: filter 0.5s; }
        .pixel-particle { position: absolute; z-index: 100; pointer-events: none; border-radius: 1px; }
        .spark-particle { position: absolute; z-index: 101; pointer-events: none; width: 4px; height: 4px; border-radius: 50%; }

        /* End Screen UI */
        #tk-end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        #tk-end-screen.visible { opacity: 1; pointer-events: auto; }
        .end-panel { background: #111; border: 2px solid var(--brand-gold); border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #tk-end-screen.visible .end-panel { transform: scale(1); }
        .end-title { font-size: 2rem; color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 4px #000; }
        .end-subtitle { font-size: 1rem; color: #aaa; margin-bottom: 20px; }
        .end-score { font-size: 3.5rem; color: var(--gauge-green); margin-bottom: 25px; font-weight: bold; text-shadow: 0 0 15px rgba(46, 204, 113, 0.5);}
        .reward-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; height: 60px; }
        .reward-icon { width: 60px; height: 60px; fill: #333; transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fill 0.3s; }
        .reward-icon.pop { transform: scale(1); }
        .reward-icon.golden { fill: var(--brand-gold); filter: drop-shadow(0 0 12px var(--brand-gold)); }
        .play-again-btn { background: var(--brand-gold); color: #000; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; transition: transform 0.1s, filter 0.1s; }
        .play-again-btn:active { transform: scale(0.95); filter: brightness(0.8); }
    </style>
</head>
<body>

    <div id="takeoff-viewport">
        <div id="tk-version">v1.8 - Simplest Audio</div>

        <div id="tk-alert-overlay"></div>
        
        <div id="tk-hud-top">
            <div class="top-left-controls">
                <button id="reset-btn" onclick="startFlight()">❌</button>
                <button id="ap-btn" onclick="toggleAutoPilot(event)">AUTO</button>
            </div>
            <div id="tk-score-display">SCORE: <span id="score-val">0</span></div>
        </div>
        
        <div id="prompt-container"></div>
        
        <div id="camera-rig">
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky1.png');"></div>
            <div id="tk-sun"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('mountain.png');"></div>
            
            <div class="weather-layer fog-layer layer-back"></div>
            <div class="weather-layer rain-layer layer-1"></div>
            <div class="weather-layer snow-layer layer-1"></div>

            <div id="plane-container">
                <div id="dialogue-bubble"></div>
                <div id="landing-guide"><div class="guide-label">-5&deg; TO 15&deg;</div></div>

                <div id="plane-rotate-group">
                    <img id="tk-plane-img" src="my-plane.png" onerror="this.style.backgroundColor='blue';">
                </div>
                
                <div id="plane-hud">
                    <div id="hud-spd" class="hud-text"><span class="hud-label">SPD</span><span id="hud-spd-val" class="hud-val">0</span></div>
                    <div id="hud-pitch" class="hud-text"><span class="hud-label">PITCH</span><span id="hud-pitch-val" class="hud-val">0&deg;</span></div>
                    <div id="hud-alt" class="hud-text"><span class="hud-label">ALT</span><span id="hud-alt-val" class="hud-val">0m</span></div>
                </div>
            </div>
            
            <div id="tk-enemy-plane"><img id="tk-enemy-img" src="my-plane-golden.png" style="width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1);"></div>
            <div id="tk-runway"><div id="tk-runway-stripes"></div></div>
            <div id="tk-mountain"><svg viewBox="0 0 100 100" width="100%" height="100%"><path d="M0,100 L50,20 L100,100 Z" fill="#3b3b3b"/><path d="M30,100 L50,50 L70,100 Z" fill="#4a4a4a"/><path d="M42,35 L50,20 L58,35 Z" fill="#fff"/></svg></div>
            
            <div class="weather-layer fog-layer layer-front"></div>
            <div class="weather-layer rain-layer layer-2"></div>
            <div class="weather-layer snow-layer layer-2"></div>
        </div>

        <div id="tk-flare-container">
            <div id="pf1" class="pf pf-1"></div>
            <div id="pf2" class="pf pf-2"></div>
            <div id="pf3" class="pf pf-3"></div>
            <div id="pf4" class="pf pf-4"></div>
        </div>

        <div id="tk-end-screen">
            <div class="end-panel">
                <div class="end-title">MISSION ACCOMPLISHED</div>
                <div class="end-subtitle">SAFE EVACUATION COMPLETED</div>
                <div class="end-score" id="end-score-val">0</div>
                <div class="reward-icons">
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                </div>
                <button class="play-again-btn" onclick="startFlight()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        let SPEED_MOD = 0.75; 
        
        let playerPlaneSkin = 'my-plane.png';
        let playerNoGearSkin = 'my-plane-nolandinggear.png';
        let enemyPlaneSkin = 'my-plane-golden.png';

        // --- SIMPLIFIED HTML5 MP3 PLAYER ---
        const musicPlayer = {
            bgMusic: new Audio('hangar5-music.mp3'), 
            hasStarted: false,

            init: function() {
                if (!this.hasStarted) {
                    this.bgMusic.loop = true;
                    this.bgMusic.volume = 0.4; 
                    this.hasStarted = true;
                }
                this.bgMusic.play().catch(e => console.log("Audio play blocked by browser until tap"));
            },
            
            stopAll: function() {
                try { this.bgMusic.pause(); } catch(e) {}
            }
        };

        // --- BROWSER AUDIO CLEANUP ---
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                musicPlayer.stopAll();
            } else {
                if (tkState.active) {
                    musicPlayer.bgMusic.play().catch(e => {});
                }
            }
        });
        window.addEventListener("pagehide", function() {
            musicPlayer.stopAll();
        });

        let endScreenAnimInterval = null;
        let endScreenTimeouts = [];

        let tkState = {
            active: false, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, 
            progress: 0, altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
            lastFrameTime: 0, enemyX: 150, enemyAltitude: 0, currTargetMin: 10, currTargetMax: 16,
            bgX_sky: 0, bgX_city: 0, bgX_runway: 0, takeoffDist: 150, landingDist: 260,
            dialogueStep: 0, dialogueTimeLeft: 0, dialogueText: "", weather: "day",
            zoom: 1.0, targetZoom: 1.0, speedMod: 0.75, autoPilot: false,
            canRestart: true, hudPitch: 0, hudPitchVelocity: 0
        };

        function setDialogue(text, timeMs) {
            tkState.dialogueText = text;
            tkState.dialogueTimeLeft = timeMs;
        }

        function toggleAutoPilot(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!tkState.active || tkState.phase === 0 || tkState.phase >= 6) return; 

            tkState.autoPilot = !tkState.autoPilot;
            const btn = document.getElementById('ap-btn');
            
            if (tkState.autoPilot) {
                btn.style.background = 'var(--gauge-green)';
                btn.style.borderColor = '#fff';
                btn.style.color = '#000';
                btn.style.boxShadow = '0 0 15px var(--gauge-green)';
            } else {
                btn.style.background = '#333';
                btn.style.borderColor = '#aaa';
                btn.style.color = '#aaa';
                btn.style.boxShadow = '0 2px 5px rgba(0,0,0,0.5)';
            }
        }

        // --- CONTROLS ---
        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            musicPlayer.init(); 
            if (!tkState.active && tkState.canRestart && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight();
            tkState.pressing = true;
        });
        window.addEventListener('pointerup', () => tkState.pressing = false);
        window.addEventListener('touchend', () => tkState.pressing = false);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); 
                if (e.repeat) return; 
                musicPlayer.init(); 
                if (!tkState.active && tkState.canRestart && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight();
                tkState.pressing = true;
            }
            if (e.code === 'Enter' || e.key === 'Enter') {
                e.preventDefault();
                if (e.repeat) return;
                toggleAutoPilot(e);
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                tkState.pressing = false;
            }
        });

        function showEndScreen(finalScore) {
            let es = document.getElementById('tk-end-screen');
            es.style.display = 'flex';
            setTimeout(() => { es.classList.add('visible'); }, 50);

            let icons = document.querySelectorAll('.reward-icon');
            icons.forEach(i => { 
                i.classList.remove('pop', 'golden'); 
                i.style.fill = '#333'; 
                i.style.filter = 'none';
            });
            
            let targetPlanes = 1; 
            if (finalScore > 2000) targetPlanes = 2; 
            if (finalScore > 3500) targetPlanes = 3; 

            let scoreEl = document.getElementById('end-score-val');
            let cur = 0;
            let step = Math.max(1, Math.ceil(finalScore / 40));
            
            clearInterval(endScreenAnimInterval);
            endScreenAnimInterval = setInterval(() => {
                cur += step;
                if(cur >= finalScore) { 
                    cur = finalScore; 
                    clearInterval(endScreenAnimInterval); 
                    popGoldenPlanes(targetPlanes); 
                }
                scoreEl.textContent = cur;
            }, 20);
        }

        function popGoldenPlanes(count) {
            let icons = document.querySelectorAll('.reward-icon');
            for(let i=0; i<3; i++) {
                let t = setTimeout(() => {
                    icons[i].classList.add('pop');
                    if(i < count) {
                        icons[i].classList.add('golden');
                        confetti({ particleCount: 80, spread: 80, origin: { y: 0.6 }, zIndex: 200 });
                    }
                }, i * 500);
                endScreenTimeouts.push(t);
            }
        }

        function triggerCrash(reasonText) {
            musicPlayer.stopAll();
            const r = document.getElementById('tk-plane-img').getBoundingClientRect();
            triggerEpicCollision(r.left + r.width/2, r.top + r.height/2);
            document.getElementById('plane-container').style.display = 'none';
            tkState.active = false;
            
            setDialogue(`<span class='alert-text'>${reasonText}</span>`, 4500);
            
            setTimeout(() => { 
                setDialogue("<span class='capt-text'>TAP / SPACE TO RESTART</span>", 99999); 
                tkState.canRestart = true; 
            }, 4500);
        }

        function startFlight() {
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            clearInterval(endScreenAnimInterval);
            endScreenTimeouts.forEach(t => clearTimeout(t));
            endScreenTimeouts = [];
            document.querySelectorAll('.pixel-particle, .spark-particle').forEach(p => p.remove());
            
            let es = document.getElementById('tk-end-screen');
            es.classList.remove('visible');
            setTimeout(() => { es.style.display = 'none'; }, 300); 

            const apBtn = document.getElementById('ap-btn');
            apBtn.style.background = '#333';
            apBtn.style.borderColor = '#aaa';
            apBtn.style.color = '#aaa';
            apBtn.style.boxShadow = '0 2px 5px rgba(0,0,0,0.5)';

            document.getElementById('tk-plane-img').src = playerPlaneSkin;
            
            let rand = Math.random();
            let weather = 'day';
            let vp = document.getElementById('takeoff-viewport');
            vp.classList.remove('night-weather', 'sunrise-weather', 'snow-weather');
            
            if (rand > 0.75) {
                weather = 'night';
                vp.classList.add('night-weather');
            } else if (rand > 0.5) {
                weather = 'snow';
                vp.classList.add('snow-weather');
            } else if (rand > 0.25) {
                weather = 'sunrise';
                vp.classList.add('sunrise-weather');
            }

            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
                lastFrameTime: performance.now(), enemyX: 150, enemyAltitude: 0,
                currTargetMin: 10, currTargetMax: 16, bgX_sky: 0, bgX_city: 0, bgX_runway: 0, 
                takeoffDist: 150, landingDist: 260, dialogueStep: 0, dialogueTimeLeft: 0, dialogueText: "",
                zoom: 1.0, speedMod: 0.75, autoPilot: false, weather: weather, canRestart: false,
                hudPitch: 0, hudPitchVelocity: 0
            };
            SPEED_MOD = 0.75; 
            
            document.getElementById('prompt-container').style.display = 'none';
            setDialogue("<span class='capt-text'>FULL POWER!</span>", 3000);

            document.getElementById('plane-container').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-mountain').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('score-val').textContent = '0';
            
            document.getElementById('camera-rig').style.transform = `scale(1)`;

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        // Cinematic but GPU-friendly collision 
        function triggerEpicCollision(x, y) {
            const vp = document.getElementById('takeoff-viewport');
            
            vp.style.backgroundColor = "#ffffff";
            setTimeout(() => { 
                if (tkState.weather === 'night') vp.style.backgroundColor = "#0b1021";
                else if (tkState.weather === 'sunrise') vp.style.backgroundColor = "#ff9e7a";
                else if (tkState.weather === 'snow') vp.style.backgroundColor = "#b8c6d9";
                else vp.style.backgroundColor = "#4a9ae9";
            }, 150);

            let shakeAmount = 35;
            function applyShake() {
                if (shakeAmount > 0.5) {
                    let ox = (Math.random() - 0.5) * shakeAmount;
                    let oy = (Math.random() - 0.5) * shakeAmount;
                    vp.style.transform = `translate(${ox}px, ${oy}px)`;
                    shakeAmount *= 0.85; 
                    requestAnimationFrame(applyShake);
                } else {
                    vp.style.transform = `translate(0, 0)`;
                }
            }
            applyShake();

            const colors = ['#ffffff', '#ffffff', '#ffea00', '#ff5500', '#d71920', '#333333', '#111111'];
            
            for(let i=0; i<80; i++) { 
                let p = document.createElement('div');
                p.className = 'pixel-particle';
                p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                
                let size = Math.random() * 6 + 2; 
                p.style.width = size + 'px';
                p.style.height = size + 'px';

                document.getElementById('camera-rig').appendChild(p);
                
                let a = Math.random() * 6.28; 
                let v = (Math.random() * 40 + 5) * 0.75; 
                let vx = Math.cos(a) * v; 
                let vy = Math.sin(a) * v;
                let age = 0;
                let maxAge = Math.random() * 60 + 40; 
                
                function move() {
                    let timeScale = age < 2 ? 1.0 : (age < 6 ? 0.3 : 0.05); 
                    age += timeScale; 
                    vx *= Math.pow(0.92, timeScale); 
                    vy += (0.3 * 0.75) * timeScale; 
                    
                    p.style.left = (parseFloat(p.style.left) + (vx * timeScale)) + 'px';
                    p.style.top = (parseFloat(p.style.top) + (vy * timeScale)) + 'px';
                    p.style.opacity = 1 - (age / maxAge);

                    if(age < maxAge) requestAnimationFrame(move); else p.remove();
                } move();
            }
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 16) { tkState.frameId = requestAnimationFrame(gameLoop); return; }
            tkState.lastFrameTime = timestamp;

            const hudRing = document.getElementById('plane-hud');

            // --- SLOW-MO ZOOM LOGIC ---
            let isLandingApproach = (tkState.phase === 5 && tkState.altitude <= 70 && tkState.altitude > 0);
            let targetSpeedMod = isLandingApproach ? 0.25 : 0.75; 
            let targetZoom = isLandingApproach ? 1.8 : 1.0;

            tkState.speedMod += (targetSpeedMod - tkState.speedMod) * 0.1;
            tkState.zoom += (targetZoom - tkState.zoom) * 0.05;
            SPEED_MOD = tkState.speedMod; 
            
            document.getElementById('camera-rig').style.transform = `scale(${tkState.zoom})`;

            let guide = document.getElementById('landing-guide');
            if (isLandingApproach) {
                guide.style.opacity = 1;
                let isSafe = (tkState.pitch >= -5 && tkState.pitch <= 15);
                let guideColor = isSafe ? '#2ecc71' : '#d71920';
                guide.style.borderLeftColor = guideColor;
                guide.style.borderRightColor = guideColor;
                guide.querySelector('.guide-label').style.color = guideColor;
            } else {
                guide.style.opacity = 0;
            }

            // --- SUNRISE LENS FLARE SYSTEM ---
            if (tkState.weather === 'sunrise') {
                const sun = document.getElementById('tk-sun');
                const flareCont = document.getElementById('tk-flare-container');
                const sunRect = sun.getBoundingClientRect();
                
                let sx = sunRect.left + sunRect.width / 2;
                let sy = sunRect.top + sunRect.height / 2;
                let cx = window.innerWidth / 2;
                let cy = window.innerHeight / 2;
                
                let dx = cx - sx;
                let dy = cy - sy;
                
                document.getElementById('pf1').style.left = (sx + dx * 1.4) + 'px';
                document.getElementById('pf1').style.top = (sy + dy * 1.4) + 'px';
                document.getElementById('pf2').style.left = (sx + dx * 0.6) + 'px';
                document.getElementById('pf2').style.top = (sy + dy * 0.6) + 'px';
                document.getElementById('pf3').style.left = (sx + dx * 1.8) + 'px';
                document.getElementById('pf3').style.top = (sy + dy * 1.8) + 'px';
                document.getElementById('pf4').style.left = (sx + dx * 2.2) + 'px';
                document.getElementById('pf4').style.top = (sy + dy * 2.2) + 'px';
                
                let fade = Math.max(0, Math.min(1, (window.innerHeight - 100 - sy) / 100));
                flareCont.style.opacity = fade;
            }

            // --- BUBBLE DIALOGUE TICKER ---
            const bubble = document.getElementById('dialogue-bubble');
            if (tkState.dialogueTimeLeft > 0) {
                tkState.dialogueTimeLeft -= delta;
                bubble.innerHTML = tkState.dialogueText;
                bubble.style.opacity = 1;
            } else {
                bubble.style.opacity = 0;
            }

            if (tkState.phase === 0 && tkState.speed > 25 && tkState.dialogueStep === 0) {
                tkState.dialogueStep = 1;
                setDialogue("<span class='capt-text'>GEAR FIXED?</span>", 3000);
            }
            if (tkState.phase === 0 && tkState.speed > 95 && tkState.dialogueStep === 1) {
                tkState.dialogueStep = 2;
                setDialogue("<span class='fo-text'>HOPEFULLY...</span>", 3000);
            }
            if (tkState.phase === 1 && tkState.altitude > 80 && tkState.dialogueStep === 2) {
                tkState.dialogueStep = 3;
                setDialogue("<span class='alert-text'>GEAR STUCK!</span>", 3000);
            }

            // 1. SPEED ENGINE
            let inHUDZone = (tkState.pitch >= tkState.currTargetMin && tkState.pitch <= tkState.currTargetMax);
            if (tkState.phase < 6) {
                let accel = (tkState.phase === 5) ? -1.6 : (tkState.phase === 0 ? 0.8 : 1.5); 
                accel *= SPEED_MOD;
                
                if (!inHUDZone && tkState.phase > 0) accel *= 0.3;
                if (tkState.pitch > 0) accel -= (tkState.pitch * 0.04 * SPEED_MOD);
                if (tkState.pitch < 0) accel += (Math.abs(tkState.pitch) * 0.03 * SPEED_MOD);
                
                tkState.speed = Math.max((tkState.phase === 0 ? 0 : 85), Math.min(240, tkState.speed + accel));
            } else {
                tkState.speed = Math.max(0, tkState.speed - (1.3 * SPEED_MOD));
                if (tkState.speed <= 0) { 
                    tkState.active = false; 
                    setDialogue("<span class='success-text'>SAFE! EVACUATE!</span>", 5000);
                    musicPlayer.stopAll();
                    showEndScreen(Math.floor(tkState.score));
                    return; 
                }
            }
            if (tkState.phase > 0 && tkState.phase < 6) tkState.progress += ((tkState.speed / 6000) * SPEED_MOD);

            let spdHue = 0;
            if (tkState.phase < 2) spdHue = (tkState.speed >= 150) ? 120 : 0;
            else if (tkState.phase === 5) spdHue = (tkState.speed <= 160) ? 120 : 0; 
            else spdHue = (tkState.speed > 130) ? 120 : 0;
            document.getElementById('hud-spd').style.color = `hsl(${spdHue}, 85%, 55%)`;
            document.getElementById('hud-spd-val').textContent = Math.floor(tkState.speed);

            // 2. PITCH & PHYSICS
            if (tkState.phase === 0 && tkState.speed < 150) {
                // FIXED: Runway takeoff lock
                tkState.pitch = 0;
                tkState.pitchVelocity = 0;
            } else if (tkState.phase === 6) {
                tkState.pitch += (0 - tkState.pitch) * 0.1;
                tkState.pitchVelocity = 0;
            } else if (tkState.autoPilot) {
                tkState.pitchVelocity *= 0.5;
                tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));
            } else {
                if (tkState.pressing && tkState.speed >= 85) tkState.pitchVelocity += (0.11 * SPEED_MOD);
                else if (tkState.speed >= 85) tkState.pitchVelocity -= (0.08 * SPEED_MOD);
                tkState.pitchVelocity *= 0.88;
                tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));
            }

            tkState.hudPitchVelocity += (tkState.pitch - tkState.hudPitch) * 0.1; 
            tkState.hudPitchVelocity *= 0.8; 
            tkState.hudPitch += tkState.hudPitchVelocity;

            let isStalling = (tkState.pitch >= 24.2 && tkState.altitude > 10);
            let targetVSpeed = tkState.pitch * 0.55 * SPEED_MOD;
            if (isStalling) { 
                targetVSpeed = -12 * SPEED_MOD; 
                document.getElementById('tk-alert-overlay').className = 'flashing';
                setDialogue("<span class='alert-text'>STALL WARNING!</span>", 500);
                if(tkState.autoPilot) toggleAutoPilot();
            } else if (tkState.phase !== 3) {
                document.getElementById('tk-alert-overlay').className = '';
            }

            tkState.vSpeed += (targetVSpeed - tkState.vSpeed) * 0.12;
            if (tkState.altitude <= 0 && tkState.pitch < 0) { tkState.pitch = 0; tkState.pitchVelocity = 0; }
            if (tkState.phase !== 6) tkState.altitude = Math.max(0, tkState.altitude + tkState.vSpeed);

            document.getElementById('hud-alt-val').textContent = Math.floor(tkState.altitude) + 'm';
            document.getElementById('hud-pitch-val').innerHTML = Math.floor(tkState.pitch) + '&deg;';
            let center = (tkState.currTargetMin + tkState.currTargetMax) / 2;
            let error = Math.abs(tkState.pitch - center);
            let p_hue = inHUDZone ? 120 : Math.max(0, 120 - error * 9);
            if (isStalling) p_hue = 0;
            let dynColor = `hsl(${p_hue}, 85%, 55%)`;
            hudRing.style.borderColor = dynColor;
            document.getElementById('hud-pitch').style.color = dynColor;
            
            const scoreValEl = document.getElementById('score-val');
            if (inHUDZone && tkState.phase > 0 && tkState.phase < 6) {
                if (tkState.autoPilot) {
                    tkState.score += 10;
                    scoreValEl.style.color = '#cfa86e';
                } else {
                    tkState.score += 4;
                    scoreValEl.style.color = '#fff';
                }
            } else {
                scoreValEl.style.color = '#fff';
            }
            scoreValEl.textContent = Math.floor(tkState.score);

            // --- FATAL IMPACT CHECKS (UNIFIED & FIXED) ---
            if (tkState.altitude <= 0 && tkState.phase >= 2 && tkState.phase < 6) {
                if (isStalling || tkState.pitch < -5 || tkState.pitch > 15) {
                    return triggerCrash("FATAL ANGLE!");
                }
            }
            if (tkState.speed > 160 && tkState.phase === 5 && tkState.altitude <= 0) {
                return triggerCrash("TOO FAST!");
            }

            // --- PHASE PROGRESSION & EVENTS ---
            if (tkState.phase < 2) {
                tkState.takeoffDist -= ((tkState.speed / 1600) * SPEED_MOD);
                if (tkState.takeoffDist < 25 && tkState.altitude < 60) {
                    const mtn = document.getElementById('tk-mountain');
                    mtn.style.display = 'block'; mtn.style.left = (tkState.takeoffDist * 4) + '%';
                    if (tkState.takeoffDist <= 0) {
                         return triggerCrash("MOUNTAIN IMPACT!");
                    }
                }
            } else if (tkState.phase >= 5) {
                tkState.landingDist -= ((tkState.speed / 250) * SPEED_MOD);
                const mtn = document.getElementById('tk-mountain');
                mtn.style.display = 'block'; 
                mtn.style.left = tkState.landingDist + '%';
                
                if (tkState.landingDist <= 35 && tkState.speed > 0) {
                     return triggerCrash("MOUNTAIN IMPACT!");
                }
            } else {
                document.getElementById('tk-mountain').style.display = 'none';
            }

            if (tkState.phase === 0 && tkState.speed >= 150) { 
                tkState.phase = 1; 
                setDialogue("<span class='capt-text'>V1! PULL UP!</span>", 3000);
            }
            else if (tkState.phase === 1 && tkState.altitude >= CRUISE_ALT) { 
                tkState.phase = 2; 
                tkState.currTargetMin = -3; 
                tkState.currTargetMax = 3; 
                setDialogue("<span class='capt-text'>LEVEL OFF</span>", 3000); 
            }
            else if (tkState.phase === 2 && tkState.progress > 20) {
                tkState.phase = 3; 
                tkState.currTargetMin = -24; 
                tkState.currTargetMax = -12;
                setDialogue("<span class='alert-text'>TRAFFIC! DIVE!</span>", 4000);
                document.getElementById('tk-alert-overlay').className = 'flashing';
                document.getElementById('tk-enemy-plane').style.display = 'block';
                tkState.enemyX = 140; tkState.enemyAltitude = tkState.altitude;
                if(tkState.autoPilot) toggleAutoPilot();
            }
            else if (tkState.phase === 3) {
                tkState.enemyX -= (1.8 * SPEED_MOD); document.getElementById('tk-enemy-plane').style.left = tkState.enemyX + '%';
                let enemyVisualY = -(tkState.enemyAltitude - tkState.cameraY);
                document.getElementById('tk-enemy-plane').style.transform = `translateY(${enemyVisualY}px)`;
                const pr = document.getElementById('tk-plane-img').getBoundingClientRect();
                const er = document.getElementById('tk-enemy-plane').getBoundingClientRect();
                const margin = 12;
                if (!(pr.right-margin < er.left+margin || pr.left+margin > er.right-margin || pr.bottom-margin < er.top+margin || pr.top+margin > er.bottom-margin)) {
                     return triggerCrash("MID-AIR CRASH!");
                }
                if (tkState.enemyX < -30) {
                    tkState.phase = 4; 
                    tkState.currTargetMin = -3; 
                    tkState.currTargetMax = 3;
                    setDialogue("<span class='success-text'>CLEAR! LEVEL OFF</span>", 3000);
                    document.getElementById('tk-alert-overlay').className = '';
                }
            }
            else if (tkState.phase === 4 && tkState.progress > 35) { 
                tkState.phase = 5; 
                tkState.currTargetMin = -8; 
                tkState.currTargetMax = -2; 
                setDialogue("<span class='alert-text'>GEAR LOST! LAND NOW!</span>", 4000);
                if(tkState.autoPilot) toggleAutoPilot();
                
                document.getElementById('tk-plane-img').src = playerNoGearSkin;
            }
            
            if (tkState.phase === 5 && tkState.altitude <= 0) {
                 tkState.phase = 6; 
                 tkState.altitude = 0; 
                 tkState.vSpeed = 0; 
                 setDialogue("<span class='alert-text'>BRAKES ON!</span>", 3000);
                 if(tkState.autoPilot) toggleAutoPilot();
            }

            // 5. CAMERA LOGIC
            tkState.bgX_sky -= (tkState.speed * 0.006 * SPEED_MOD);
            tkState.bgX_city -= (tkState.speed * 0.03 * SPEED_MOD);
            tkState.bgX_runway -= (tkState.speed * 0.18 * SPEED_MOD);
            document.getElementById('tk-bg-sky').style.backgroundPosition = `${tkState.bgX_sky}px 0px`;
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgX_city}px bottom`;
            document.getElementById('tk-runway-stripes').style.backgroundPosition = `${tkState.bgX_runway}px 10px`;

            let maxVisualAltitude = Math.min(60, window.innerHeight * 0.15);
            let baseTargetCam = Math.max(0, tkState.altitude - maxVisualAltitude);
            
            if (isLandingApproach) baseTargetCam -= 20; 

            tkState.cameraY += (baseTargetCam - tkState.cameraY) * 0.15;

            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.7}px)`;
            document.getElementById('tk-bg-sky').style.transform = `translateY(${tkState.cameraY * 0.2}px)`;
            document.getElementById('tk-mountain').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-sun').style.transform = `translateY(${tkState.cameraY * 0.2}px)`;

            let planeY = -(tkState.altitude - tkState.cameraY);
            document.getElementById('plane-container').style.transform = `translateX(-50%) translateY(${planeY}px)`;
            
            document.getElementById('plane-rotate-group').style.transform = `rotate(${-tkState.pitch}deg)`;
            document.getElementById('plane-hud').style.transform = `translate(-50%, -50%) rotate(${-tkState.hudPitch}deg)`;

            tkState.frameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
