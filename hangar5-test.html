<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - Gyro HUD Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --brand-gold: #cfa86e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden; user-select: none; touch-action: none;
        }

        #game-wrapper { width: 100%; height: 100%; position: relative; }

        #takeoff-viewport {
            width: 100%; height: 100%; position: relative; overflow: hidden; 
            background-color: #4a9ae9; cursor: pointer;
        }
        
        #tk-alert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 7; transition: box-shadow 0.2s;
        }
        .flashing { animation: redAlert 0.4s infinite alternate; }
        @keyframes redAlert { 
            from { box-shadow: inset 0 0 10px rgba(215, 25, 32, 0.2); background: rgba(215, 25, 32, 0.1); } 
            to { box-shadow: inset 0 0 100px rgba(215, 25, 32, 0.8); background: rgba(215, 25, 32, 0.4); } 
        }

        .parallax-layer { position: absolute; left: 0; right: 0; top: 0; bottom: 80px; pointer-events: none; }
        #tk-bg-sky { background-size: 1024px 100%; z-index: 0; height: 150%; background-color: #87CEEB;}
        #tk-bg-city { height: 60%; background-size: 1024px 100%; background-position: bottom left; z-index: 1; bottom: 80px; top: auto; }
        
        #tk-runway { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #222; z-index: 3;}
        #tk-runway-stripes { width: 100%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); background-position: 0px 10px; background-size: 200px 6px; background-repeat: repeat-x;}

        /* HUD & Plane */
        #plane-container {
            position: absolute; left: 30%; bottom: 70px; 
            transform: translateX(-50%); z-index: 5; pointer-events: none;
        }
        #plane-scale-wrapper { position: relative; width: 140px; height: 50px; }
        #tk-plane-img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 6; }
        
        #plane-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border-radius: 50%;
            border: 3px dashed rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.1s; z-index: 5;
        }
        
        .hud-text { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; color: #fff; }
        .hud-label { font-size: 0.7rem; color: rgba(255,255,255,0.7); }
        .hud-val { font-size: 1.4rem; display: block; }

        #hud-spd { left: -10px; top: 50%; transform: translate(-100%, -50%); }
        #hud-pitch { right: -10px; top: 50%; transform: translate(100%, -50%); }
        #hud-alt { bottom: -5px; left: 50%; transform: translate(-50%, 100%); }

        .hud-reticle { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); }

        /* HUD TOP ELEMENTS */
        #tk-hud-top { 
            position: absolute; top: max(15px, env(safe-area-inset-top)); left: max(15px, env(safe-area-inset-left)); right: max(15px, env(safe-area-inset-right)); 
            display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; 
        }
        #tk-score-display { color: var(--brand-gold); font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--brand-gold);}
        
        #reset-btn { 
            background: rgba(215, 25, 32, 0.8); border: 2px solid #fff; border-radius: 8px;
            color: #fff; font-size: 1.2rem; cursor: pointer; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(5px);
        }

        #prompt-container { position: absolute; top: max(75px, env(safe-area-inset-top) + 60px); left: 50%; transform: translateX(-50%); z-index: 8; pointer-events: none; width: 90%; max-width: 400px;}
        #tk-touch-prompt { 
            background: rgba(0, 0, 0, 0.8); border: 2px solid #fff; border-radius: 8px;
            padding: 12px; text-align: center; color: #fff; font-size: 1.2rem; font-weight: bold;
        }

        #tk-enemy-plane { position: absolute; left: 150%; bottom: 70px; width: 160px; height: 60px; z-index: 4; pointer-events: none; display: none; }
        .pixel-particle { position: absolute; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="takeoff-viewport">
            <div id="tk-alert-overlay"></div>
            
            <div id="tk-hud-top">
                <button id="reset-btn" onclick="startFlight()">❌</button>
                <div id="tk-score-display">SCORE: <span id="score-val">0</span></div>
            </div>
            
            <div id="prompt-container">
                <div id="tk-touch-prompt">TAP TO START ENGINES</div>
            </div>
            
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky1.png');"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('city1.png');"></div>
            
            <div id="plane-container">
                <div id="plane-scale-wrapper">
                    <img id="tk-plane-img" src="my-plane.png" onerror="this.style.display='none'; this.parentElement.style.background='#3498db';">
                    <div id="plane-hud">
                        <div class="hud-reticle"></div>
                        <div id="hud-spd" class="hud-text"><div class="hud-label">SPD</div><div id="hud-spd-val" class="hud-val">0</div></div>
                        <div id="hud-pitch" class="hud-text"><div class="hud-label">PITCH</div><div id="hud-pitch-val" class="hud-val">0&deg;</div></div>
                        <div id="hud-alt" class="hud-text"><div class="hud-label">ALT</div><div id="hud-alt-val" class="hud-val">0m</div></div>
                    </div>
                </div>
            </div>
            
            <div id="tk-enemy-plane"><img src="my-plane-golden.png" style="width: 100%; height: 100%; object-fit: contain;"></div>
            <div id="tk-runway"><div id="tk-runway-stripes"></div></div>
        </div>
    </div>

    <script>
        let tkState = {
            active: false, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, 
            progress: 0, altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
            lastFrameTime: 0, enemyX: 150, enemyAltitude: 0, currTargetMin: 10, currTargetMax: 16
        };

        const CRUISE_ALT = 1200;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            if (!tkState.active && tkState.speed === 0) startFlight();
            tkState.pressing = true;
        });
        window.addEventListener('pointerup', () => tkState.pressing = false);

        function startFlight() {
            document.querySelectorAll('.pixel-particle').forEach(el => el.remove());
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
                lastFrameTime: performance.now(), enemyX: 150, enemyAltitude: 0,
                currTargetMin: 10, currTargetMax: 16
            };

            document.getElementById('plane-container').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('score-val').textContent = '0';
            document.getElementById('tk-touch-prompt').textContent = 'ACCELERATING...';

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function checkCollision() {
            const pRect = document.getElementById('tk-plane-img').getBoundingClientRect();
            const eRect = document.getElementById('tk-enemy-plane').getBoundingClientRect();
            return !(pRect.right < eRect.left || pRect.left > eRect.right || pRect.bottom < eRect.top || pRect.top > eRect.bottom);
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 16) { tkState.frameId = requestAnimationFrame(gameLoop); return; }
            tkState.lastFrameTime = timestamp;

            const prompt = document.getElementById('tk-touch-prompt');
            const spdVal = document.getElementById('hud-spd-val');
            const altVal = document.getElementById('hud-alt-val');
            const pitchVal = document.getElementById('hud-pitch-val');
            const hudRing = document.getElementById('plane-hud');

            // 1. SPEED & PROGRESS
            if (tkState.phase < 6) {
                let accel = (tkState.phase === 5) ? -0.2 : 0.8;
                if (tkState.pitch > 0) accel -= (tkState.pitch * 0.04);
                if (tkState.pitch < 0) accel += (Math.abs(tkState.pitch) * 0.02);
                tkState.speed = Math.max((tkState.phase === 0 ? 0 : 100), Math.min(220, tkState.speed + accel));
            } else {
                tkState.speed = Math.max(0, tkState.speed - 1.2);
                if (tkState.speed === 0) return triggerWin();
            }
            if (tkState.phase > 0 && tkState.phase < 6) tkState.progress += (tkState.speed / 5000);

            // 2. PITCH & ALTITUDE
            if (tkState.pressing && tkState.speed >= 100) tkState.pitchVelocity += 0.07;
            else if (tkState.speed >= 100) tkState.pitchVelocity -= 0.05;
            tkState.pitchVelocity *= 0.88;
            tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));

            if (tkState.altitude <= 0 && tkState.pitch < 0) tkState.pitch = 0;

            let targetVSpeed = tkState.pitch * 0.4;
            if (tkState.speed < 140 && tkState.altitude > 0) targetVSpeed -= 2;
            tkState.vSpeed += (targetVSpeed - tkState.vSpeed) * 0.1;

            if (tkState.phase !== 6) tkState.altitude = Math.max(0, tkState.altitude + tkState.vSpeed);

            // 3. HUD UPDATES
            spdVal.textContent = Math.floor(tkState.speed);
            altVal.textContent = Math.floor(tkState.altitude) + 'm';
            pitchVal.innerHTML = Math.floor(tkState.pitch) + '&deg;';
            
            let inZone = (tkState.pitch >= tkState.currTargetMin && tkState.pitch <= tkState.currTargetMax);
            let hue = inZone ? 120 : Math.max(0, 120 - Math.abs(tkState.pitch - (tkState.currTargetMin+tkState.currTargetMax)/2) * 8);
            let color = `hsl(${hue}, 85%, 55%)`;
            hudRing.style.borderColor = color;
            pitchVal.parentElement.style.color = color;
            if (inZone && tkState.phase > 0 && tkState.phase < 6) tkState.score += 2;
            document.getElementById('score-val').textContent = Math.floor(tkState.score);

            // 4. PHASE LOGIC
            if (tkState.phase === 0 && tkState.speed >= 150) { tkState.phase = 1; prompt.textContent = "PITCH TO 15°"; }
            else if (tkState.phase === 1 && tkState.altitude >= CRUISE_ALT) { tkState.phase = 2; tkState.currTargetMin = -3; tkState.currTargetMax = 3; prompt.textContent = "LEVEL OFF (0°)"; }
            else if (tkState.phase === 2 && tkState.progress > 35) {
                tkState.phase = 3; tkState.currTargetMin = -20; tkState.currTargetMax = -10;
                prompt.textContent = "TRAFFIC ALERT: DIVE!"; prompt.className = "prompt-alert";
                document.getElementById('tk-alert-overlay').className = 'flashing';
                document.getElementById('tk-enemy-plane').style.display = 'block';
                tkState.enemyX = 150; tkState.enemyAltitude = tkState.altitude;
            }
            else if (tkState.phase === 3) {
                tkState.enemyX -= 1.2;
                document.getElementById('tk-enemy-plane').style.left = tkState.enemyX + '%';
                document.getElementById('tk-enemy-plane').style.transform = `translateY(${-(tkState.enemyAltitude - tkState.cameraY)}px)`;
                if (checkCollision()) return triggerCrash("MID-AIR COLLISION!");
                if (tkState.enemyX < -20) {
                    tkState.phase = 4; tkState.currTargetMin = -3; tkState.currTargetMax = 3;
                    prompt.textContent = "CLEAR. LEVEL OFF."; prompt.className = '';
                    document.getElementById('tk-alert-overlay').className = '';
                }
            }
            else if (tkState.phase === 4 && tkState.progress > 70) { tkState.phase = 5; tkState.currTargetMin = -8; tkState.currTargetMax = -2; prompt.textContent = "APPROACH: DESCEND"; }
            
            if (tkState.phase === 5 && tkState.altitude <= 0) {
                if (tkState.pitch >= -5 && tkState.pitch <= 15) { tkState.phase = 6; tkState.altitude = 0; prompt.textContent = "TOUCHDOWN! BRAKING..."; }
                else return triggerCrash("CRASHED ON LANDING!");
            }

            // 5. CAMERA & SCENERY
            let targetCam = Math.max(0, tkState.altitude - (window.innerHeight * 0.3));
            tkState.cameraY += (targetCam - tkState.cameraY) * 0.1;
            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.6}px)`;
            
            let planeY = -(tkState.altitude - tkState.cameraY);
            document.getElementById('plane-container').style.transform = `translateX(-50%) translateY(${planeY}px)`;
            document.getElementById('tk-plane-img').style.transform = `rotate(${-tkState.pitch}deg)`;

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function triggerCrash(msg) {
            tkState.active = false;
            document.getElementById('tk-touch-prompt').textContent = msg;
            document.getElementById('tk-touch-prompt').className = "prompt-alert";
            confetti({ colors: ['#ff0000', '#ffaa00'] });
            setTimeout(() => { document.getElementById('tk-touch-prompt').textContent = "TAP TO RETRY"; }, 2000);
        }

        function triggerWin() {
            tkState.active = false;
            document.getElementById('tk-touch-prompt').textContent = "MISSION COMPLETE!";
            confetti({ particleCount: 150 });
        }
    </script>
</body>
</html>
