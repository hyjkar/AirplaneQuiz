<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - v2.7 Stability & Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --brand-gold: #cfa86e;
            --fo-blue: #3498db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            background-color: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            width: 100%; height: 100%;
            overflow: hidden; user-select: none; touch-action: none;
        }

        #orientation-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 99999; align-items: center; 
            justify-content: center; font-size: 1.2rem; text-align: center; padding: 20px;
        }
        @media screen and (orientation: portrait) { #orientation-lock { display: flex; } }

        #takeoff-viewport {
            width: 100%; height: 100%; position: relative; overflow: hidden; 
            background-color: #4a9ae9; cursor: pointer; transition: background-color 0.5s;
        }
        
        #tk-alert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30; transition: background 0.2s;
        }
        .flashing { animation: redAlert 0.3s infinite alternate; }
        @keyframes redAlert { from { background: rgba(215, 25, 32, 0); } to { background: rgba(215, 25, 32, 0.35); } }

        #tk-version {
            position: absolute; bottom: 5px; right: 10px; color: rgba(255,255,255,0.3);
            font-size: 0.7rem; z-index: 50; pointer-events: none;
        }

        #camera-rig {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: 30% 80%; will-change: transform; z-index: 1;
        }

        .parallax-layer { 
            position: absolute; left: 0; right: 0; top: 0; bottom: 0; 
            pointer-events: none; background-repeat: repeat-x; 
            transition: filter 0.5s, background-color 0.5s;
        }

        #tk-bg-sky { background-size: auto 100vh; z-index: 0; height: 400%; background-color: #87CEEB; top: -150%;}
        #tk-bg-city { height: 100%; background-size: auto 100%; background-position: bottom left; z-index: 1; top: 0; }
        
        #tk-runway { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #222; z-index: 3; }
        #tk-runway-stripes { 
            width: 100%; height: 100%; 
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); 
            background-position: 0px 10px; background-size: 200px 6px; background-repeat: repeat-x;
        }

        .weather-layer { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
        .night-weather .rain-layer, .night-weather .fog-layer.layer-back { display: block; }
        .snow-weather .snow-layer, .snow-weather .fog-layer { display: block; }
        
        .night-weather { background-color: #0b1021 !important; }
        .night-weather #tk-bg-sky { background-color: #0b1021 !important; background-image: none !important; }
        .night-weather #tk-bg-city, .night-weather #tk-runway, .night-weather #tk-mountain { filter: brightness(0.25) sepia(0.5) hue-rotate(180deg) saturate(1.2); }
        .night-weather #tk-plane-img, .night-weather [id*="plane"] img { filter: brightness(0.55); }

        .fog-layer.layer-back { background: radial-gradient(circle at 50% 50%, rgba(180, 190, 210, 0.4) 0%, transparent 60%); background-size: 300% 200%; animation: fogPulse 15s ease-in-out infinite alternate; z-index: 8; }
        .fog-layer.layer-front { background: radial-gradient(ellipse at center, rgba(200, 210, 220, 0.95) 0%, transparent 40%); background-size: 200% 100%; animation: fogSweep 7s linear infinite; z-index: 15; }
        @keyframes fogSweep { 0% { background-position: 200% 50%; } 100% { background-position: -100% 50%; } }
        @keyframes fogPulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.2); } }

        .rain-layer.layer-1 { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><rect x='20' y='20' width='2' height='15' fill='rgba(255,255,255,0.4)'/></svg>"); animation: rainAnim1 0.4s linear infinite; z-index: 11; }
        @keyframes rainAnim1 { from { background-position: 0 0; } to { background-position: -60px 250px; } }

        #plane-container { position: absolute; left: 30%; bottom: 65px; transform: translateX(-50%); z-index: 10; pointer-events: none; width: 150px; height: 50px; }
        #plane-rotate-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; z-index: 12; }
        #tk-plane-img { width: 100%; height: 100%; object-fit: contain; position: relative; }
        
        #plane-hud { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border-radius: 50%; border: 2px dashed #fff; z-index: 11; }
        .hud-text { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; color: #fff; }
        .hud-label { font-size: 0.5rem; opacity: 0.8; display: block; }
        .hud-val { font-size: 0.9rem; display: block; }
        #hud-spd { left: -5px; top: 50%; transform: translate(-100%, -50%); }
        #hud-pitch { right: -5px; top: 50%; transform: translate(100%, -50%); }
        #hud-alt { bottom: -5px; left: 50%; transform: translate(-50%, 100%); }

        #dialogue-bubble {
            position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #111; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem;
            white-space: nowrap; opacity: 0; transition: opacity 0.2s ease; z-index: 20; font-weight: bold; text-transform: uppercase;
        }
        #dialogue-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent; }

        #tk-hud-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; }
        .top-left-controls { display: flex; gap: 8px; pointer-events: auto; }
        #tk-score-display { color: var(--brand-gold); font-size: 0.9rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--brand-gold);}
        
        #reset-btn { background: var(--brand-red); border: 1px solid #fff; border-radius: 6px; color: #fff; width: 34px; height: 34px; cursor: pointer; }
        #ap-btn { background: #333; border: 1px solid #aaa; border-radius: 6px; color: #aaa; font-size: 0.7rem; padding: 0 8px; height: 34px; font-family: 'Share Tech Mono'; font-weight: bold; pointer-events: auto; }

        #tk-enemy-plane, #tk-golden-plane { position: absolute; bottom: 65px; width: 162px; height: 56px; z-index: 9; display: none; }
        #tk-mountain { position: absolute; bottom: 65px; left: 100%; width: 220px; height: 120px; z-index: 2; display: none; }
        
        .pixel-particle, .spark-particle, .smoke-particle, .score-particle { position: absolute; pointer-events: none; }
        .score-particle { width: 5px; height: 5px; border-radius: 50%; z-index: 102; }

        /* End Screen UI - Fixed for Mobile Landscape */
        #tk-end-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; display: none; 
            align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s;
        }
        #tk-end-screen.visible { opacity: 1; pointer-events: auto; }
        .end-panel { 
            background: #111; border: 2px solid var(--brand-gold); border-radius: 12px; 
            padding: 15px 30px; text-align: center; max-width: 90%; max-height: 90%;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .end-title { font-size: 1.2rem; color: #fff; }
        .end-score { font-size: 2.2rem; color: var(--gauge-green); font-weight: bold; margin: 5px 0; }
        .reward-icons { display: flex; gap: 10px; height: 40px; }
        .reward-icon { width: 35px; height: 35px; fill: #333; transition: transform 0.4s; }
        .reward-icon.pop { transform: scale(1.2); }
        .reward-icon.golden { fill: var(--brand-gold); filter: drop-shadow(0 0 8px var(--brand-gold)); }
        .play-again-btn { background: var(--brand-gold); border: none; padding: 10px 20px; font-size: 0.9rem; font-weight: bold; border-radius: 6px; font-family: 'Share Tech Mono'; cursor: pointer; }
    </style>
</head>
<body>

    <div id="orientation-lock">PLEASE ROTATE DEVICE TO LANDSCAPE</div>

    <div id="takeoff-viewport">
        <div id="tk-version">v2.7</div>
        <div id="tk-alert-overlay"></div>
        
        <div id="tk-hud-top">
            <div class="top-left-controls">
                <button id="reset-btn" onclick="startFlight()">❌</button>
                <button id="ap-btn" onclick="toggleAutoPilot(event)">AUTO</button>
            </div>
            <div id="tk-score-display">SCORE: <span id="score-val">0</span></div>
        </div>
        
        <div id="camera-rig">
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky1.png');"></div>
            <div id="tk-sun"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('mountain.png');"></div>
            <div class="weather-layer fog-layer layer-back"></div>
            <div class="weather-layer rain-layer layer-1"></div>

            <div id="plane-container">
                <div id="dialogue-bubble"></div>
                <div id="landing-guide"><div class="guide-label">-5&deg; TO 15&deg;</div></div>
                <div id="plane-rotate-group">
                    <img id="tk-plane-img" src="my-plane.png" onerror="this.style.backgroundColor='blue';">
                </div>
                <div id="plane-hud">
                    <div id="hud-spd" class="hud-text"><span class="hud-label">SPD</span><span id="hud-spd-val" class="hud-val">0</span></div>
                    <div id="hud-pitch" class="hud-text"><span class="hud-label">PITCH</span><span id="hud-pitch-val" class="hud-val">0&deg;</span></div>
                    <div id="hud-alt" class="hud-text"><span class="hud-label">ALT</span><span id="hud-alt-val" class="hud-val">0m</span></div>
                </div>
            </div>
            
            <div id="tk-enemy-plane"><img src="my-plane-golden.png" style="width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1);"></div>
            <div id="tk-golden-plane"><img src="my-plane-golden.png" style="width: 100%; height: 100%; object-fit: contain;"></div>
            <div id="tk-runway"><div id="tk-runway-stripes"></div></div>
            <div id="tk-mountain"><svg viewBox="0 0 100 100" width="100%" height="100%"><path d="M0,100 L50,20 L100,100 Z" fill="#3b3b3b"/><path d="M42,35 L50,20 L58,35 Z" fill="#fff"/></svg></div>
        </div>

        <div id="tk-end-screen">
            <div class="end-panel">
                <div class="end-title">MISSION COMPLETE</div>
                <div class="end-score" id="end-score-val">0</div>
                <div class="reward-icons">
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                    <svg viewBox="0 0 24 24" class="reward-icon"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
                </div>
                <button class="play-again-btn" onclick="startFlight()">FLY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        let SPEED_MOD = 0.75; 
        const sfx = {
            ctx: null, alarmInterval: null, isAlarming: false,
            bgMusic: new Audio('hangar5-music.mp3'),
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.bgMusic.loop = true; this.bgMusic.volume = 0.4;
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.bgMusic.play().catch(e => {});
            },
            playAlarm: function(active) {
                if(!this.ctx || (active && this.isAlarming) || (!active && !this.isAlarming)) return;
                if(active) {
                    this.isAlarming = true;
                    this.alarmInterval = setInterval(() => {
                        let osc = this.ctx.createOscillator(); let g = this.ctx.createGain();
                        osc.type = 'square'; osc.frequency.value = 900; g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
                        osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.2);
                    }, 300);
                } else { this.isAlarming = false; clearInterval(this.alarmInterval); }
            },
            playExplosion: function() {
                if(!this.ctx) return;
                let osc = this.ctx.createOscillator(); let g = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                g.gain.setValueAtTime(0.5, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1);
                osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 1);
            },
            playDing: function(p = 1) {
                if(!this.ctx) return;
                let osc = this.ctx.createOscillator(); let g = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800 * p, this.ctx.currentTime);
                g.gain.setValueAtTime(0.2, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
                osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            },
            stopAll: function() { this.playAlarm(false); try { this.bgMusic.pause(); } catch(e) {} }
        };

        let tkState = {
            active: false, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, altitude: 0, 
            cameraY: 0, score: 0, pressing: false, frameId: null, lastFrameTime: 0, 
            currTargetMin: 10, currTargetMax: 16, takeoffDist: 150, landingDist: 260,
            weather: "day", zoom: 1.0, speedMod: 0.75, autoPilot: false, hudPitch: 0, hudPitchVelocity: 0,
            engineFailure: false, goldenPlaneActive: false, goldenPlaneX: -30, gearBroken: false, gearBreakAlt: 0
        };

        const CRUISE_ALT = 500; // Increased for longer climb

        function setDialogue(text, timeMs) {
            tkState.dialogueText = text; tkState.dialogueTimeLeft = timeMs;
        }

        function toggleAutoPilot(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!tkState.active || tkState.phase === 0 || tkState.phase >= 6) return; 
            tkState.autoPilot = !tkState.autoPilot;
            const btn = document.getElementById('ap-btn');
            if (tkState.autoPilot) {
                btn.style.background = 'var(--gauge-green)'; btn.style.color = '#000'; sfx.playDing(1.5); 
            } else {
                btn.style.background = '#333'; btn.style.color = '#aaa'; sfx.playDing(0.8);
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            sfx.init(); if (!tkState.active && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight();
            tkState.pressing = true;
        });
        window.addEventListener('pointerup', () => tkState.pressing = false);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); sfx.init(); 
                if (!tkState.active && document.getElementById('tk-end-screen').style.display !== 'flex') startFlight();
                tkState.pressing = true;
            }
            if (e.code === 'Enter' || e.key === 'Enter') toggleAutoPilot();
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space' || e.key === ' ') tkState.pressing = false; });

        function startFlight() {
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            document.querySelectorAll('.pixel-particle, .score-particle').forEach(p => p.remove());
            document.getElementById('tk-end-screen').style.display = 'none';
            document.getElementById('tk-plane-img').src = 'my-plane.png';
            
            let weather = Math.random() > 0.5 ? (Math.random() > 0.5 ? 'night' : 'sunrise') : 'day';
            let vp = document.getElementById('takeoff-viewport');
            vp.classList.remove('night-weather', 'sunrise-weather');
            if(weather !== 'day') vp.classList.add(weather + '-weather');

            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, lastFrameTime: performance.now(),
                currTargetMin: 10, currTargetMax: 16, takeoffDist: 150, landingDist: 260,
                zoom: 1.0, speedMod: 0.75, autoPilot: false, weather: weather,
                hudPitch: 0, hudPitchVelocity: 0, engineFailure: false, 
                hasEngineScenario: Math.random() > 0.5,
                hasGoldenScenario: Math.random() > 0.5, goldenPlaneActive: false, goldenPlaneX: -30,
                gearBroken: false, gearBreakAlt: Math.random() * (CRUISE_ALT - 100) + 100
            };
            setDialogue("<span class='capt-text'>FULL POWER!</span>", 3000);
            document.getElementById('plane-container').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-golden-plane').style.display = 'none';
            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function spawnScoreParticle(cx, cy, pitch) {
            let p = document.createElement('div'); p.className = 'score-particle';
            p.style.backgroundColor = '#cfa86e'; p.style.boxShadow = `0 0 8px #cfa86e`; 
            let rad = -pitch * (Math.PI / 180);
            p.style.left = (cx + Math.cos(rad) * -65) + 'px'; p.style.top = (cy + Math.sin(rad) * -65) + 'px';
            document.getElementById('camera-rig').appendChild(p);
            let vx = -(Math.random() * 4 + 4) * SPEED_MOD; let vy = (Math.random() * 2 - 1) * SPEED_MOD;
            let age = 0; let maxAge = 25;
            function move() {
                age++; p.style.left = (parseFloat(p.style.left) + vx) + 'px'; p.style.top = (parseFloat(p.style.top) + vy - 0.1) + 'px';
                p.style.opacity = 1 - (age / maxAge); if(age < maxAge) requestAnimationFrame(move); else p.remove();
            } move();
        }

        function triggerCrash(reason) {
            sfx.stopAll(); sfx.playExplosion();
            const r = document.getElementById('tk-plane-img').getBoundingClientRect();
            document.getElementById('plane-container').style.display = 'none';
            tkState.active = false; setDialogue(`<span class='alert-text'>${reason}</span>`, 4000);
            setTimeout(() => { startFlight(); }, 4000);
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            tkState.lastFrameTime = timestamp;

            // Physics
            if (tkState.phase === 0 && tkState.speed < 150) { tkState.pitch = 0; }
            else if (!tkState.autoPilot) {
                if (tkState.pressing) tkState.pitchVelocity += 0.1; else tkState.pitchVelocity -= 0.08;
                if (tkState.engineFailure) tkState.pitchVelocity += (Math.random() - 0.5) * 0.4;
                tkState.pitchVelocity *= 0.88; tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));
            }
            
            tkState.hudPitchVelocity += (tkState.pitch - tkState.hudPitch) * 0.1;
            tkState.hudPitchVelocity *= 0.8; tkState.hudPitch += tkState.hudPitchVelocity;

            let accel = (tkState.phase === 5) ? -1.6 : (tkState.phase === 0 ? 0.8 : 1.5);
            tkState.speed = Math.max((tkState.phase === 0 ? 0 : 85), Math.min(240, tkState.speed + accel * SPEED_MOD));
            tkState.vSpeed += (tkState.pitch * 0.55 * SPEED_MOD - tkState.vSpeed) * 0.12;
            tkState.altitude = Math.max(0, tkState.altitude + tkState.vSpeed);

            // Phase Logic
            if (tkState.phase === 0 && tkState.speed >= 150) { tkState.phase = 1; setDialogue("V1! PULL UP!", 3000); }
            
            // Randomized Gear Break during Phase 1 climb
            if (tkState.phase === 1 && tkState.altitude >= tkState.gearBreakAlt && !tkState.gearBroken) {
                tkState.gearBroken = true; sfx.playExplosion();
                setDialogue("<span class='alert-text'>GEAR SNAP!</span>", 3000);
            }

            if (tkState.phase === 1 && tkState.altitude >= CRUISE_ALT) { tkState.phase = 2; tkState.currTargetMin = -3; tkState.currTargetMax = 3; setDialogue("LEVEL OFF", 3000); }

            // Collision Checks
            if (tkState.altitude <= 0 && tkState.phase >= 2) {
                if (tkState.pitch < -5 || tkState.pitch > 15) return triggerCrash("FATAL ANGLE!");
                if (tkState.speed > 160 && tkState.phase === 5) return triggerCrash("TOO FAST!");
            }

            // Visual Updates
            document.getElementById('hud-spd-val').textContent = Math.floor(tkState.speed);
            document.getElementById('hud-pitch-val').innerHTML = Math.floor(tkState.pitch) + '&deg;';
            document.getElementById('hud-alt-val').textContent = Math.floor(tkState.altitude) + 'm';
            
            const inZone = (tkState.pitch >= tkState.currTargetMin && tkState.pitch <= tkState.currTargetMax);
            document.getElementById('plane-hud').style.borderColor = inZone ? 'var(--gauge-green)' : 'var(--brand-red)';
            
            if (inZone && tkState.phase > 0 && tkState.phase < 6) {
                tkState.score += tkState.autoPilot ? 10 : 4;
                if (Math.random() > 0.5) {
                    const r = document.getElementById('tk-plane-img').getBoundingClientRect();
                    spawnScoreParticle(r.left + r.width/2, r.top + r.height/2, tkState.pitch);
                }
            }
            document.getElementById('score-val').textContent = Math.floor(tkState.score);

            // Camera & Parallax
            tkState.bgX_city -= (tkState.speed * 0.03);
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgX_city}px bottom`;
            let targetCam = Math.max(0, tkState.altitude - 100);
            tkState.cameraY += (targetCam - tkState.cameraY) * 0.1;
            
            document.getElementById('plane-container').style.transform = `translateX(-50%) translateY(${-(tkState.altitude - tkState.cameraY)}px)`;
            document.getElementById('plane-rotate-group').style.transform = `rotate(${-tkState.pitch}deg)`;
            document.getElementById('plane-hud').style.transform = `translate(-50%, -50%) rotate(${-tkState.hudPitch}deg)`;
            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.7}px)`;

            const bubble = document.getElementById('dialogue-bubble');
            if (tkState.dialogueTimeLeft > 0) {
                tkState.dialogueTimeLeft -= delta; bubble.innerHTML = tkState.dialogueText; bubble.style.opacity = 1;
            } else { bubble.style.opacity = 0; }

            // End logic
            if (tkState.phase === 5 && tkState.altitude <= 0) { 
                tkState.active = false; showEndScreen(Math.floor(tkState.score)); 
            } else {
                tkState.frameId = requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
