<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - Dynamic Flight Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --gauge-orange: #f39c12;
            --bg-dark: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #222; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #game-wrapper {
            width: 100%; max-width: 600px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Viewport & Environment */
        #takeoff-viewport {
            position: relative; width: 100%; height: 350px; 
            border: 4px solid #444; border-radius: 8px; overflow: hidden; 
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 50%, #87CEEB 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        
        /* Red flashing overlay for alerts */
        #tk-alert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 0px rgba(215, 25, 32, 0);
            pointer-events: none; z-index: 7; transition: box-shadow 0.2s;
        }
        .flashing { animation: redAlert 0.4s infinite alternate; }
        @keyframes redAlert { 
            from { box-shadow: inset 0 0 10px rgba(215, 25, 32, 0.2); background: rgba(215, 25, 32, 0.1); } 
            to { box-shadow: inset 0 0 80px rgba(215, 25, 32, 0.8); background: rgba(215, 25, 32, 0.3); } 
        }

        /* Scenery */
        .parallax-layer { position: absolute; left: 0; right: 0; top: 0; bottom: 32px; pointer-events: none; }
        
        #tk-bg-sky { background-size: 1024px 100%; z-index: 0; height: 150%; background-color: #87CEEB;}
        #tk-bg-city { height: 60%; background-size: 1024px 100%; background-position: bottom left; z-index: 1; bottom: 32px; top: auto; }
        
        #tk-clouds { 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100"><circle cx="50" cy="50" r="30" fill="white" opacity="0.15"/><circle cx="90" cy="60" r="40" fill="white" opacity="0.15"/><circle cx="140" cy="40" r="35" fill="white" opacity="0.15"/></svg>') repeat-x; 
            background-size: 300px 150px; height: 200%; z-index: 2; 
        }
        
        /* Ground */
        #tk-runway { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: #222; z-index: 3;}
        #tk-runway-stripes { width: 100%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); background-position: 0px 14px; background-size: 200px 4px; background-repeat: repeat-x;}

        /* Entities */
        #tk-plane { position: absolute; left: 20px; bottom: 32px; width: 120px; height: 45px; transform-origin: 50% 50%; z-index: 5; pointer-events: none;}
        #tk-enemy-plane { position: absolute; left: 150%; bottom: 32px; width: 140px; height: 50px; z-index: 4; pointer-events: none; display: none; }
        #tk-mountain { position: absolute; bottom: 32px; left: 100%; width: 150px; height: 150px; z-index: 2; display: none; pointer-events: none;}

        .pixel-particle { position: absolute; z-index: 10; pointer-events: none; }

        /* UI Elements inside Viewport */
        #tk-hud-top { position: absolute; top: 10px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 10; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 0px #000; pointer-events: none; }
        #tk-alt-display { color: #fff; }
        #tk-score-display { color: var(--brand-gold); }
        
        #tk-touch-prompt { position: absolute; top: 35px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 1.3rem; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 8; }
        .prompt-pulse { animation: pulseText 1s infinite alternate; }
        .prompt-alert { color: #ff3333 !important; animation: rapidPulse 0.2s infinite alternate; font-weight: bold; font-size: 1.5rem !important; text-shadow: 0 0 10px red, 2px 2px 0 #000 !important;}
        @keyframes pulseText { from { opacity: 0.5; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }
        @keyframes rapidPulse { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }

        /* The Pitch Gauge (-20 to +30 degrees) */
        #tk-gauge-container { position: absolute; right: 15px; top: 60px; bottom: 15px; width: 25px; background: rgba(0,0,0,0.6); border-radius: 4px; border: 2px solid #fff; z-index: 6; pointer-events: none;}
        #tk-target-zone { position: absolute; left: 0; right: 0; background: var(--gauge-green); transition: bottom 0.2s linear, height 0.2s linear; box-shadow: 0 0 10px var(--gauge-green); }
        /* Changed Needle to a neutral white indicator */
        #tk-needle { position: absolute; left: -8px; right: -8px; bottom: 40%; height: 4px; background: #fff; transition: bottom 0.05s linear; box-shadow: 0 0 6px rgba(255,255,255,0.8); z-index: 8;}

        /* Dashboard */
        .takeoff-dashboard { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; padding: 15px; background: var(--bg-dark); border-radius: 8px; border: 2px solid #333; }
        .v-gauge-container { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 30%; }
        .v-gauge-label { color: #888; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        .v-gauge-bg { width: 35px; height: 100px; background: #000; border-radius: 4px; border: 1px solid #444; position: relative; overflow: hidden; }
        .v-gauge-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; transition: height 0.1s linear, background-color 0.2s ease; }
        .v-gauge-val { font-size: 1.2rem; min-height: 1.2rem; color: #fff; font-weight: bold; transition: color 0.2s; }

        .btn-panel { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        button { flex: 1; padding: 15px; background: var(--brand-gold); color: #000; border: none; border-radius: 8px; font-family: 'Share Tech Mono'; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase;}
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 10px;">
        <h1 style="color: var(--brand-gold); margin: 0; font-size: 2rem;">HANGAR 5 PROTOTYPE</h1>
        <h2 style="color: #aaa; margin: 5px 0;">Dynamic Flight Simulator</h2>
    </div>

    <div id="game-wrapper">
        <div id="takeoff-viewport">
            <div id="tk-alert-overlay"></div>
            
            <div id="tk-hud-top">
                <div id="tk-alt-display">ALT: 0m</div>
                <div id="tk-score-display">SCORE: 0</div>
            </div>
            
            <div id="tk-touch-prompt" class="prompt-pulse">TAP TO START ENGINES</div>
            
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky1.png');"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('city1.png');"></div>
            <div id="tk-clouds" class="parallax-layer"></div>
            
            <div id="tk-gauge-container">
                <div id="tk-target-zone"></div>
                <div id="tk-needle"></div>
            </div>
            
            <div id="tk-mountain"><svg viewBox="0 0 100 100" shape-rendering="crispEdges" width="100%" height="100%"><rect x="50" y="40" width="10" height="60" fill="#3b3b3b"/><rect x="40" y="50" width="30" height="50" fill="#4a4a4a"/><rect x="20" y="60" width="70" height="40" fill="#2d2d2d"/><rect x="0" y="70" width="100" height="30" fill="#1f1f1f"/><rect x="50" y="40" width="10" height="10" fill="#fff"/><rect x="40" y="50" width="10" height="10" fill="#eee"/><rect x="60" y="50" width="10" height="10" fill="#eee"/></svg></div>

            <div id="tk-plane"><img src="my-plane.png" onerror="this.style.display='none'; this.parentElement.style.background='#3498db';" style="width: 125%; height: 125%; object-fit: contain; pointer-events: none;"></div>
            
            <div id="tk-enemy-plane"><img src="my-plane-golden.png" onerror="this.style.display='none'; this.parentElement.style.background='gold';" style="width: 100%; height: 100%; object-fit: contain; pointer-events: none; transform: scaleX(-1);"></div>
            
            <div id="tk-runway"><div id="tk-runway-stripes"></div></div>
        </div>
        
        <div class="takeoff-dashboard">
            <div class="v-gauge-container">
                <div class="v-gauge-label">SPEED</div>
                <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-speed-bar" style="background:var(--brand-red);"></div></div>
                <div class="v-gauge-val" id="tk-speed-val" style="color:var(--brand-red);">0</div>
            </div>
            <div class="v-gauge-container">
                <div class="v-gauge-label">PROGRESS</div>
                <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-prog-bar" style="background:var(--aux-blue);"></div></div>
                <div class="v-gauge-val" style="color:var(--aux-blue);" id="tk-prog-val">0%</div>
            </div>
            <div class="v-gauge-container">
                <div class="v-gauge-label">PITCH</div>
                <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-pitch-bar" style="background:#fff;"></div></div>
                <div class="v-gauge-val" id="tk-pitch-val" style="color:#fff;">0&deg;</div>
            </div>
        </div>

        <div class="btn-panel">
            <button onclick="startFlight()">Reset Mission</button>
        </div>
    </div>

    <script>
        let tkState = {
            active: false,
            phase: 0,         // 0: Ground, 1: Liftoff, 2: Cruise, 3: Evade, 4: Recover, 5: Landing, 6: Rollout
            pitch: 0,         
            pitchVelocity: 0,
            vSpeed: 0,        
            speed: 0,
            progress: 0,      
            altitude: 0,      
            cameraY: 0,       
            score: 0,
            takeoffDistance: 100, 
            pressing: false,
            frameId: null,
            lastFrameTime: 0,
            
            bgPosSky: 0,
            bgPosCity: 0,
            bgPosRunway: 0,
            bgPosClouds: 0,
            
            currTargetMin: 10, currTargetMax: 16,
            actualTargetMin: 10, actualTargetMax: 16,

            enemyX: 150,
            enemyAltitude: 0
        };

        const CRUISE_ALT = 1200; 

        function pitchToPercent(degrees) {
            return ((degrees + 20) / 50) * 100;
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            if (!tkState.active && tkState.phase === 0 && tkState.speed === 0) {
                startFlight();
                return;
            }
            tkState.pressing = true;
        }, {passive: false});

        window.addEventListener('pointerup', () => { tkState.pressing = false; });
        window.addEventListener('touchend', () => { tkState.pressing = false; });

        function setTargetZone(minDeg, maxDeg) {
            tkState.currTargetMin = minDeg;
            tkState.currTargetMax = maxDeg;
        }

        function startFlight() {
            document.querySelectorAll('.pixel-particle').forEach(el => el.remove());
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0, takeoffDistance: 100,
                pressing: false, frameId: null, lastFrameTime: performance.now(),
                bgPosSky: 0, bgPosCity: 0, bgPosRunway: 0, bgPosClouds: 0, enemyX: 150, enemyAltitude: 0,
                currTargetMin: 10, currTargetMax: 16, 
                actualTargetMin: 10, actualTargetMax: 16
            };

            document.getElementById('tk-plane').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-mountain').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('tk-score-display').textContent = `SCORE: 0`;
            document.getElementById('tk-alt-display').textContent = `ALT: 0m`;
            
            document.getElementById('tk-bg-sky').style.transform = `translateY(0px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(0px)`;
            document.getElementById('tk-runway').style.transform = `translateY(0px)`;
            document.getElementById('tk-clouds').style.transform = `translateY(0px)`;

            const prompt = document.getElementById('tk-touch-prompt');
            prompt.textContent = "ACCELERATING...";
            prompt.className = 'prompt-pulse';
            prompt.style.opacity = '1';

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function checkCollision() {
            // Precise AABB (Axis-Aligned Bounding Box) visual collision
            const pRect = document.getElementById('tk-plane').getBoundingClientRect();
            const eRect = document.getElementById('tk-enemy-plane').getBoundingClientRect();
            
            // 15px margin to ignore transparent pixels around the plane PNGs
            const margin = 15; 
            
            let hit = !(pRect.right - margin < eRect.left + margin || 
                        pRect.left + margin > eRect.right - margin || 
                        pRect.bottom - margin < eRect.top + margin || 
                        pRect.top + margin > eRect.bottom - margin);
            return hit;
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 15) { tkState.frameId = requestAnimationFrame(gameLoop); return; }
            tkState.lastFrameTime = timestamp;

            const prompt = document.getElementById('tk-touch-prompt');

            // --- 1. SPEED & PROGRESS ---
            if (tkState.phase < 6) {
                let acceleration = 1.0; 
                if (tkState.pitch > 0) acceleration -= (tkState.pitch * 0.05); 
                if (tkState.pitch < 0) acceleration += (Math.abs(tkState.pitch) * 0.03); 

                tkState.speed += acceleration;
                tkState.speed = Math.max(0, Math.min(220, tkState.speed));
            } else {
                // Phase 6 is touchdown rollout (braking)
                tkState.speed -= 1.5;
                tkState.speed = Math.max(0, tkState.speed);
                if (tkState.speed === 0) return triggerWin();
            }
            
            if (tkState.phase > 0 && tkState.phase < 6) {
                tkState.progress += (tkState.speed / 4500); 
            }

            // Speed Color Logic (Turns green at 150)
            const speedEl = document.getElementById('tk-speed-val'); 
            const speedBar = document.getElementById('tk-speed-bar');
            if (tkState.speed >= 150) {
                speedEl.style.color = "var(--gauge-green)";
                speedBar.style.backgroundColor = "var(--gauge-green)";
            } else {
                speedEl.style.color = "var(--brand-red)";
                speedBar.style.backgroundColor = "var(--brand-red)";
            }

            // --- 2. PITCH & PHYSICS ---
            if (tkState.pressing && tkState.speed >= 100) {
                tkState.pitchVelocity += 0.06; 
            } else if (tkState.speed >= 100) {
                tkState.pitchVelocity -= 0.04; 
            }
            tkState.pitchVelocity *= 0.88; 
            tkState.pitchVelocity = Math.max(-1.5, Math.min(1.5, tkState.pitchVelocity));
            tkState.pitch += tkState.pitchVelocity;
            tkState.pitch = Math.max(-20, Math.min(30, tkState.pitch));
            
            // PREVENT NOSE DIVE ON RUNWAY
            if (tkState.altitude <= 0 && (tkState.phase === 0 || tkState.phase === 1 || tkState.phase === 6)) {
                if (tkState.pitch < 0) {
                    tkState.pitch = 0;
                    if (tkState.pitchVelocity < 0) tkState.pitchVelocity = 0;
                }
            }
            if(tkState.pitch === 30 || tkState.pitch === -20) tkState.pitchVelocity = 0;

            // SMOOTH VERTICAL LIFT
            let targetVSpeed = 0;
            if (tkState.speed >= 130) {
                targetVSpeed = tkState.pitch * 0.35;
            }
            tkState.vSpeed += (targetVSpeed - tkState.vSpeed) * 0.08;

            // Apply Lift
            if (tkState.altitude <= 0 && tkState.phase <= 1) {
                if (tkState.pitch >= 8 && tkState.speed >= 150) {
                    tkState.altitude += Math.max(0, tkState.vSpeed);
                }
            } else {
                tkState.altitude += tkState.vSpeed;
            }

            // --- RUNWAY DISTANCE & END OF RUNWAY CRASH ---
            if (tkState.phase < 2) {
                tkState.takeoffDistance -= (tkState.speed / 1200);
                
                if (tkState.takeoffDistance < 20 && tkState.altitude < 50) {
                    const mtn = document.getElementById('tk-mountain');
                    mtn.style.display = 'block';
                    mtn.style.left = `calc(${tkState.takeoffDistance * 5}% + 40px)`;
                } else {
                    document.getElementById('tk-mountain').style.display = 'none';
                }

                if (tkState.takeoffDistance <= 0 && tkState.altitude < 50) {
                    return triggerCrash("CRASHED AT END OF RUNWAY!");
                }
            }

            // --- GROUND COLLISION DETECTION (LANDING) ---
            if (tkState.altitude <= 0 && tkState.phase > 0 && tkState.phase < 6) {
                if (tkState.phase === 1) {
                    // Safe, rolling
                } else if (tkState.phase === 5) {
                    // Forgiving Touchdown Angle (-5 to 15 degrees)
                    if (tkState.pitch >= -5 && tkState.pitch <= 15) {
                        tkState.phase = 6;
                        tkState.altitude = 0;
                        setTargetZone(-2, 8); 
                        prompt.textContent = "TOUCHDOWN! BRAKING...";
                        prompt.className = "prompt-pulse";
                        prompt.style.color = "var(--gauge-green)";
                    } else {
                        tkState.altitude = 0;
                        return triggerCrash("BAD LANDING ANGLE! CRASHED!");
                    }
                } else {
                    tkState.altitude = 0;
                    return triggerCrash("CRASHED INTO GROUND!");
                }
            }

            // Camera Tracking Logic
            let optimalCameraY = tkState.altitude - 100; 
            let targetCameraY = Math.max(0, optimalCameraY);
            tkState.cameraY += (targetCameraY - tkState.cameraY) * 0.08; 

            // Target Zone Smoothing
            tkState.actualTargetMin += (tkState.currTargetMin - tkState.actualTargetMin) * 0.1;
            tkState.actualTargetMax += (tkState.currTargetMax - tkState.actualTargetMax) * 0.1;
            let inZone = (tkState.pitch >= tkState.actualTargetMin - 0.5 && tkState.pitch <= tkState.actualTargetMax + 0.5);

            // --- 3. SCORE INCREMENT ---
            if (inZone && tkState.phase > 0 && tkState.phase < 6) {
                tkState.score += 5;
                document.getElementById('tk-score-display').textContent = `SCORE: ${Math.floor(tkState.score)}`;
            }
            document.getElementById('tk-alt-display').textContent = `ALT: ${Math.floor(tkState.altitude)}m`;

            // --- 4. PHASE STATE MACHINE ---
            if (tkState.phase === 0) {
                prompt.textContent = `SPEED: ${Math.floor(tkState.speed)} KTS (WAIT FOR 150)`;
                if (tkState.speed >= 150) {
                    tkState.phase = 1;
                    prompt.textContent = "V1! PULL UP TO 15°";
                }
            } 
            else if (tkState.phase === 1) {
                if (tkState.altitude >= CRUISE_ALT) {
                    tkState.phase = 2;
                    setTargetZone(-3, 3); // Level out
                    prompt.textContent = "LEVEL THE PLANE (0°)";
                }
            }
            else if (tkState.phase === 2) {
                if (tkState.progress > 30) {
                    tkState.phase = 3;
                    setTargetZone(-16, -6); // EVASIVE DIVE!
                    prompt.textContent = "TRAFFIC! DIVE NOW!";
                    prompt.className = "prompt-alert";
                    document.getElementById('tk-alert-overlay').className = "flashing";
                    document.getElementById('tk-enemy-plane').style.display = 'block';
                    
                    tkState.enemyX = 150; 
                    // Lock the enemy directly to the player's CURRENT altitude!
                    tkState.enemyAltitude = tkState.altitude; 
                }
            }
            else if (tkState.phase === 3) {
                tkState.enemyX -= 1.0; 
                
                // Perfect Visual Bounding-Box Collision
                if (checkCollision()) {
                    return triggerCrash("MID-AIR COLLISION!");
                }
                
                if (tkState.enemyX < -30) {
                    tkState.phase = 4;
                    setTargetZone(-3, 3); // Recover level
                    prompt.textContent = "CLEAR. LEVEL OUT.";
                    prompt.className = "prompt-pulse";
                    document.getElementById('tk-alert-overlay').className = "";
                }
            }
            else if (tkState.phase === 4) {
                if (tkState.progress > 65) {
                    tkState.phase = 5;
                    setTargetZone(-8, -2); // Descent angle
                    prompt.textContent = "LANDING APPROACH - DESCEND";
                }
            }

            // --- 5. UPDATE VISUALS ---
            // Horizontal Parallax
            tkState.bgPosRunway -= tkState.speed * 0.08;
            tkState.bgPosClouds -= tkState.speed * 0.002;
            tkState.bgPosSky -= tkState.speed * 0.001;
            tkState.bgPosCity -= tkState.speed * 0.008;
            
            document.getElementById('tk-runway-stripes').style.backgroundPosition = `${tkState.bgPosRunway}px 14px`;
            document.getElementById('tk-clouds').style.backgroundPosition = `${tkState.bgPosClouds}px 50px`;
            document.getElementById('tk-bg-sky').style.backgroundPosition = `${tkState.bgPosSky}px 0px`;
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgPosCity}px 100%`;

            // Vertical Parallax (Based on Camera Altitude)
            document.getElementById('tk-bg-sky').style.transform = `translateY(${tkState.cameraY * 0.05}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.6}px)`;
            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-mountain').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-clouds').style.transform = `translateY(${tkState.cameraY * 0.4}px)`;

            // Gauges
            const bottomPercent = pitchToPercent(tkState.actualTargetMin);
            const heightPercent = pitchToPercent(tkState.actualTargetMax) - bottomPercent;
            
            const zoneEl = document.getElementById('tk-target-zone');
            zoneEl.style.bottom = `${bottomPercent}%`;
            zoneEl.style.height = `${heightPercent}%`;
            document.getElementById('tk-needle').style.bottom = `${pitchToPercent(tkState.pitch)}%`;

            // Dashboard Numbers
            document.getElementById('tk-speed-bar').style.height = `${Math.min(100, (tkState.speed / 250) * 100)}%`;
            speedEl.textContent = Math.floor(tkState.speed);
            
            document.getElementById('tk-prog-bar').style.height = `${Math.min(100, tkState.progress)}%`;
            document.getElementById('tk-prog-val').textContent = `${Math.floor(tkState.progress)}%`;
            
            const pitchEl = document.getElementById('tk-pitch-val');
            pitchEl.textContent = `${Math.floor(tkState.pitch)}°`;
            document.getElementById('tk-pitch-bar').style.height = `${pitchToPercent(tkState.pitch)}%`;
            
            // Neutral Pitch Color Update
            if (inZone && tkState.phase > 0 && tkState.phase !== 6) {
                pitchEl.style.color = "var(--gauge-green)";
                document.getElementById('tk-pitch-bar').style.backgroundColor = "var(--gauge-green)";
                if(tkState.phase !== 3) prompt.style.opacity = '0'; 
            } else if (tkState.phase !== 6) {
                // Pitch stays white/neutral instead of looking like a red warning error
                pitchEl.style.color = "#fff";
                document.getElementById('tk-pitch-bar').style.backgroundColor = "#fff";
                prompt.style.opacity = '1';
            }

            // --- RENDER PLANES ON SCREEN ---
            let planeVisualY = -(tkState.altitude - tkState.cameraY);
            let visualPitch = -tkState.pitch;
            document.getElementById('tk-plane').style.transform = `translateY(${planeVisualY}px) rotate(${visualPitch}deg)`;
            
            if (tkState.phase === 3) {
                // Enemy flies perfectly level at the locked altitude. 
                // Because they share the exact base bottom: 32px CSS, their coordinates align precisely!
                let enemyVisualY = -(tkState.enemyAltitude - tkState.cameraY);
                document.getElementById('tk-enemy-plane').style.left = `${tkState.enemyX}%`;
                document.getElementById('tk-enemy-plane').style.transform = `translateY(${enemyVisualY}px) scaleX(-1)`;
            }

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        // --- EXPLOSIONS AND RESOLUTIONS ---
        function triggerCrash(reason) {
            tkState.active = false;
            document.getElementById('tk-plane').style.display = 'none';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = "";
            
            const prompt = document.getElementById('tk-touch-prompt');
            prompt.textContent = reason;
            prompt.className = "prompt-alert";
            prompt.style.opacity = '1';
            
            const vp = document.getElementById('takeoff-viewport');
            const colors = ['#fff', 'var(--brand-red)', '#f39c12', '#1a1a1a', '#555'];
            
            const spawnX = (tkState.phase === 3 && reason === "MID-AIR COLLISION!") ? 100 : 50; 
            let planeVisualY = -(tkState.altitude - tkState.cameraY);
            
            // Explosion happens exactly where the plane died visually
            const spawnY = vp.offsetHeight - 32 + planeVisualY - 20; 
            
            for(let i = 0; i < 200; i++) {
                let p = document.createElement('div');
                p.className = 'pixel-particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = (spawnX + (Math.random() * 40 - 20)) + 'px';
                p.style.top = (spawnY + (Math.random() * 40 - 20)) + 'px';
                p.style.width = (Math.random() * 8 + 4) + 'px';
                p.style.height = p.style.width;
                vp.appendChild(p);
                
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 10 + 2;
                animateParticle(p, Math.cos(angle) * speed, Math.sin(angle) * speed);
            }
            
            vp.style.background = "#ff3333";
            setTimeout(() => vp.style.background = "linear-gradient(to bottom, #1e3c72 0%, #2a5298 50%, #87CEEB 100%)", 100);
            
            setTimeout(() => {
                document.getElementById('tk-touch-prompt').textContent = "TAP TO RETRY";
                document.getElementById('tk-touch-prompt').className = "prompt-pulse";
                document.getElementById('tk-touch-prompt').style.color = "#fff";
            }, 3000);
        }

        function animateParticle(p, vx, vy) {
            let x = parseFloat(p.style.left); let y = parseFloat(p.style.top); let age = 0;
            function step() {
                age++; if(age > 120) { p.remove(); return; } 
                if(age > 80) { p.style.opacity = 1 - ((age - 80) / 40); } 
                x += vx; y += vy; vy += 0.15; vx *= 0.98; 
                p.style.left = x + 'px'; p.style.top = y + 'px'; 
                requestAnimationFrame(step);
            } requestAnimationFrame(step);
        }

        function triggerWin() {
            tkState.active = false;
            
            const prompt = document.getElementById('tk-touch-prompt');
            prompt.textContent = `SAFE LANDING! (+${Math.floor(tkState.score)})`;
            prompt.className = "prompt-pulse";
            prompt.style.opacity = '1';
            prompt.style.color = "var(--gauge-green)";
            
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            
            setTimeout(() => {
                document.getElementById('tk-touch-prompt').textContent = "TAP TO FLY AGAIN";
                document.getElementById('tk-touch-prompt').style.color = "#fff";
            }, 4000);
        }
    </script>
</body>
