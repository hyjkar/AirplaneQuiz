<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangar 5 - Professional Flight HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-red: #d71920;
            --gauge-green: #2ecc71;
            --brand-gold: #cfa86e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            background-color: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; user-select: none; touch-action: none;
        }

        #game-wrapper { width: 100%; height: 100%; position: relative; }

        #takeoff-viewport {
            width: 100%; height: 100%; position: relative; overflow: hidden; 
            background-color: #4a9ae9; cursor: pointer;
        }
        
        #tk-alert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 7; transition: box-shadow 0.2s;
        }
        .flashing { animation: redAlert 0.4s infinite alternate; }
        @keyframes redAlert { 
            from { box-shadow: inset 0 0 10px rgba(215, 25, 32, 0.2); background: rgba(215, 25, 32, 0.1); } 
            to { box-shadow: inset 0 0 100px rgba(215, 25, 32, 0.8); background: rgba(215, 25, 32, 0.4); } 
        }

        /* Scenery Layers */
        .parallax-layer { 
            position: absolute; left: 0; right: 0; top: 0; bottom: 80px; 
            pointer-events: none; background-repeat: repeat-x; 
        }
        #tk-bg-sky { background-size: 1024px 100%; z-index: 0; height: 150%; background-color: #87CEEB;}
        #tk-bg-city { height: 60%; background-size: 1024px 100%; background-position: bottom left; z-index: 1; bottom: 80px; top: auto; }
        
        #tk-runway { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #222; z-index: 3;}
        #tk-runway-stripes { 
            width: 100%; height: 100%; 
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, #fff 50px, #fff 100px); 
            background-position: 0px 10px; background-size: 200px 6px; background-repeat: repeat-x;
        }

        /* HUD & Plane Container */
        #plane-container {
            position: absolute; left: 30%; bottom: 70px; 
            transform: translateX(-50%); z-index: 10; pointer-events: none;
        }

        #plane-rotate-group { 
            position: relative; width: 140px; height: 50px; 
            transform-origin: center center;
        }
        
        #tk-plane-img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 12; }
        
        #plane-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 240px; border-radius: 50%;
            border: 3px dashed rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.1s; z-index: 11;
        }
        
        .hud-text { position: absolute; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; color: #fff; white-space: nowrap;}
        .hud-label { font-size: 0.7rem; color: rgba(255,255,255,0.7); display: block; }
        .hud-val { font-size: 1.4rem; display: block; }

        /* HUD Layout locked to plane parts */
        #hud-spd { left: -5px; top: 50%; transform: translate(-100%, -50%); } /* Tail/Speed */
        #hud-pitch { right: -5px; top: 50%; transform: translate(100%, -50%); } /* Nose/Pitch */
        #hud-alt { bottom: -5px; left: 50%; transform: translate(-50%, 100%); } /* Belly/Alt */

        /* TOP UI */
        #tk-hud-top { 
            position: absolute; top: 15px; left: 15px; right: 15px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; 
        }
        #tk-score-display { color: var(--brand-gold); font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--brand-gold);}
        
        #reset-btn { 
            background: rgba(215, 25, 32, 0.8); border: 2px solid #fff; border-radius: 8px;
            color: #fff; font-size: 1.2rem; cursor: pointer; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(5px);
        }

        #prompt-container { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 15; pointer-events: none; width: 90%; max-width: 400px; display: flex; justify-content: center;}
        #tk-touch-prompt { 
            background: rgba(0, 0, 0, 0.8); border: 2px solid #fff; border-radius: 8px;
            padding: 12px 20px; text-align: center; color: #fff; font-size: 1.2rem; font-weight: bold; width: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #tk-enemy-plane { position: absolute; left: 150%; bottom: 70px; width: 160px; height: 60px; z-index: 9; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="takeoff-viewport">
            <div id="tk-alert-overlay"></div>
            
            <div id="tk-hud-top">
                <button id="reset-btn" onclick="startFlight()">❌</button>
                <div id="tk-score-display">SCORE: <span id="score-val">0</span></div>
            </div>
            
            <div id="prompt-container">
                <div id="tk-touch-prompt">TAP TO START ENGINES</div>
            </div>
            
            <div id="tk-bg-sky" class="parallax-layer" style="background-image: url('sky1.png');"></div>
            <div id="tk-bg-city" class="parallax-layer" style="background-image: url('city1.png');"></div>
            
            <div id="plane-container">
                <div id="plane-rotate-group">
                    <img id="tk-plane-img" src="my-plane.png" onerror="this.style.backgroundColor='blue';">
                    <div id="plane-hud">
                        <div id="hud-spd" class="hud-text"><span class="hud-label">SPEED</span><span id="hud-spd-val" class="hud-val">0</span></div>
                        <div id="hud-pitch" class="hud-text"><span class="hud-label">PITCH</span><span id="hud-pitch-val" class="hud-val">0&deg;</span></div>
                        <div id="hud-alt" class="hud-text"><span class="hud-label">ALT</span><span id="hud-alt-val" class="hud-val">0m</span></div>
                    </div>
                </div>
            </div>
            
            <div id="tk-enemy-plane"><img src="my-plane-golden.png" style="width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1);"></div>
            <div id="tk-runway"><div id="tk-runway-stripes"></div></div>
        </div>
    </div>

    <script>
        let tkState = {
            active: false, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, 
            progress: 0, altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
            lastFrameTime: 0, enemyX: 150, enemyAltitude: 0, currTargetMin: 10, currTargetMax: 16,
            bgX_sky: 0, bgX_city: 0, bgX_runway: 0
        };

        const CRUISE_ALT = 1200;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            if (!tkState.active && tkState.speed === 0) startFlight();
            tkState.pressing = true;
        });
        window.addEventListener('pointerup', () => tkState.pressing = false);
        window.addEventListener('touchend', () => tkState.pressing = false);

        function startFlight() {
            if(tkState.frameId) cancelAnimationFrame(tkState.frameId);
            
            tkState = {
                active: true, phase: 0, pitch: 0, pitchVelocity: 0, vSpeed: 0, speed: 0, progress: 0, 
                altitude: 0, cameraY: 0, score: 0, pressing: false, frameId: null, 
                lastFrameTime: performance.now(), enemyX: 150, enemyAltitude: 0,
                currTargetMin: 10, currTargetMax: 16,
                bgX_sky: 0, bgX_city: 0, bgX_runway: 0
            };

            document.getElementById('plane-container').style.display = 'block';
            document.getElementById('tk-enemy-plane').style.display = 'none';
            document.getElementById('tk-alert-overlay').className = '';
            document.getElementById('score-val').textContent = '0';
            document.getElementById('tk-touch-prompt').textContent = 'ACCELERATING...';

            tkState.frameId = requestAnimationFrame(gameLoop);
        }

        function checkCollision() {
            const p = document.getElementById('tk-plane-img').getBoundingClientRect();
            const e = document.getElementById('tk-enemy-plane').getBoundingClientRect();
            // Tighter collision box (8px buffer)
            return !(p.right - 8 < e.left + 8 || p.left + 8 > e.right - 8 || p.bottom - 8 < e.top + 8 || p.top + 8 > e.bottom - 8);
        }

        function gameLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 16) { tkState.frameId = requestAnimationFrame(gameLoop); return; }
            tkState.lastFrameTime = timestamp;

            const prompt = document.getElementById('tk-touch-prompt');
            const spdVal = document.getElementById('hud-spd-val');
            const altVal = document.getElementById('hud-alt-val');
            const pitchVal = document.getElementById('hud-pitch-val');
            const hudRing = document.getElementById('plane-hud');

            // --- Performance-Based Color Logic ---
            let inZone = (tkState.pitch >= tkState.currTargetMin && tkState.pitch <= tkState.currTargetMax);
            let targetCenter = (tkState.currTargetMin + tkState.currTargetMax) / 2;
            let error = Math.abs(tkState.pitch - targetCenter);
            let hue = inZone ? 120 : Math.max(0, 120 - (error * 7));
            let dynamicColor = `hsl(${hue}, 85%, 55%)`;

            // 1. SPEED & PROGRESS (Speed now reacts to performance)
            if (tkState.phase < 6) {
                // If in landing phase (5), we bleed speed. Else we accelerate.
                let baseAccel = (tkState.phase === 5) ? -0.25 : 0.85;
                
                // PERFORMANCE BONUS: Speed increases faster if you are in the green zone!
                let performanceFactor = inZone ? 1.0 : 0.2; 
                let actualAccel = baseAccel * performanceFactor;

                // Aerodynamic Drag/Lift physics
                if (tkState.pitch > 0) actualAccel -= (tkState.pitch * 0.04);
                if (tkState.pitch < 0) actualAccel += (Math.abs(tkState.pitch) * 0.02);
                
                tkState.speed = Math.max((tkState.phase === 0 ? 0 : 100), Math.min(220, tkState.speed + actualAccel));
            } else {
                tkState.speed = Math.max(0, tkState.speed - 1.2);
                if (tkState.speed <= 0) { tkState.active = false; prompt.textContent = "MISSION COMPLETE!"; return; }
            }
            if (tkState.phase > 0 && tkState.phase < 6) tkState.progress += (tkState.speed / 6000);

            // 2. PITCH & ALTITUDE
            if (tkState.pressing && tkState.speed >= 100) tkState.pitchVelocity += 0.07;
            else if (tkState.speed >= 100) tkState.pitchVelocity -= 0.05;
            tkState.pitchVelocity *= 0.88;
            tkState.pitch = Math.max(-25, Math.min(25, tkState.pitch + tkState.pitchVelocity));

            if (tkState.altitude <= 0 && tkState.pitch < 0) { tkState.pitch = 0; tkState.pitchVelocity = 0; }

            let targetVSpeed = tkState.pitch * 0.45;
            if (tkState.speed < 140 && tkState.altitude > 0) targetVSpeed -= 3.0; // Stall risk
            tkState.vSpeed += (targetVSpeed - tkState.vSpeed) * 0.1;

            if (tkState.phase !== 6) tkState.altitude = Math.max(0, tkState.altitude + tkState.vSpeed);

            // 3. HUD UPDATES
            spdVal.textContent = Math.floor(tkState.speed);
            altVal.textContent = Math.floor(tkState.altitude) + 'm';
            pitchVal.innerHTML = Math.floor(tkState.pitch) + '&deg;';
            
            hudRing.style.borderColor = dynamicColor;
            pitchVal.parentElement.style.color = dynamicColor;
            if (inZone && tkState.phase > 0 && tkState.phase < 6) tkState.score += 2;
            document.getElementById('score-val').textContent = Math.floor(tkState.score);

            // 4. PHASE LOGIC
            if (tkState.phase === 0 && tkState.speed >= 150) { tkState.phase = 1; prompt.textContent = "PITCH NOSE UP TO 15°"; }
            else if (tkState.phase === 1 && tkState.altitude >= CRUISE_ALT) { tkState.phase = 2; tkState.currTargetMin = -3; tkState.currTargetMax = 3; prompt.textContent = "CRUISE: LEVEL OFF (0°)"; }
            else if (tkState.phase === 2 && tkState.progress > 35) {
                tkState.phase = 3; tkState.currTargetMin = -22; tkState.currTargetMax = -12;
                prompt.textContent = "TRAFFIC ALERT: DIVE NOW!"; document.getElementById('tk-alert-overlay').className = 'flashing';
                document.getElementById('tk-enemy-plane').style.display = 'block';
                tkState.enemyX = 150; tkState.enemyAltitude = tkState.altitude;
            }
            else if (tkState.phase === 3) {
                tkState.enemyX -= 1.4;
                document.getElementById('tk-enemy-plane').style.left = tkState.enemyX + '%';
                let enemyY = -(tkState.enemyAltitude - tkState.cameraY);
                document.getElementById('tk-enemy-plane').style.transform = `translateY(${enemyY}px) scaleX(-1)`;
                if (checkCollision()) { tkState.active = false; prompt.textContent = "MID-AIR COLLISION!"; return; }
                if (tkState.enemyX < -25) {
                    tkState.phase = 4; tkState.currTargetMin = -3; tkState.currTargetMax = 3;
                    prompt.textContent = "CLEAR. LEVEL OFF."; document.getElementById('tk-alert-overlay').className = '';
                }
            }
            else if (tkState.phase === 4 && tkState.progress > 75) { tkState.phase = 5; tkState.currTargetMin = -8; tkState.currTargetMax = -2; prompt.textContent = "APPROACH: GLIDE DOWN"; }
            
            if (tkState.phase === 5 && tkState.altitude <= 0) {
                if (tkState.pitch >= -5 && tkState.pitch <= 15) { tkState.phase = 6; tkState.altitude = 0; prompt.textContent = "TOUCHDOWN! BRAKING..."; }
                else { tkState.active = false; prompt.textContent = "CRASHED ON LANDING!"; return; }
            }

            // 5. SCROLLING & CAMERA (Corrected slow parallax)
            tkState.bgX_sky -= tkState.speed * 0.005;
            tkState.bgX_city -= tkState.speed * 0.03;
            tkState.bgX_runway -= tkState.speed * 0.15;
            
            document.getElementById('tk-bg-sky').style.backgroundPosition = `${tkState.bgX_sky}px 0px`;
            document.getElementById('tk-bg-city').style.backgroundPosition = `${tkState.bgX_city}px bottom`;
            document.getElementById('tk-runway-stripes').style.backgroundPosition = `${tkState.bgX_runway}px 10px`;

            let targetCam = Math.max(0, tkState.altitude - (window.innerHeight * 0.35));
            tkState.cameraY += (targetCam - tkState.cameraY) * 0.1;
            
            document.getElementById('tk-runway').style.transform = `translateY(${tkState.cameraY}px)`;
            document.getElementById('tk-bg-city').style.transform = `translateY(${tkState.cameraY * 0.6}px)`;
            
            let planeY = -(tkState.altitude - tkState.cameraY);
            // Move container for Altitude, rotate group for Pitch/HUD alignment
            document.getElementById('plane-container').style.transform = `translateX(-50%) translateY(${planeY}px)`;
            document.getElementById('plane-rotate-group').style.transform = `rotate(${-tkState.pitch}deg)`;

            tkState.frameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
