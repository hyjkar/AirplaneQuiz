<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d71920">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>Fuel Command</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --brand-red: #d71920; --brand-gold: #cfa86e; --brand-dark: #1a1a1a;
            --bg-sand: #fcfbf9; --gauge-green: #2ecc71; --gauge-orange: #f39c12;
            --radar-green: #33ff33; --aux-blue: #3498db;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-sand);
            color: var(--brand-dark); margin: 0; padding: 15px; 
            padding-bottom: max(45px, env(safe-area-inset-bottom));
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        /* --- PRELOADER --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-sand); z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loading-bar-container { width: 250px; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; margin-top: 15px; }
        #loading-progress { width: 0%; height: 100%; background: var(--brand-red); transition: width 0.1s linear; }
        #loading-text { margin-top: 12px; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: #777; font-weight: bold; }

        #orientation-lock, #login-overlay, #restart-overlay, #refuel-overlay, #game-over-overlay, #takeoff-tutorial-overlay, #intercept-overlay, #golden-plane-modal, #multiplayer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: var(--brand-gold); z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        #golden-plane-modal { background: rgba(0,0,0,0.95); z-index: 20000; overflow-y: auto; }
        
        .view-section { width: 100%; max-width: 500px; height: 100%; display: none; flex-direction: column; align-items: center; position: relative; }
        .view-section.active { display: flex; animation: swipeIn 0.35s forwards; }
        @keyframes swipeIn { 0% { transform: translateX(30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        .fuel-tank-container { background: #222; border-radius: 12px; width: 100%; text-align: center; border: 2px solid #444; padding: 12px; }
        .fuel-bar-fill { height: 100%; width: 0%; background: var(--gauge-green); transition: width 0.5s ease; }

        /* --- MOBILE SPACING & FADE --- */
        .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; padding: 0 5px; flex-shrink: 0; }
        #powerups-bar { display: flex; justify-content: center; gap: 20px; width: 100%; margin: 15px 0; }
        .options-container { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-bottom: 25px; }
        .trivia-option { background: #f8f8f8; border: 2px solid #eee; color: #333; padding: 15px; font-size: 1rem; border-radius: 8px; transition: opacity 0.5s ease, transform 0.5s ease; cursor: pointer; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; transform: translateY(10px); }
        
        .float-text { position: fixed; color: var(--brand-red); font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; font-weight: bold; pointer-events: none; z-index: 99999; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; } }

        /* --- TAKEOFF GAUGES --- */
        .takeoff-dashboard { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; padding: 15px; background: #1a1a1a; border-radius: 8px; margin-top: 15px; }
        .v-gauge-bg { width: 35px; height: 100px; background: #000; border-radius: 4px; position: relative; overflow: hidden; border: 1px solid #444; }
        .v-gauge-fill { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 0.1s linear; }

        #takeoff-viewport { position: relative; width: 100%; flex-grow: 1; border: 4px solid #222; border-radius: 8px; overflow: hidden; background: #87CEEB; }
        #tk-plane { position: absolute; left: 20px; bottom: 32px; width: 120px; height: 45px; z-index: 4; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1>FUEL COMMAND</h1>
        <div class="loading-bar-container"><div id="loading-progress"></div></div>
        <div id="loading-text">PREPARING ASSETS... 0%</div>
    </div>

    <div id="golden-plane-modal">
        <h1 style="color:var(--brand-gold);">TOP SECRET ASSET</h1>
        <p>Operation "SULLY" Successful.</p>
        <img src="my-plane-golden.png" style="width: 80%; margin: 20px 0; border: 2px solid var(--brand-gold); border-radius: 8px;">
        <button onclick="document.getElementById('golden-plane-modal').style.display='none'">CLOSE</button>
    </div>

    <div id="login-overlay" style="display:flex;">
        <div class="modal-box">
            <h1>IDENTIFY PILOT</h1>
            <input type="text" id="callsign-input" placeholder="Callsign" maxlength="12" style="margin: 15px 0; padding: 10px; width: 100%;">
            <button onclick="registerPilot()">CONFIRM IDENTITY</button>
        </div>
    </div>

    <div id="selector-view" class="view-section">
        <h1>Dashboard</h1>
        <div class="fuel-tank-container">
            <div class="fuel-value"><span id="total-fuel-display">0</span>L</div>
            <div style="width:100%; height:8px; background:#444; margin-top:8px;"><div class="fuel-bar-fill" id="fuel-bar"></div></div>
            <div id="password-container" style="margin-top:15px; color: var(--brand-gold); font-family: monospace;"></div>
        </div>
        <div id="level-list-container" style="width:100%; overflow-y:auto; margin-top:20px;"></div>
    </div>

    <div id="game-view" class="view-section">
        <div class="game-header">
            <button onclick="saveAndExit()">BACK</button>
            <div id="level-title">Flight</div>
            <div class="mini-fuel"><span id="fuel-val">0</span>L</div>
        </div>
        
        <div id="powerups-bar">
            <button onclick="useIntelScan()">SCAN <span id="badge-pu-scan">0</span></button>
        </div>

        <div id="trivia-game-area">
            <h3 id="trivia-question">?</h3>
            <div id="trivia-options-container" class="options-container">
                <button class="trivia-option" id="btn-opt-0" onclick="submitTrivia(event, 0)"></button>
                <button class="trivia-option" id="btn-opt-1" onclick="submitTrivia(event, 1)"></button>
                <button class="trivia-option" id="btn-opt-2" onclick="submitTrivia(event, 2)"></button>
            </div>
        </div>

        <div id="takeoff-game-area" style="display:none; width: 100%; flex-direction: column; flex-grow: 1;">
            <div id="takeoff-viewport">
                <div id="tk-plane"></div>
            </div>
            <div class="takeoff-dashboard">
                <div class="v-gauge-container">
                    <div class="v-gauge-label">SPEED</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-speed-bar" style="background:var(--brand-red);"></div></div>
                    <div class="v-gauge-val" id="tk-speed-val">0</div>
                </div>
                <div class="v-gauge-container">
                    <div class="v-gauge-label">RUNWAY</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-runway-fill" style="background:var(--gauge-orange);"></div></div>
                    <div class="v-gauge-val">DIST</div>
                </div>
                <div class="v-gauge-container">
                    <div class="v-gauge-label">LIFT</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-lift-fill" style="background:var(--gauge-green);"></div></div>
                    <div class="v-gauge-val">LIFT</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Constants & State
        const TARGET_PASSWORD = "SULLY";
        const WRONG_GUESS_PENALTY = 200;
        let globalState = { username: null, currentFuel: 4000, passwordRevealed: [], levels: [] };
        let tkState = { active: false, speed: 0, lift: 0, distance: 100, pressing: false };
        let activeLevelIdx = 0;

        // --- TAKEOFF CONTROL (TAP ANYWHERE) ---
        function handleTkPress(e) {
            if (!tkState.active || e.target.closest('button')) return;
            if (tkState.speed >= 140) tkState.pressing = true;
            else {
                const sv = document.getElementById('tk-speed-val');
                sv.style.color = "orange"; setTimeout(() => sv.style.color = "white", 200);
            }
        }
        function handleTkRelease() { tkState.pressing = false; }

        window.onload = function() {
            window.addEventListener('pointerdown', handleTkPress);
            window.addEventListener('pointerup', handleTkRelease);
            
            // Initializing system
            document.getElementById('loading-screen').style.display = 'none';
        };

        function registerPilot() {
            const name = document.getElementById('callsign-input').value;
            if (!name) return;
            globalState.username = name;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('selector-view').classList.add('active');
            renderDashboard();
        }

        // --- WRONG ANSWER FADE & FLOAT ---
        function submitTrivia(e, idx) {
            // Assume logic for checking correct answer...
            const isCorrect = false; // Dummy check
            if (isCorrect) endGame(true);
            else {
                const btn = e.currentTarget;
                const rect = btn.getBoundingClientRect();
                showFloat(rect.left + rect.width / 2, rect.top, `-${WRONG_GUESS_PENALTY}L`);
                btn.classList.add('fade-out');
                globalState.currentFuel -= WRONG_GUESS_PENALTY;
                updateMiniFuelUI();
            }
        }

        function showFloat(x, y, text) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.textContent = text;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function renderDashboard() {
            document.getElementById('total-fuel-display').innerText = globalState.currentFuel;
            document.getElementById('fuel-bar').style.width = (globalState.currentFuel / 4000 * 100) + "%";
        }

        function updateMiniFuelUI() {
            document.getElementById('fuel-val').innerText = globalState.currentFuel;
            renderDashboard();
        }

        // --- ASSET PRELOADER PLACEHOLDER ---
        function preloadGameAssets(cb) { cb(); }
        function saveAndExit() { location.reload(); }
        function drainFuel(amt) { globalState.currentFuel -= amt; renderDashboard(); }
    </script>
</body>
</html>
