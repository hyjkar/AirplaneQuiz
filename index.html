<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d71920">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>Fuel Command</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --brand-red: #d71920;
            --brand-gold: #cfa86e;
            --brand-dark: #1a1a1a;
            --bg-sand: #fcfbf9;
            --gauge-green: #2ecc71;
            --gauge-orange: #f39c12;
            --radar-green: #33ff33;
            --aux-blue: #3498db;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-sand);
            color: var(--brand-dark);
            margin: 0; padding: 15px; 
            padding-bottom: max(45px, env(safe-area-inset-bottom));
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-sand); z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loading-bar-container { width: 250px; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; margin-top: 15px; }
        #loading-progress { width: 0%; height: 100%; background: var(--brand-red); transition: width 0.1s linear; }
        #loading-text { margin-top: 12px; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: #777; font-weight: bold; }

        #orientation-lock, #login-overlay, #restart-overlay, #refuel-overlay, #game-over-overlay, #takeoff-tutorial-overlay, #intercept-overlay, #golden-plane-modal, #multiplayer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: var(--brand-gold); z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        #restart-overlay, #refuel-overlay { background: rgba(0,0,0,0.92); backdrop-filter: blur(5px); }
        #game-over-overlay { background: rgba(0,0,0,0.85); }
        #takeoff-tutorial-overlay { background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        #golden-plane-modal { background: rgba(0,0,0,0.95); z-index: 20000; overflow-y: auto; }
        #intercept-overlay { background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85) 100%); justify-content: flex-end; padding-bottom: 40px; }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--brand-dark); margin: 0; text-align: center; text-transform: uppercase; }
        h2 { font-size: 0.8rem; color: #777; text-transform: uppercase; letter-spacing: 2px; margin: 2px 0 10px 0; text-align: center; }

        .view-section { width: 100%; max-width: 500px; height: 100%; display: none; flex-direction: column; align-items: center; min-height: 0; position: relative; z-index: 1; }
        .view-section.active { display: flex; animation: swipeIn 0.35s forwards; }
        @keyframes swipeIn { 0% { transform: translateX(30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        .fuel-tank-container { background: #222; border-radius: 12px; width: 100%; text-align: center; border: 2px solid #444; position: relative; flex-shrink: 0; overflow: hidden;}
        .fuel-value { font-family: 'Share Tech Mono', monospace; font-weight: bold; color: var(--gauge-green); line-height: 1; }
        .fuel-bar-fill { height: 100%; width: 100%; background: var(--gauge-green); transition: width 0.5s ease; }

        .level-strip { background: white; border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }

        /* Mobile Spacing Fixes */
        .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; padding: 0 5px; flex-shrink: 0; }
        #powerups-bar { display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; margin-top: 10px; margin-bottom: 15px; }
        .options-container { display: flex; flex-direction: column; gap: 8px; width: 100%; flex-shrink: 0; margin-bottom: 25px; }
        #trivia-game-area { width: 100%; display: none; flex-direction: column; flex-grow: 1; justify-content: center; gap: 15px; margin-bottom: 25px; }

        /* Option Styling & Fade Effect */
        .trivia-option { background: #f8f8f8; border: 2px solid #eee; color: #333; padding: 15px; font-size: 1rem; border-radius: 8px; transition: opacity 0.5s ease, transform 0.5s ease, background-color 0.2s; cursor: pointer; display: block; width: 100%; font-weight: normal; text-align: left;}
        .trivia-option:active { transform: scale(0.98); background: #eee; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; transform: translateY(10px); }
        
        .float-text { position: fixed; color: var(--brand-red); font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 99999; transform: translate(-50%, -50%); animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; } }

        /* Vertical Gauge Styles */
        .takeoff-dashboard { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; padding: 15px 10px; background: #1a1a1a; border-radius: 8px; border: 2px solid #333; margin-top: 15px; }
        .v-gauge-container { display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; width: 30%; }
        .v-gauge-label { color: #888; font-size: 0.75rem; letter-spacing: 1px; }
        .v-gauge-bg { width: 35px; height: 100px; background: #000; border-radius: 4px; border: 1px solid #444; position: relative; overflow: hidden; }
        .v-gauge-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; transition: height 0.1s linear; }
        .v-gauge-val { color: #fff; font-size: 1rem; margin-top: 5px; }

        #takeoff-viewport { position: relative; width: 100%; flex-grow: 1; min-height: 250px; border: 4px solid #222; border-radius: 8px; overflow: hidden; background-color: #87CEEB; }
        .parallax-layer { position: absolute; left: 0; right: 0; top: 0; bottom: 32px; background-repeat: repeat-x; pointer-events: none; }
        #tk-plane { position: absolute; left: 20px; bottom: 32px; width: 120px; height: 45px; z-index: 4; pointer-events: none;}
        #tk-gauge-container { position: absolute; right: 15px; top: 15px; bottom: 60px; width: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; pointer-events: none; }
        #tk-target-zone { position: absolute; left: 0; right: 0; background: var(--gauge-green); }
        #tk-needle { position: absolute; left: -5px; right: -5px; bottom: 0%; height: 4px; background: var(--brand-red); }
        
        #news-ticker-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; color: var(--brand-gold); font-family: 'Share Tech Mono', monospace; overflow: hidden; white-space: nowrap; padding: 6px 0; border-top: 1px solid #333;}
        #news-ticker { display: inline-block; padding-left: 100%; animation: ticker linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1>FUEL COMMAND</h1>
        <h2>SYSTEM STARTUP</h2>
        <div class="loading-bar-container"><div id="loading-progress"></div></div>
        <div id="loading-text">PREPARING ASSETS... 0%</div>
    </div>

    <div id="golden-plane-modal">
        <h1 style="color:var(--brand-gold);">ASSET UNLOCKED</h1>
        <p style="color:#ccc;">Operation "SULLY" Successful.</p>
        <img src="my-plane-golden.png" style="width: 80%; margin: 20px 0; border: 2px solid var(--brand-gold); border-radius: 8px;">
        <button class="primary-btn" onclick="document.getElementById('golden-plane-modal').style.display='none'">CLOSE</button>
    </div>

    <div id="selector-view" class="view-section">
        <div class="dashboard-header">
            <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px;">
                <div class="icon-btn logout" onclick="triggerResetUI()">RESET</div>
                <h1>Fuel Command</h1>
                <div style="width: 36px;"></div>
            </div>
            <div class="fuel-tank-container" style="padding: 12px;">
                <div class="fuel-value" style="font-size: 1.6rem;"><span id="total-fuel-display">0</span>L</div>
                <div style="width:100%; height:8px; background:#444; margin-top:8px; border-radius: 4px;"><div class="fuel-bar-fill" id="fuel-bar" style="width:0%;"></div></div>
                <div id="password-container" style="margin-top: 10px;"></div>
            </div>
        </div>
        <div id="level-list-container" style="width:100%; flex-grow:1; overflow-y:auto; margin-top:15px;"></div>
        <button class="radar-btn" onclick="openRadar()">LIVE RADAR OPS</button>
    </div>

    <div id="game-view" class="view-section">
        <div class="game-header">
            <div class="icon-btn" onclick="saveAndExit()">BACK</div>
            <div id="level-title" style="font-weight:bold;">Flight</div>
            <div class="mini-fuel" id="current-fuel-display"><span id="fuel-val">0</span>L</div>
        </div>
        
        <div id="powerups-bar">
            <div class="pu-btn" onclick="useIntelScan()">SCAN <span id="badge-pu-scan">0</span></div>
            <div class="pu-btn" onclick="usePrecisionDrone()">DRONE <span id="badge-pu-drone">0</span></div>
            <div class="pu-btn" onclick="useFuelPod()">FUEL <span id="badge-pu-fuel">0</span></div>
        </div>

        <div id="image-game-area">
            <div id="game-wrapper"><div id="game-container"><img id="mystery-image" src=""><div id="cover-grid"></div></div></div>
            <div class="options-container">
                <button class="trivia-option" id="img-opt-0" onclick="submitImageGuess(event, 0)"></button>
                <button class="trivia-option" id="img-opt-1" onclick="submitImageGuess(event, 1)"></button>
                <button class="trivia-option" id="img-opt-2" onclick="submitImageGuess(event, 2)"></button>
            </div>
        </div>

        <div id="trivia-game-area">
            <div class="trivia-dossier">
                <div id="trivia-question">?</div>
                <div id="trivia-options-container">
                    <button class="trivia-option" id="btn-opt-0" onclick="submitTrivia(event, 0)"></button>
                    <button class="trivia-option" id="btn-opt-1" onclick="submitTrivia(event, 1)"></button>
                    <button class="trivia-option" id="btn-opt-2" onclick="submitTrivia(event, 2)"></button>
                </div>
            </div>
        </div>

        <div id="takeoff-game-area">
            <div id="takeoff-viewport">
                <div id="tk-touch-prompt">TAP TO PULL UP</div>
                <div id="tk-bg-sky" class="parallax-layer"></div>
                <div id="tk-bg-city" class="parallax-layer"></div>
                <div id="tk-bg-ground" class="parallax-layer"></div>
                <div id="tk-gauge-container"><div id="tk-target-zone"></div><div id="tk-needle"></div></div>
                <div id="tk-plane"></div>
                <div id="tk-runway"><div id="tk-runway-surface"></div></div>
            </div>
            
            <div class="takeoff-dashboard">
                <div class="v-gauge-container">
                    <div class="v-gauge-label">SPEED</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-speed-bar" style="background:var(--brand-red);"></div></div>
                    <div class="v-gauge-val" id="tk-speed-val">0</div>
                </div>
                <div class="v-gauge-container">
                    <div class="v-gauge-label">RUNWAY</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-runway-fill" style="background:var(--gauge-orange);"></div></div>
                    <div class="v-gauge-val">DIST</div>
                </div>
                <div class="v-gauge-container">
                    <div class="v-gauge-label">LIFT</div>
                    <div class="v-gauge-bg"><div class="v-gauge-fill" id="tk-lift-fill" style="background:var(--gauge-green);"></div></div>
                    <div class="v-gauge-val">TARGET</div>
                </div>
            </div>
        </div>
        <div id="message"></div>
    </div>
    <script>
        // ... (Keep your existing ICONS, AIRCRAFT_DATA, and TRIVIA_DATA arrays here) ...

        var TARGET_PASSWORD = "SULLY";
        var tkState = { active: false, pitch: 0, pitchVelocity: 0, lift: 0, distance: 100, speed: 0, pressing: false, frameId: null, lastFrameTime: 0, initialDistance: 100 };

        // --- TAKEOFF CONTROL ---
        function handleTkPress(e) { 
            if (!tkState.active) return;
            if (e.target.closest('button') || e.target.closest('.pu-btn') || e.target.closest('.icon-btn')) return;
            
            // Standard clientX/Y works for both mouse and mobile 'click/pointer' events
            if (e.cancelable) e.preventDefault();
            
            if (tkState.speed < 140) {
                const speedVal = document.getElementById('tk-speed-val');
                if(speedVal) { 
                    speedVal.style.transform = "scale(1.5)"; 
                    setTimeout(() => { speedVal.style.transform = "scale(1)"; }, 150); 
                } 
                return;
            }
            document.getElementById('tk-touch-prompt').style.opacity = '0'; 
            tkState.pressing = true; 
        }

        function handleTkRelease() { tkState.pressing = false; }

        window.onload = function() {
            // Global Listeners for Takeoff
            window.addEventListener('pointerdown', handleTkPress);
            window.addEventListener('touchstart', (e) => { if (tkState.active) handleTkPress(e); }, {passive: false});
            window.addEventListener('pointerup', handleTkRelease);
            window.addEventListener('touchend', handleTkRelease);

            preloadGameAssets(() => {
                loadState();
                if (!globalState.username) { document.getElementById('login-overlay').style.display = 'flex'; } 
                else { document.getElementById('selector-view').classList.add('active'); renderDashboard(); }
            });
        };

        // --- WRONG ANSWER FADE & FLOAT ---
        function submitImageGuess(e, selectedIndex) {
            const lState = globalState.levels[activeLevelIdx];
            if(lState.completed || globalState.currentFuel <= 0) return;
            if(selectedIndex === lState.correctIdx) endGame(true); 
            else handleWrongAnswer(e);
        }

        function submitTrivia(e, selectedIndex) {
            const lState = globalState.levels[activeLevelIdx];
            if(lState.completed || globalState.currentFuel <= 0) return;
            if(selectedIndex === lState.correctIdx) endGame(true); 
            else handleWrongAnswer(e);
        }

        function handleWrongAnswer(e) {
            const btn = e.currentTarget;
            
            // Safely get coordinates for floating text
            let cx = e.clientX;
            let cy = e.clientY;
            
            // Handle case where click is triggered by enter key or detail is missing
            if (!cx || !cy) {
                const rect = btn.getBoundingClientRect();
                cx = rect.left + rect.width / 2;
                cy = rect.top + rect.height / 2;
            }

            showFloat(cx, cy, `-${WRONG_GUESS_PENALTY}L`);
            drainFuel(WRONG_GUESS_PENALTY);

            // Trigger the CSS Fade-Out
            btn.classList.add('fade-out');

            if (globalState.currentFuel <= 0 && globalState.extraFuel <= 0) triggerGameOver(false);
        }

        function showFloat(x, y, text) { 
            const el = document.createElement('div'); 
            el.className = 'float-text'; 
            el.textContent = text; 
            el.style.left = x + 'px'; 
            el.style.top = y + 'px'; 
            document.body.appendChild(el); 
            setTimeout(() => el.remove(), 800); 
        }

        // --- TAKEOFF LOGIC ---
        function startTakeoff() {
            tkState.active = true; tkState.speed = 0; tkState.lift = 0; tkState.pitch = 0;
            tkState.lastFrameTime = performance.now();
            document.getElementById('tk-speed-bar').style.height = '0%';
            document.getElementById('tk-runway-fill').style.height = '100%';
            document.getElementById('tk-lift-fill').style.height = '0%';
            tkState.frameId = requestAnimationFrame(takeoffLoop);
        }

        function takeoffLoop(timestamp) {
            if (!tkState.active) return;
            let delta = timestamp - tkState.lastFrameTime;
            if (delta < 15) { tkState.frameId = requestAnimationFrame(takeoffLoop); return; }
            tkState.lastFrameTime = timestamp;

            tkState.speed += (tkState.pitch > 0) ? (1.0 - (tkState.pitch * 0.05)) : 1.0;
            tkState.speed = Math.min(220, tkState.speed);
            
            if (tkState.pressing) tkState.pitchVelocity += 0.05; else tkState.pitchVelocity -= 0.03;
            tkState.pitchVelocity *= 0.90; tkState.pitch += tkState.pitchVelocity;
            tkState.pitch = Math.max(0, Math.min(30, tkState.pitch));

            if (tkState.speed >= 140 && tkState.pitch >= tkState.minAngle && tkState.pitch <= tkState.maxAngle) tkState.lift += 0.5;
            else tkState.lift = Math.max(0, tkState.lift - 0.2);

            // Update Vertical Bars
            document.getElementById('tk-speed-bar').style.height = (tkState.speed / 220 * 100) + '%';
            document.getElementById('tk-speed-val').textContent = Math.floor(tkState.speed);
            document.getElementById('tk-runway-fill').style.height = (tkState.distance / tkState.initialDistance * 100) + '%';
            document.getElementById('tk-lift-fill').style.height = tkState.lift + '%';

            const liftY = (tkState.lift / 100) * 100;
            document.getElementById('tk-plane').style.transform = `translateY(-${liftY}px) rotate(-${tkState.pitch}deg)`;
            document.getElementById('tk-needle').style.bottom = `${(tkState.pitch / 30) * 100}%`;

            if (tkState.lift >= 100) return winTakeoff();
            if (tkState.distance <= 0) return explodePlane();
            tkState.frameId = requestAnimationFrame(takeoffLoop);
        }

        function startTakeoffFromTutorial() {
            globalState.hasSeenTakeoffTutorial = true;
            document.getElementById('takeoff-tutorial-overlay').style.display = 'none';
            startTakeoff();
        }

        // ... (Include your helper functions: loadState, saveState, renderDashboard, updateMiniFuelUI, drainFuel, openRadar, etc.) ...
    </script>
</body>
</html>
