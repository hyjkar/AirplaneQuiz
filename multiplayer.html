            fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fsimpleflying.com%2Ffeed%2F')

                }

        function generateGameLevels() {
            let pool = [...AIRCRAFT_DATA.standard].sort(() => Math.random() - 0.5);
            let classPool = [...AIRCRAFT_DATA.classified].sort(() => Math.random() - 0.5);
            let tPool = [...TRIVIA_DATA].sort(() => Math.random() - 0.5);

            let h1 = pool.slice(0, 4).map(p => { let opts = getOptionsForImage(p.name, false); let img = p.images[Math.floor(Math.random() * p.images.length)]; return { ...p, image: img, hangar: 1, isClassified: false, revealedTiles: [], completed: false, options: opts, correctIdx: opts.indexOf(p.name) }; });
            let h2 = pool.slice(4, 7).map(p => { let opts = getOptionsForImage(p.name, false); let img = p.images[Math.floor(Math.random() * p.images.length)]; return { ...p, image: img, hangar: 2, isClassified: false, revealedTiles: [], completed: false, options: opts, correctIdx: opts.indexOf(p.name) }; });
            let h3 = pool.slice(7, 10).map(p => { let opts = getOptionsForImage(p.name, false); let img = p.images[Math.floor(Math.random() * p.images.length)]; return { ...p, image: img, hangar: 3, isClassified: false, revealedTiles: [], completed: false, options: opts, correctIdx: opts.indexOf(p.name) }; });
            let h4 = classPool.slice(0, 3).map(p => { let opts = getOptionsForImage(p.name, true); let img = p.images[Math.floor(Math.random() * p.images.length)]; return { ...p, image: img, hangar: 4, isClassified: true, revealedTiles: [], completed: false, options: opts, correctIdx: opts.indexOf(p.name) }; });
            let h5 = classPool.slice(3, 7).map(p => { let opts = getOptionsForImage(p.name, true); let img = p.images[Math.floor(Math.random() * p.images.length)]; return { ...p, image: img, hangar: 5, isClassified: true, revealedTiles: [], completed: false, options: opts, correctIdx: opts.indexOf(p.name) }; });

            h1.push({ type: 'takeoff', name: "Takeoff Calibration", hangar: 1, isClassified: false, completed: false, failed: false, attempts: 0 }); h1.push({ ...tPool[0], hangar: 1, isClassified: false, completed: false });
            h2.push({ type: 'takeoff', name: "Takeoff Calibration", hangar: 2, isClassified: false, completed: false, failed: false, attempts: 0 }); h2.push({ ...tPool[1], hangar: 2, isClassified: false, completed: false });
            h3.push({ type: 'takeoff', name: "Takeoff Calibration", hangar: 3, isClassified: false, completed: false, failed: false, attempts: 0 }); h3.push({ ...tPool[2], hangar: 3, isClassified: false, completed: false }); 
            h4.push({ type: 'takeoff', name: "Takeoff Calibration", hangar: 4, isClassified: true, completed: false, failed: false, attempts: 0 }); h4.push({ ...tPool[3], hangar: 4, isClassified: true, completed: false }); 
            h5.push({ type: 'takeoff', name: "Takeoff Calibration", hangar: 5, isClassified: true, completed: false, failed: false, attempts: 0 }); h5.push({ ...tPool[4], hangar: 5, isClassified: true, completed: false }); 

            return [...h1.sort(()=>Math.random()-0.5), ...h2.sort(()=>Math.random()-0.5), ...h3.sort(()=>Math.random()-0.5), ...h4.sort(()=>Math.random()-0.5), ...h5.sort(()=>Math.random()-0.5)];
        }

            const lState = globalState.levels[activeLevelIdx];
            if (lState.completed || globalState.powerups.scans <= 0) return;
            globalState.powerups.scans -= 1; saveState(); updatePowerupsUI();

            if (lState.type === 'image') {
                const wrapper = document.getElementById('game-wrapper'); wrapper.classList.add('flash-screen'); setTimeout(() => wrapper.classList.remove('flash-screen'), 1000); 
                const hiddenTiles = document.querySelectorAll('.grid-piece:not(.revealed)');

                lState.revealedTiles = [...Array(100).keys()]; saveState();

        function usePrecisionDrone() {
            const lState = globalState.levels[activeLevelIdx];
            if (lState.completed || globalState.powerups.drones <= 0) return;
            globalState.powerups.drones -= 1; saveState(); updatePowerupsUI();

            if (lState.type === 'image') {
                if(!lState.revealedTiles) lState.revealedTiles = [];
                let unrevealed = []; for(let i=0; i<100; i++) { if(!lState.revealedTiles.includes(i)) unrevealed.push(i); }
                unrevealed.sort(() => Math.random() - 0.5); let toReveal = unrevealed.slice(0, 15);
                lState.revealedTiles.push(...toReveal); saveState();
                const grid = document.getElementById('cover-grid');
                toReveal.forEach(idx => { let tile = grid.children[idx]; if(tile) { tile.style.transition = 'opacity 0.5s ease, background 0.2s'; tile.style.background = 'var(--brand-red)'; setTimeout(() => tile.classList.add('revealed'), 200); } });
            } else if (lState.type === 'trivia') {
                let wrongIndices = [];
                lState.options.forEach((opt, i) => { if(i !== lState.correctIdx) { const btn = document.getElementById('btn-opt-' + i); if(btn && !btn.disabled) wrongIndices.push(i); } });

        function getCompassDirection(heading) { const dirs = ["NORTH", "NORTH-EAST", "EAST", "SOUTH-EAST", "SOUTH", "SOUTH-WEST", "WEST", "NORTH-WEST"]; return dirs[Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8]; }

        function evaluateAndSelectHints(targetPlane, geoData, config) {
            let potentialHints = []; const totalP = currentRadarPlanes.length;

            if (targetPlane.originCity) potentialHints.push({ text: `ORIGIN ${targetPlane.originCity}`, test: p => p.originCity === targetPlane.originCity });
            if (targetPlane.destCity) potentialHints.push({ text: `DESTINATION ${targetPlane.destCity}`, test: p => p.destCity === targetPlane.destCity });
            if (targetPlane.alt) { const isAbove = Math.random() > 0.5; let bound = isAbove ? Math.floor((targetPlane.alt - 1) / 500) * 500 : Math.ceil((targetPlane.alt + 1) / 500) * 500; potentialHints.push({ text: `ALT ${isAbove ? 'ABOVE' : 'BELOW'} ${bound}M`, test: p => isAbove ? p.alt > bound : p.alt < bound }); }

            goodHints.sort((a, b) => a.ratio - b.ratio);

            const gameView = document.getElementById('game-view'); const selectorView = document.getElementById('selector-view'); const hangarView = document.getElementById('hangar-view');
            gameView.classList.remove('active'); renderDashboard(); 
            if (activeLevelIdx !== null && activeLevelIdx !== undefined && globalState.levels[activeLevelIdx]) { let hNum = globalState.levels[activeLevelIdx].hangar; openHangar(hNum); } else { hangarView.classList.remove('active'); selectorView.classList.remove('active'); void selectorView.offsetWidth; selectorView.classList.add('active'); }
        }
        
        function triggerResetUI() { document.getElementById('restart-overlay').style.display = 'flex'; }
        function cancelReset() { document.getElementById('restart-overlay').style.display = 'none'; }
        function confirmReset() { const lastUser = globalState.username || localStorage.getItem('last_pilot_name'); localStorage.clear(); if (lastUser) localStorage.setItem('last_pilot_name', lastUser); location.reload(); }
        function showFloat(x, y, text) { const el = document.createElement('div'); el.className = 'float-text'; el.textContent = text; el.style.left = x + 'px'; el.style.top = y + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 800); }
        function triggerConfetti() { try { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); } catch(e){} }
        
        // --- MULTIPLAYER SYSTEM ---
        let currentRoomCode = null;
        let isHost = false;
        let matchListener = null;
        let mpStartTime = null;
        let mpTimeLimit = null;
        let mpGameEnded = false;

        function openMultiplayer() {
            document.getElementById('multiplayer-overlay').style.display = 'flex';
            document.getElementById('mp-status').innerHTML = "";
        }

        function closeMultiplayer() {
            document.getElementById('multiplayer-overlay').style.display = 'none';
        }

        function hostNewGame() {
            if (!db) { alert("HQ Database Offline!"); return; }
            let isTimed = document.getElementById("mp-timer-checkbox").checked;
            
            currentRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            
            db.collection("multiplayer_matches").doc(currentRoomCode).set({
                hostName: globalState.username,
                hostScore: globalState.currentFuel,
                guestName: "Waiting...",
                guestScore: 0,
                status: "waiting",
                timeLimit: isTimed ? 120 : null,
                startTime: null
            });

            document.getElementById("mp-status").innerHTML = `ROOM CREATED.<br>TELL OPPONENT TO JOIN CODE:<br><span style="color:var(--brand-gold); font-size: 2rem; display:block; margin-top:10px;">${currentRoomCode}</span>`;
            listenToMatch(currentRoomCode);
        }

        function joinExistingGame() {
            if (!db) { alert("HQ Database Offline!"); return; }
            
            let code = document.getElementById("join-code-input").value.trim();
            if (code.length !== 4) { alert("Enter a valid 4-digit code."); return; }
            
            currentRoomCode = code;
            isHost = false;
            document.getElementById("mp-status").innerHTML = "CONNECTING...";
            
            db.collection("multiplayer_matches").doc(currentRoomCode).update({
                guestName: globalState.username,
                guestScore: globalState.currentFuel,
                status: "playing"
            }).then(() => {
                document.getElementById("mp-status").innerHTML = "LINK ESTABLISHED!";
                listenToMatch(currentRoomCode);
                setTimeout(closeMultiplayer, 1500);
            }).catch((err) => {
                document.getElementById("mp-status").innerHTML = "<span style='color:red;'>ROOM NOT FOUND.</span>";
            });
        }

        function listenToMatch(roomCode) {
            if (matchListener) matchListener();
            
            document.getElementById('enemy-fuel-display').style.display = 'block';
            document.getElementById('enemy-dashboard-tank').style.display = 'block';
            
            matchListener = db.collection("multiplayer_matches").doc(roomCode).onSnapshot((doc) => {
                if (doc.exists) {
                    let data = doc.data();
                    
                    let oppName = isHost ? data.guestName : data.hostName;
                    let oppScore = isHost ? data.guestScore : data.hostScore;
                    
                    document.getElementById('enemy-fuel-val').innerText = `${oppName} [${oppScore}]`;
                    document.getElementById('enemy-dashboard-name').innerText = oppName.toUpperCase();
                    document.getElementById('enemy-dashboard-score').innerText = oppScore;
                    
                    if (data.status === "playing") {
                        if (data.timeLimit && data.startTime) {
                            mpStartTime = data.startTime;
                            mpTimeLimit = data.timeLimit;
                            mpGameEnded = false;
                        } else if (isHost && data.timeLimit && !data.startTime) {
                            db.collection("multiplayer_matches").doc(roomCode).update({
                                startTime: Date.now()
                            });
                        }
                    }

                    if (isHost && data.status === "playing" && document.getElementById('multiplayer-overlay').style.display === 'flex') {
                         document.getElementById("mp-status").innerHTML = "OPPONENT JOINED! COMMENCE OPERATION.";
                         setTimeout(closeMultiplayer, 1500);
                    }
                }
            });
        }

        function syncMultiplayerScore() {
            if (currentRoomCode && db) {
                let updateData = isHost ? { hostScore: globalState.currentFuel } : { guestScore: globalState.currentFuel };
                db.collection("multiplayer_matches").doc(currentRoomCode).update(updateData).catch(e => console.log("Sync error", e));
            }
        }

        // Multiplayer Timer Loop
        setInterval(() => {
            if (currentRoomCode && mpStartTime && mpTimeLimit && !mpGameEnded) {
                let elapsed = Math.floor((Date.now() - mpStartTime) / 1000);
                let left = mpTimeLimit - elapsed;
                
                let dTimer = document.getElementById('mp-dashboard-timer');
                let hTimer = document.getElementById('mp-header-timer');
                
                if (left <= 0) {
                    left = 0;
                    if(dTimer) dTimer.innerText = "TIME UP!";
                    if(hTimer) hTimer.innerText = "";
                    if (!mpGameEnded) {
                        endMultiplayerMatch();
                    }
                } else {
                    let m = Math.floor(left / 60);
                    let s = left % 60;
                    let timeStr = `${m}:${s < 10 ? '0'+s : s}`;
                    if(dTimer) dTimer.innerText = "TIME LEFT: " + timeStr;
                    if(hTimer) hTimer.innerText = " | ⏱ " + timeStr;
                }
            }
        }, 1000);

        function endMultiplayerMatch() {
            mpGameEnded = true;
            
            let oppScore = parseInt(document.getElementById('enemy-dashboard-score').innerText) || 0;
            let myScore = globalState.currentFuel;
            
            document.getElementById('game-view').classList.add('gray-out'); 
            document.getElementById('selector-view').classList.add('gray-out'); 
            document.getElementById('hangar-view').classList.add('gray-out'); 
            document.getElementById('radar-view').classList.add('gray-out'); 
            
            const box = document.getElementById('stats-box');
            const title = document.getElementById('stats-title');
            const reason = document.getElementById('stats-reason');

            if (myScore > oppScore) {
                title.textContent = "VICTORY!";
                title.style.color = "var(--gauge-green)";
                reason.textContent = "YOU OUTPERFORMED THE ENEMY";
                box.className = "modal-box success";
            } else if (myScore < oppScore) {
                title.textContent = "DEFEAT!";
                title.style.color = "var(--brand-red)";
                reason.textContent = "ENEMY SECURED MORE FUEL";
                box.className = "modal-box danger";
            } else {
                title.textContent = "DRAW!";
                title.style.color = "var(--brand-gold)";
                reason.textContent = "TIE GAME";
                box.className = "modal-box"; 
                box.style.borderColor = "var(--brand-gold)";
            }

            document.getElementById('stat-time').textContent = "2:00";
            document.getElementById('stat-hangars').textContent = "VS MODE";

            setTimeout(() => { document.getElementById('game-over-overlay').style.display = 'flex'; }, 500); 

            if(matchListener) matchListener();
            currentRoomCode = null;
            mpStartTime = null;
            mpTimeLimit = null;
            document.getElementById('enemy-dashboard-tank').style.display = 'none';
            document.getElementById('enemy-fuel-display').style.display = 'none';
        }
        // --- END MULTIPLAYER SYSTEM ---

        let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; const btn = document.getElementById('install-btn'); btn.style.display = 'block'; btn.addEventListener('click', () => { btn.style.display = 'none'; deferredPrompt.prompt(); deferredPrompt = null; }); });
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    </script>
</body>
</html>
