<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Puzzle</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --panel-color: #2b2b30;
            --text-color: #e0e0e0;
            --accent-color: #d4af37; /* Gold */
            --success-color: #4cd137;
            --tile-bg: #383840;
            --tile-border: #555;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        .container {
            background-color: var(--panel-color);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 600px;
            border: 2px solid #444;
        }

        h1 {
            margin-top: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
        }

        p.instructions {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .puzzle-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .word-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: var(--tile-bg);
            border: 3px solid var(--tile-border);
            border-radius: 8px;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px black;
        }

        .tile:hover {
            background-color: #4a4a55;
        }

        .tile.selected {
            border-color: var(--accent-color);
            background-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(212, 175, 55, 0.3);
            color: var(--accent-color);
        }

        .tile.locked {
            border-color: var(--success-color);
            background-color: rgba(76, 209, 55, 0.2);
            color: var(--success-color);
            cursor: default;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(76, 209, 55, 0.4);
        }

        #message {
            height: 30px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--success-color);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Terminal Locked</h1>
        <p class="instructions">Override sequence required.<br>Click a letter, then click another to swap their positions.</p>
        
        <div class="puzzle-area">
            <div class="word-group" id="word1"></div>
            
            <div class="word-group" id="word2"></div>
        </div>

        <div id="message">ACCESS GRANTED</div>
    </div>

    <script>
        const targetWord1 = "ILOA";
        const targetWord2 = "SONJALLE";
        const fullTarget = targetWord1 + targetWord2;
        
        // Split all letters into an array
        let letters = fullTarget.split("");
        
        // Shuffle the letters until they don't match the solved state
        let isShuffled = false;
        while (!isShuffled) {
            letters.sort(() => Math.random() - 0.5);
            if (letters.join("") !== fullTarget) {
                isShuffled = true;
            }
        }

        const word1Container = document.getElementById('word1');
        const word2Container = document.getElementById('word2');
        let selectedTile = null;
        let isSolved = false;

        // Initialize the board
        function initBoard() {
            // First 4 letters for ILOA
            for (let i = 0; i < targetWord1.length; i++) {
                word1Container.appendChild(createTile(letters[i]));
            }
            // Remaining 8 letters for SONJALLE
            for (let i = targetWord1.length; i < letters.length; i++) {
                word2Container.appendChild(createTile(letters[i]));
            }
        }

        // Create individual tile element
        function createTile(letter) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = letter;
            
            tile.addEventListener('click', () => {
                if (isSolved) return; // Prevent clicks if game is won

                if (selectedTile === null) {
                    // Select first tile
                    selectedTile = tile;
                    tile.classList.add('selected');
                } else {
                    // If clicking the same tile, deselect it
                    if (selectedTile === tile) {
                        tile.classList.remove('selected');
                        selectedTile = null;
                        return;
                    }

                    // Swap the text content
                    const temp = selectedTile.innerText;
                    selectedTile.innerText = tile.innerText;
                    tile.innerText = temp;

                    // Deselect and check for win
                    selectedTile.classList.remove('selected');
                    selectedTile = null;
                    checkWinCondition();
                }
            });

            return tile;
        }

        // Check if the current layout matches the target words
        function checkWinCondition() {
            let currentWord1 = "";
            let currentWord2 = "";

            Array.from(word1Container.children).forEach(tile => {
                currentWord1 += tile.innerText;
            });

            Array.from(word2Container.children).forEach(tile => {
                currentWord2 += tile.innerText;
            });

            if (currentWord1 === targetWord1 && currentWord2 === targetWord2) {
                triggerWin();
            }
        }

        // Handle the win state
        function triggerWin() {
            isSolved = true;
            const allTiles = document.querySelectorAll('.tile');
            
            // Add locked styling to all tiles
            allTiles.forEach(tile => {
                tile.classList.remove('selected');
                tile.classList.add('locked');
            });

            // Show success message
            const messageEl = document.getElementById('message');
            messageEl.classList.add('visible');
        }

        // Start the game
        initBoard();
    </script>
</body>
</html>
