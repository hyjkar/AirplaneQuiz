<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escape Room Puzzle - Responsive</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --panel-color: #2b2b30;
            --text-color: #e0e0e0;
            --accent-color: #d4af37; /* Gold */
            --success-color: #4cd137; /* Green */
            --tile-bg: #383840;
            --tile-border: #555;
            --warning-color: #ff4757;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        /* Landscape Warning Screen */
        #orientation-warning {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            color: var(--warning-color);
        }

        #orientation-warning svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: var(--warning-color);
            animation: rotatePhone 2s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* Enforce Landscape via CSS Media Queries */
        @media screen and (orientation: portrait) {
            #game-container { display: none !important; }
            #orientation-warning { display: flex; }
        }

        #game-container {
            background-color: var(--panel-color);
            width: 90vw; /* Scales with screen width */
            max-width: 900px;
            padding: 2vw 4vw;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: clamp(18px, 3vw, 24px);
        }

        p.instructions {
            font-size: clamp(12px, 2vw, 14px);
            color: #aaa;
            margin-bottom: 25px;
        }

        .puzzle-area {
            display: flex;
            flex-direction: row; 
            gap: 3vw;
            margin-bottom: 30px;
            width: 100%;
            justify-content: center;
        }

        .word-group {
            display: flex;
            justify-content: center;
            gap: 1vw;
        }

        .tile {
            /* Fluid sizing: shrinks on small screens, caps at 60px */
            width: clamp(30px, 6vw, 60px);
            height: clamp(30px, 6vw, 60px);
            background-color: var(--tile-bg);
            border: 3px solid var(--tile-border);
            border-radius: 8px;
            font-size: clamp(18px, 4vw, 28px);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px black;
            flex-shrink: 0;
        }

        .tile:hover:not(.fixed):not(.locked) {
            background-color: #4a4a55;
        }

        .tile.selected {
            border-color: var(--accent-color);
            background-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(212, 175, 55, 0.3);
            color: var(--accent-color);
        }

        /* Styling for when a letter is in the right spot */
        .tile.correct {
            border-color: var(--success-color);
            background-color: rgba(76, 209, 55, 0.1);
            color: var(--success-color);
            box-shadow: inset 0 0 10px rgba(76, 209, 55, 0.2);
        }

        .tile.fixed {
            cursor: default;
            pointer-events: none; /* Cannot be clicked or swapped */
            opacity: 0.9;
        }

        .tile.locked {
            cursor: default;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(76, 209, 55, 0.4);
        }

        #message {
            height: 30px;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--success-color);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm1 18h-10v-14h10v14z"/>
        </svg>
        <h2>Landscape Mode Required</h2>
        <p>Please rotate your device to access this terminal.</p>
    </div>

    <div id="game-container">
        <h1>Terminal Locked</h1>
        <p class="instructions">Override sequence required.<br>Click two unanchored letters to swap their positions.</p>
        
        <div class="puzzle-area">
            <div class="word-group" id="word1"></div>
            
            <div class="word-group" id="word2"></div>
        </div>

        <div id="message">ACCESS GRANTED</div>
    </div>

    <script>
        const targetWord1 = "ILOA";
        const targetWord2 = "SONJALLE";
        
        const fixedFirst = "I";
        const fixedLast = "E";
        
        let pool = "LOASONJALL".split("");
        
        let isShuffled = false;
        while (!isShuffled) {
            pool.sort(() => Math.random() - 0.5);
            if (pool.join("") !== "LOASONJALL") {
                isShuffled = true;
            }
        }

        const startingLetters = [fixedFirst, ...pool, fixedLast];

        const word1Container = document.getElementById('word1');
        const word2Container = document.getElementById('word2');
        let selectedTile = null;
        let isSolved = false;

        function initBoard() {
            for (let i = 0; i < targetWord1.length; i++) {
                const isFixed = (i === 0);
                word1Container.appendChild(createTile(startingLetters[i], isFixed));
            }
            
            for (let i = targetWord1.length; i < startingLetters.length; i++) {
                const isFixed = (i === startingLetters.length - 1);
                word2Container.appendChild(createTile(startingLetters[i], isFixed));
            }

            // Check correct positions immediately on load
            updateGameState();
        }

        function createTile(letter, isFixed) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = letter;
            
            if (isFixed) {
                tile.classList.add('fixed');
            }
            
            // Even fixed tiles need the click listener structural bypass 
            // but pointer-events:none in CSS stops them from triggering it.
            tile.addEventListener('click', () => {
                if (isSolved || tile.classList.contains('fixed')) return; 

                if (selectedTile === null) {
                    selectedTile = tile;
                    tile.classList.add('selected');
                } else {
                    if (selectedTile === tile) {
                        tile.classList.remove('selected');
                        selectedTile = null;
                        return;
                    }

                    // Swap letters
                    const temp = selectedTile.innerText;
                    selectedTile.innerText = tile.innerText;
                    tile.innerText = temp;

                    selectedTile.classList.remove('selected');
                    selectedTile = null;
                    
                    updateGameState();
                }
            });

            return tile;
        }

        function updateGameState() {
            let currentWord1 = "";
            let currentWord2 = "";

            // Check Word 1
            Array.from(word1Container.children).forEach((tile, index) => {
                currentWord1 += tile.innerText;
                if (tile.innerText === targetWord1[index]) {
                    tile.classList.add('correct');
                } else {
                    tile.classList.remove('correct');
                }
            });

            // Check Word 2
            Array.from(word2Container.children).forEach((tile, index) => {
                currentWord2 += tile.innerText;
                if (tile.innerText === targetWord2[index]) {
                    tile.classList.add('correct');
                } else {
                    tile.classList.remove('correct');
                }
            });

            // Check Win Condition
            if (currentWord1 === targetWord1 && currentWord2 === targetWord2) {
                triggerWin();
            }
        }

        function triggerWin() {
            isSolved = true;
            const allTiles = document.querySelectorAll('.tile');
            
            allTiles.forEach(tile => {
                tile.classList.remove('selected');
                tile.classList.add('locked');
            });

            const messageEl = document.getElementById('message');
            messageEl.classList.add('visible');
        }

        initBoard();
    </script>
</body>
</html>
